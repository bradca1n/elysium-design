<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>POD · Pilot Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<style>
  /* ============================================================
     Serrif Condensed Light — provided by user, in /assets/
     ============================================================ */
  @font-face {
    font-family: 'Serrif Condensed';
    src: url('./fonts/SerrifCondensed-Light.woff2') format('woff2'),
         url('./fonts/SerrifCondensed-Light.woff') format('woff');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }

  /* ============================================================
     Design tokens — extracted from Figma file
     ============================================================ */
  :root {
    /* Backgrounds */
    --bg-canvas: #fefeff;
    --bg-white: #ffffff;
    --bg-glass: rgba(0,0,0,0.03);
    --bg-surface: #f8f8f8;

    /* Text */
    --text-primary: #171717;
    --text-secondary: #737373;
    --text-muted: #a3a3a3;
    --text-inverse: #fefeff;

    /* Borders */
    --border-subtle: #e5e5e5;
    --border-default: #e5e5e5;
    --border-strong: #dbdbdc;

    /* Spacing */
    --space-2: 2px;
    --space-4: 4px;
    --space-7: 7px;
    --space-8: 8px;
    --space-12: 12px;
    --space-16: 16px;
    --space-24: 24px;
    --space-32: 32px;
    --space-48: 48px;

    /* Radius */
    --radius-s: 6px;
    --radius-m: 8px;
    --radius-l: 12px;

    /* Font sizes */
    --fs-xs: 12px;
    --fs-sm: 14px;
    --fs-md: 16px;
    --fs-lg: 18px;
    --fs-xl: 20px;
    --fs-3xl: 30px;
    --fs-6xl: 48px;

    /* Line heights */
    --lh-tight: 1.3;
    --lh-normal: 22px;
    --lh-relaxed: 24px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-white);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    -webkit-font-smoothing: antialiased;
  }

  .serif {
    font-family: 'Serrif Condensed', Georgia, 'Times New Roman', serif;
    font-weight: 300;
  }

  /* Force a permanent vertical scrollbar gutter on html so opening a sheet
     (body overflow:hidden) doesn't disappear the scrollbar and shift viewport-anchored
     elements like the topbar/sidebar that anchor to calc(50% - 864px + X). */
  html { overflow-y: scroll; overflow-x: clip; }

  /* ============================================================
     PAGE FRAME — fixed 1728 width, content at left:466
     ============================================================ */
  .page-frame {
    position: relative;
    width: 1728px;
    min-height: 100vh;
    background: var(--bg-white);
    /* Force visual centering even when frame is wider than viewport.
       margin:0 auto leaves wider-than-viewport elements at left:0 in most
       browsers; explicit negative calc margins force the frame to slide
       so .content slides with it. overflow-x:clip on html prevents the
       horizontal scrollbar that would otherwise appear.
       Clamped at -182px so body (.content at frame+466) never crosses
       viewport coord 284 = sidebar.right (252) + 32px gap. */
    margin: 0 max(-182px, calc(50% - 864px));
    padding-bottom: 100px;
  }

  /* ============================================================
     TOP BAR — brand left, "Ready to setup..." right
     Sticky: anchored to centered 1728px frame via calc(50% - 864px + X)
     ============================================================ */
  .topbar-bg {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 88px;
    background: var(--bg-white);
    z-index: 4;
    pointer-events: none;
  }
  .brand {
    position: fixed;
    left: max(32px, calc(50% - 864px + 32px));
    top: 16px;
    display: flex; gap: 16px; align-items: center;
    z-index: 5;
  }
  .brand-logo {
    height: 48px;
    display: inline-flex;
    align-items: center;
    padding: 0 8px;
    flex-shrink: 0;
    color: var(--text-primary);
  }
  .brand-logo img,
  .brand-logo svg {
    width: 110px; height: 26px; display: block;
  }
  .brand-name {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-md);
    line-height: var(--lh-normal);
    color: var(--text-primary);
    white-space: nowrap;
  }

  .topbar-cta {
    position: fixed;
    left: calc(50% - 864px + 1060px);
    top: 27px;
    display: flex; gap: 16px; align-items: center;
    justify-content: flex-end;
    z-index: 5;
  }
  .topbar-cta .label {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-primary);
    white-space: nowrap;
  }
  .pill-btn {
    display: inline-flex; gap: var(--space-8);
    align-items: center; justify-content: center;
    padding: var(--space-4) var(--space-8);
    background: var(--bg-glass);
    border: none;
    border-radius: var(--radius-m);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-xs);
    line-height: var(--lh-tight);
    color: var(--text-primary);
    text-decoration: none;
    transition: background 0.12s;
  }
  .pill-btn:hover { background: rgba(0,0,0,0.06); }
  .pill-btn .icon {
    width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .pill-btn .icon svg { width: 100%; height: 100%; display: block; }


  /* ============================================================
     SIDEBAR (NAV expandable) — sticky, aligned to centered frame
     ============================================================ */
  .sidebar {
    position: fixed;
    left: max(32px, calc(50% - 864px + 32px));
    top: 112px;
    width: 220px;
    height: calc(100vh - 132px);
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: var(--space-24);
    z-index: 4;
  }
  .sb-row .sb-item.is-logout {
    display: flex; align-items: center; gap: 8px;
  }
  .sb-row .sb-item.is-logout svg {
    width: 16px; height: 16px;
    color: currentColor;
    flex-shrink: 0;
  }
  .sidebar::-webkit-scrollbar { width: 0; }
  .sb-group { display: flex; flex-direction: column; gap: 2px; width: 100%; }

  .sb-section-header {
    height: 38px;
    padding: var(--space-7) 12px;
    border-radius: var(--radius-m);
    display: flex; align-items: center;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-xs);
    line-height: var(--lh-tight);
    color: var(--text-primary);
    cursor: default;
  }

  .sb-row {
    height: 38px;
    padding-right: var(--space-4);
    width: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .sb-row .sb-item {
    flex: 1; height: 100%;
    padding: var(--space-7) 12px;
    border-radius: var(--radius-m);
    display: flex; align-items: center; gap: 0;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    line-height: var(--lh-normal);
    color: var(--text-secondary);
    cursor: pointer;
    text-decoration: none;
    user-select: none;
    transition: background 0.1s, color 0.1s;
  }
  .sb-row .sb-item:hover { background: var(--bg-glass); color: var(--text-primary); }
  .sb-row.active .sb-item { background: var(--bg-glass); color: var(--text-primary); }
  .sb-row .sb-chevron {
    width: 14px; height: 14px;
    flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
  }
  .sb-row .sb-chevron svg { width: 100%; height: 100%; }

  /* Sub items wrap: pl=24 pb=12, with border-left at 1px */
  .sb-sub-wrap { padding: 0 0 12px 24px; width: 100%; }
  .sb-sub-inner {
    display: flex; gap: 10px; align-items: stretch;
    width: 100%; padding-right: 0;
  }
  .sb-sub-border { width: 1px; background: var(--border-subtle); align-self: stretch; flex-shrink: 0; }
  .sb-sub-list { display: flex; flex-direction: column; gap: 1px; flex: 1; }
  .sb-sub-item {
    height: 30px;
    padding: var(--space-7) 10px;
    border-radius: var(--radius-s);
    display: flex; align-items: center;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
    cursor: pointer;
    text-decoration: none;
    user-select: none;
    transition: background 0.1s, color 0.1s;
  }
  .sb-sub-item:hover { background: var(--bg-glass); color: var(--text-primary); }
  .sb-sub-item.active { background: var(--bg-glass); color: var(--text-primary); }

  /* ============================================================
     CONTENT AREA — left:466 top:112 width:786
     ============================================================ */
  .content {
    position: absolute;
    left: 466px;
    top: 112px;
    width: 870px;
    display: flex; flex-direction: column;
    gap: 80px;
    padding-bottom: 100px;
  }

  /* ============================================================
     HERO BANNER — 785x200, image background + serif title overlay
     ============================================================ */
  .hero {
    width: 870px;
    height: 200px;
    border-radius: var(--radius-m);
    overflow: hidden;
    position: relative;
    background-color: #f0f0f0;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero h1 {
    font-family: 'Serrif Condensed', Georgia, 'Times New Roman', serif;
    font-weight: 300;
    font-size: var(--fs-6xl);
    line-height: 1;
    color: #fefeff;
    margin: 0;
    z-index: 2;
    text-align: center;
    letter-spacing: 0;
  }
  body.dark .hero h1 { color: #ffffff; }

  /* ============================================================
     TYPOGRAPHY
     ============================================================ */
  .lead {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-lg);
    line-height: var(--lh-normal);
    color: var(--text-primary);
    margin: 0;
    width: 810px;
  }

  .body-text {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
    margin: 0;
  }
  .body-text + .body-text { margin-top: 14px; }

  h2.section-title {
    font-family: 'Serrif Condensed', 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    font-weight: 300;
    font-size: 36px;
    line-height: 1.1;
    color: var(--text-primary);
    margin: 0 0 32px 0;
    letter-spacing: -0.005em;
  }

  h3.subsection-title {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: var(--fs-md);
    color: var(--text-primary);
    margin: 0 0 32px 0;
  }

  /* Hero → first sibling = 48px (overrides .content gap of 80px → effective 48px) */
  .content > .hero + * { margin-top: -32px; }

  /* ============================================================
     CARDS / KPI Tiles
     ============================================================ */
  .callout {
    width: 870px;
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-m);
    padding: 32px 40px;
    background: transparent;
  }
  .callout .q {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-primary);
    margin: 0 0 14px;
  }
  .callout .a {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-primary);
    margin: 0;
  }

  .cta-card {
    background: var(--bg-glass);
    border-radius: var(--radius-m);
    padding: var(--space-16) var(--space-24);
    display: flex; flex-direction: column;
    gap: var(--space-24);
    cursor: pointer;
    transition: background 0.12s;
    text-decoration: none;
  }
  .cta-card:hover { background: rgba(0,0,0,0.06); }
  .cta-card .label,
  .cta-card-wide .label {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
    margin: 0;
  }
  .cta-card .title,
  .cta-card-wide .title {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-xl);
    line-height: var(--lh-relaxed);
    color: var(--text-primary);
    margin: 0;
  }
  .cta-card .arrow,
  .cta-card-wide .arrow {
    width: 16px; height: 16px;
    color: var(--text-primary);
  }
  /* Wide CTA sits on a hero-image bg in both themes — keep all text/icon
     white so it reads against the colored bg regardless of theme. */
  .cta-card-wide .label,
  .cta-card-wide .title,
  .cta-card-wide .arrow { color: #fefeff; }

  /* "What POD provides" 2-column grid filling 870px content width */
  .provides-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 17px 17px;
  }
  .provides-grid .cta-card.muted { opacity: 0.3; pointer-events: none; }

  /* Pilot role row (3 columns) */
  .pilot-row {
    display: flex; gap: 80px;
    align-items: flex-start;
  }
  .pilot-col {
    width: 230px;
    display: flex; flex-direction: column;
    gap: 17px;
  }
  .pilot-col .label {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }
  .pilot-col .title {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-xl); line-height: var(--lh-relaxed);
    color: var(--text-primary);
  }
  .pilot-col .desc {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }

  /* Relationship row (3 KPIs) */
  .rel-row {
    display: flex; gap: 80px;
    align-items: flex-start;
  }
  .rel-kpi {
    width: 230px;
    display: flex; flex-direction: column;
    gap: 17px;
  }
  .rel-kpi .label {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }
  .rel-kpi .value {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-3xl); line-height: 1;
    color: var(--text-primary);
  }
  .rel-kpi .note {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }

  /* "Where your SP fits" CTA card (large, bg-glass) */
  .cta-card-wide {
    width: 870px;
    background-color: var(--bg-glass);
    background-size: cover;
    background-position: center;
    border-radius: var(--radius-m);
    padding: var(--space-16) var(--space-24);
    display: flex; flex-direction: column;
    gap: var(--space-24);
    cursor: pointer;
    transition: filter 0.12s, background-color 0.12s;
    text-decoration: none;
  }
  .cta-card-wide:hover { background-color: rgba(0,0,0,0.06); filter: brightness(0.96); }

  /* ============================================================
     FOOTER
     ============================================================ */
  .page-footer {
    width: 870px;
    margin-top: 0;
    display: flex; flex-direction: column;
    gap: 22px;
  }
  .page-footer .conf {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }
  .page-footer .legal {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-xs); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }
  .page-footer .legal p { margin: 0 0 14px; }
  .page-footer .legal p:last-child { margin: 0; }

  /* ============================================================
     FAQ accordion / How-it-works accordion
     ============================================================ */
  .accordion-row {
    width: 870px;
    padding: var(--space-16) var(--space-4);
    cursor: pointer;
    user-select: none;
  }
  .accordion-head {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-primary);
  }
  .accordion-head .chev { color: var(--text-secondary); transition: transform 0.18s; }
  .accordion-row.open .accordion-head .chev { transform: rotate(180deg); }
  .accordion-body {
    margin-top: 12px;
    padding-bottom: 24px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
  }

  /* ============================================================
     TABS (Pricing) — grouped pill toggle
     ============================================================ */
  .tabs {
    display: inline-flex;
    align-items: stretch;
    background: var(--bg-glass);
    border-radius: var(--radius-m);
    padding: 4px;
    gap: 4px;
  }
  .tabs button {
    height: 34px;
    border: 1px solid transparent;
    background: transparent;
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-sm);
    line-height: 1;
    color: var(--text-secondary);
    border-radius: 8px;
    cursor: pointer;
    padding: 0 16px;
    transition: background 0.12s, color 0.12s;
  }
  .tabs button:hover { color: var(--text-primary); }
  .tabs button.active {
    background: var(--bg-white);
    color: var(--text-primary);
    border-color: var(--border-subtle);
    box-shadow: 0 1px 2px 0 rgba(10,13,18,0.05);
  }
  body.dark .tabs button.active {
    background: var(--bg-canvas);
    border-color: var(--border-subtle);
  }

  /* Pricing fee tier card uses .kpi-tile with screenshot */
  .fee-tier-circle {
    width: 163px; height: 172px;
    flex-shrink: 0;
    position: relative;
  }
  .fee-tier-circle img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  /* ============================================================
     STRUCTURE PAGE — corporate diagram
     ============================================================ */
  .struct-diagram {
    background: var(--bg-canvas);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-m);
    padding: 24px;
  }

  table.legal-table {
    width: 870px;
    border-collapse: collapse;
    font-size: var(--fs-sm);
  }
  table.legal-table th {
    text-align: left;
    padding: 12px 12px 16px;
    font-weight: 500;
    color: var(--text-secondary);
    font-size: 11px;
    border-bottom: 1px solid var(--border-strong);
  }
  table.legal-table td {
    padding: 28px 12px;
    vertical-align: top;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  /* Only the row-level border, not per-cell — keeps a single light divider per row */
  table.legal-table tbody tr { border-bottom: 1px solid var(--border-subtle); }
  table.legal-table tbody tr:last-child { border-bottom: none; }
  table.legal-table td.label-cell { color: var(--text-primary); font-weight: 500; }

  /* Identification table (How it works · Identification body) */
  table.id-table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--fs-sm);
  }
  table.id-table td {
    padding: 12px 8px 12px 0;
    vertical-align: top;
    border-bottom: 1px solid var(--border-subtle);
  }
  table.id-table td:first-child {
    color: var(--text-primary); font-weight: 500;
    width: 200px;
  }
  table.id-table td:last-child {
    color: var(--text-secondary); line-height: 1.6;
  }

  /* Glossary CTA (How it works) */
  .glossary-cta {
    background: var(--text-primary);
    color: #fff;
    padding: 14px 18px;
    border-radius: var(--radius-m);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    cursor: pointer;
    width: 870px;
  }

  /* CTA card dark (Create a fund) — uses header-4 image as background */
  .cta-dark {
    background-image: url('./assets/header-4.png');
    background-size: cover;
    background-position: center;
    background-color: #1a1c20;
    border-radius: var(--radius-m);
    padding: 48px 48px;
    display: flex; justify-content: space-between; align-items: center;
    color: #fff;
    width: 870px;
    height: 200px;
    overflow: hidden;
  }
  .cta-dark .title {
    font-family: 'Serrif Condensed', Georgia, serif;
    font-weight: 300;
    font-size: var(--fs-6xl);
    color: #fff;
    line-height: 1;
  }
  .cta-dark .pill-btn {
    background: #fff;
    color: var(--text-primary);
    padding: 8px 14px;
    height: 34px;
    font-size: 13px;
  }

  /* Download buttons row */
  .download-row {
    display: flex;
    gap: 12px;
    margin: 24px 0;
  }
  .download-btn {
    display: inline-flex; gap: 8px;
    align-items: center;
    padding: 8px 14px; height: 34px;
    background: var(--text-primary);
    color: var(--bg-canvas);
    border: none;
    border-radius: var(--radius-m);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
  }
  .download-btn .download-icon { width: 16px; height: 16px; color: currentColor; }
  .download-btn.outline {
    background: var(--bg-canvas);
    color: var(--text-primary);
    border: 1px solid var(--border-strong);
  }

  section { scroll-margin-top: 80px; }

  /* ============================================================
     DOWNLOAD CARD (Term sheet)
     ============================================================ */
  .download-card {
    width: 870px;
    background: var(--bg-glass);
    border-radius: var(--radius-m);
    padding: var(--space-16) var(--space-24);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
    transition: background 0.12s;
  }
  .download-card:hover { background: rgba(0,0,0,0.06); }
  .download-card-left { display: flex; align-items: center; gap: var(--space-16); }
  .download-card-text { display: flex; flex-direction: column; gap: var(--space-4); }
  .download-card-title {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-lg); line-height: var(--lh-normal);
    color: var(--text-primary);
  }
  .download-card-meta {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }
  .download-icon {
    width: 24px; height: 24px;
    color: var(--text-primary);
    flex-shrink: 0;
  }

  /* File-type doc icon — uses provided SVGs */
  .doc-icon {
    width: 40px; height: 40px;
    flex-shrink: 0;
    display: block;
  }

  /* ============================================================
     RIGHT-SIDE PAGE ANCHORS (TOC)
     ============================================================ */
  .page-anchors {
    position: fixed;
    right: max(32px, calc(50% - 864px + 32px));
    top: 112px;
    width: 200px;
    z-index: 4;
    display: flex; flex-direction: column;
    gap: 2px;
    padding: 0 0 16px 16px;
    border-left: 1px solid var(--border-subtle);
  }
  .page-anchors a {
    display: block;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    line-height: 18px;
    color: var(--text-secondary);
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .page-anchors a:hover { background: var(--bg-glass); color: var(--text-primary); }
  .page-anchors a.active { background: var(--bg-glass); color: var(--text-primary); }

  /* Anchor list hides below 1500px (per Figma 13" breakpoint — no anchors
     shown at 1440-wide). The sidebar handles primary nav at smaller sizes. */
  @media (max-width: 1499px) {
    .page-anchors { display: none; }
  }

  /* ============================================================
     THEME TOGGLE
     ============================================================ */
  .theme-toggle {
    position: fixed;
    top: 24px; right: max(32px, calc(50% - 864px + 32px));
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: var(--bg-canvas);
    cursor: pointer;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-primary);
    flex-shrink: 0;
    overflow: hidden;
    z-index: 6;
    transform: rotate(0deg);
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .theme-toggle::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 50%; bottom: 0;
    background: var(--text-primary);
  }
  body.dark .theme-toggle {
    transform: rotate(180deg);
  }

  /* Dark mode */
  body.dark {
    --bg-canvas: #171717;
    --bg-white: #171717;
    --bg-glass: rgba(255,255,255,0.06);
    --bg-surface: #1f1f1f;
    --text-primary: #F4F5F4;
    --text-secondary: #9DA0A4;
    --text-muted: #6B6F76;
    --text-inverse: #171717;
    --border-subtle: #2A2D33;
    --border-default: #2A2D33;
    --border-strong: #3A3D45;
  }
  body.dark .theme-toggle::before {
    right: 0; left: 50%;
  }
  body.dark .download-card,
  body.dark .cta-card,
  body.dark .cta-card-wide {
    background-color: var(--bg-glass);
  }
  body.dark .pill-btn { background: var(--bg-glass); color: var(--text-primary); }
  body.dark .download-card:hover,
  body.dark .cta-card:hover,
  body.dark .pill-btn:hover { background: rgba(255,255,255,0.10); }
  body.dark .cta-card-wide:hover { background-color: rgba(255,255,255,0.10); filter: brightness(1.04); }
  body.dark .glossary-cta { background: var(--bg-white); color: var(--text-primary); border: 1px solid var(--border-subtle); }
  body.dark .cta-dark .pill-btn { background: var(--text-primary); color: var(--bg-canvas); }

  /* Glossary table (Term sheet) */
  .glossary {
    width: 870px;
    display: flex; flex-direction: column;
  }
  .glossary-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: var(--space-32);
  }
  .glossary-header h3 {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-lg); line-height: var(--lh-normal);
    color: var(--text-primary);
    margin: 0;
  }
  .glossary-row {
    display: grid;
    grid-template-columns: 240px 1fr;
    border-bottom: 1px solid var(--border-subtle);
  }
  .glossary-row .term {
    padding: 12px 16px;
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-primary);
  }
  .glossary-row .definition {
    padding: 12px 16px;
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-primary);
  }

  /* ============================================================
     SIDE SHEET (sub-page panel)
     ============================================================ */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 60;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: auto; }

  .sheet-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 33.333vw;
    min-width: 480px;
    max-width: 100vw;
    background: var(--bg-white);
    z-index: 61;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: -24px 0 48px rgba(0,0,0,0.18);
  }
  .sheet-panel.open { transform: translateX(0); }

  .sheet-topbar {
    padding: 20px 48px;
    flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sheet-close {
    display: inline-flex; gap: 6px; align-items: center;
    padding: 6px 12px;
    background: var(--bg-glass);
    border: none; border-radius: var(--radius-m);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-xs);
    color: var(--text-primary);
  }
  .sheet-close:hover { background: rgba(0,0,0,0.08); }

  .sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 48px 100px;
  }

  /* Reuse most styles inside the sheet, but tighten widths to fit panel */
  .sheet-body .hero { width: 100%; }
  .sheet-body .lead,
  .sheet-body .callout,
  .sheet-body .page-footer { width: 100%; }
  .sheet-body .provides-grid {
    grid-template-columns: 1fr 1fr;
  }
  .sheet-body .page-footer { margin-top: 70px; }

  /* ============================================================
     LOGIN GATE
     ============================================================ */
  .login-gate {
    position: fixed; inset: 0;
    background: var(--bg-canvas);
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    overflow-y: auto;
    z-index: 200;
  }
  .login-card {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  /* Black logo + "Pilot Program" lockup at the top of the card */
  .login-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-primary);
  }
  .login-brand-logo {
    display: inline-flex;
    align-items: center;
    color: var(--text-primary);
  }
  .login-brand-logo svg {
    width: 88px;
    height: 21px;
    display: block;
    color: var(--text-primary);
  }
  .login-brand-name {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-md);
    line-height: 1;
    color: var(--text-primary);
    white-space: nowrap;
  }
  .login-form-pane {
    display: flex; flex-direction: column;
    padding: 0;
    gap: 32px;
    min-width: 0;
  }
  .login-form-pane .header {
    display: flex; flex-direction: column; gap: 16px;
  }
  .login-form-pane h1 {
    font-family: 'Serrif Condensed', Georgia, serif;
    font-weight: 300;
    font-size: 38px;
    line-height: 1.1;
    color: var(--text-primary);
    margin: 0;
  }
  .login-form-pane .desc {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
    margin: 0;
  }
  .login-form { display: flex; flex-direction: column; gap: 32px; }
  .login-fields { display: flex; flex-direction: column; gap: 16px; }
  /* Floating-label input — mirrors the FloatingField in manager-os-nav */
  .login-ff {
    position: relative;
    height: 56px;
    border: 1px solid var(--border-default, var(--border-strong));
    border-radius: var(--radius-s, 8px);
    background: var(--bg-white);
    transition: border-color 0.12s;
  }
  .login-ff.focused { border-color: var(--text-primary); }
  .login-ff label {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: var(--text-secondary);
    pointer-events: none;
    white-space: nowrap;
    transition: top 0.12s, font-size 0.12s, color 0.12s, transform 0.12s, font-weight 0.12s;
  }
  .login-ff.float label {
    top: 6px;
    transform: none;
    font-size: 11px;
    font-weight: 500;
  }
  .login-ff.focused label { color: var(--text-primary); }
  .login-ff input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    /* 16px prevents iOS Safari from auto-zooming on focus */
    font-size: 16px;
    color: var(--text-primary);
    padding: 0 14px;
    outline: none;
    box-sizing: border-box;
  }
  .login-ff.float input { padding-top: 24px; }
  .login-submit {
    width: 100%;
    height: 54px;
    background: var(--text-primary);
    color: var(--bg-white);
    border: none;
    border-radius: var(--radius-s, 8px);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 16px;
    cursor: pointer;
  }
  .login-submit:hover { opacity: 0.92; }
  .login-link {
    background: var(--bg-glass);
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-xs);
    color: var(--text-primary);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    align-self: center;
    padding: 8px 14px;
    border-radius: var(--radius-m, 12px);
    transition: background 0.12s;
  }
  body.dark .login-link { background: rgba(255,255,255,0.06); }
  .login-link:hover { background: rgba(0,0,0,0.06); }
  body.dark .login-link:hover { background: rgba(255,255,255,0.10); }
  .login-error {
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-sm);
    color: #c43a3a;
    margin-top: -8px;
  }
  .login-success {
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-sm);
    color: var(--text-primary);
    line-height: var(--lh-tight);
    padding: 16px;
    background: var(--bg-glass);
    border-radius: var(--radius-s, 8px);
  }
  /* Login → app transition */
  .login-form-pane,
  .login-brand {
    transition: transform 0.5s cubic-bezier(0.7, 0, 0.84, 0), opacity 0.4s ease-in;
  }
  .login-card.exiting .login-brand,
  .login-card.exiting .login-form-pane {
    transform: translateY(-12px);
    opacity: 0;
  }
  /* Cursor-following radial gradient (used inside .login-hero-pane) */
  .cursor-gradient { position: absolute; inset: 0; overflow: hidden; }
  .cursor-gradient-radial { position: absolute; inset: -10%; will-change: background; }

  /* Onboarding timeline carousel — horizontal scroll-snap, hidden scrollbar */
  .timeline-carousel {
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .timeline-carousel::-webkit-scrollbar { display: none; }

  /* ============================================================
     CREATE A FUND — multi-step form
     ============================================================ */
  /* Outer route layout */
  .cf-page {
    position: absolute;
    left: 466px;
    top: 112px;
    width: 870px;
    padding-bottom: 100px;
  }
  /* Step indicator rail */
  .cf-stepper {
    position: fixed;
    left: max(20px, calc(50% - 864px + 20px));
    top: 109px;
    width: 216px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 4;
  }
  .cf-step-row {
    display: flex; align-items: center; gap: 12px;
    height: 44px;
    padding: 10px 16px;
    border-radius: var(--radius-m);
    cursor: pointer;
    transition: background 0.15s;
  }
  .cf-step-row.active { background: var(--bg-surface); }
  .cf-step-row .label {
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    white-space: nowrap;
  }
  .cf-step-row.done    .label { color: var(--text-secondary); font-weight: 400; }
  .cf-step-row.active  .label { color: var(--text-primary);   font-weight: 500; }
  .cf-step-row.pending .label { color: var(--text-muted);     font-weight: 400; }
  .cf-step-circle { width: 24px; height: 24px; flex-shrink: 0; position: relative; }
  /* Topbar override on cf route */
  .cf-topbar-cta {
    position: fixed;
    top: 24px;
    /* Right edge of button = right edge of form content (frame + 1336).
       Below 1364px viewport, the page-frame clamps at margin-left:-182 so
       we track the actual gap (100vw - 1154); at wider widths, frame is
       (vw-1728)/2 from left, so right = 50% - 472. min() picks the
       correct one for each side of the breakpoint. */
    right: max(80px, min(calc(100vw - 1154px), calc(50% - 472px)));
    z-index: 5;
  }
  /* Form layout */
  .cf-title {
    font-family: 'Serrif Condensed', Georgia, serif;
    font-weight: 300;
    font-size: var(--fs-3xl);
    line-height: 1.1;
    color: var(--text-primary);
    margin: 0;
  }
  .cf-subtitle {
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
    margin: 24px 0 0 0;
  }
  .cf-row {
    display: flex; flex-direction: column; gap: 16px;
    /* No row dividers — only section headers in Step 5 carry a divider. */
  }
  .cf-row .cf-left  { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .cf-row .cf-right { width: 100%; }
  /* Step 5 retains a 2-col grid (Class designation + Sub-class on one row, etc.) */
  .cf-row.cf-grid {
    flex-direction: row; gap: 16px; align-items: flex-start;
  }
  .cf-row.cf-grid .cf-left,
  .cf-row.cf-grid .cf-right { width: auto; flex: 1 1 0; min-width: 0; }
  /* Section subhead within a step (e.g. Step 5 groups) */
  .cf-section-head {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-lg);
    line-height: 22px;
    color: var(--text-primary);
    margin: 0;
  }
  /* Divider line above each section header — except the first, which sits
     at the top of the form. */
  .cf-section-head:not(:first-child) {
    border-top: 1px solid var(--border-subtle);
    padding-top: 32px;
  }
  .cf-label {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-md);
    line-height: var(--lh-normal);
    color: var(--text-primary);
    margin: 0;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .cf-desc {
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
    margin: 0;
  }
  .cf-input, .cf-textarea, .cf-dropdown {
    width: 100%;
    box-sizing: border-box;
    background: var(--bg-canvas);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-m);
    padding: 16px;
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-md);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.12s;
  }
  .cf-input:focus, .cf-textarea:focus, .cf-dropdown:focus {
    border-color: var(--text-primary);
  }
  .cf-input { height: 54px; }
  .cf-textarea { min-height: 154px; resize: vertical; line-height: 22px; }
  .cf-input::placeholder, .cf-textarea::placeholder { color: var(--text-muted); }
  .cf-input-wrap { position: relative; }
  .cf-input-wrap .suffix {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    font-size: var(--fs-sm); color: var(--text-muted);
    pointer-events: none;
  }
  .cf-input-wrap.has-suffix .cf-input { padding-right: 36px; text-align: right; }
  .cf-input-wrap .prefix {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    font-size: var(--fs-sm); color: var(--text-muted);
    pointer-events: none;
  }
  .cf-dropdown-btn {
    width: 100%; box-sizing: border-box;
    background: var(--bg-canvas);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-m);
    padding: 16px;
    height: 54px;
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-md);
    color: var(--text-primary);
    cursor: pointer;
    text-align: left;
    display: flex; align-items: center; justify-content: space-between;
  }
  .cf-dropdown-btn.placeholder { color: var(--text-muted); }
  .cf-dropdown-menu {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--bg-canvas);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-m);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    padding: 4px;
    z-index: 20;
    max-height: 280px; overflow-y: auto;
  }
  .cf-dropdown-menu button {
    display: block; width: 100%; text-align: left;
    background: transparent; border: none;
    padding: 10px 12px; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: var(--fs-sm);
    color: var(--text-primary); cursor: pointer;
  }
  .cf-dropdown-menu button:hover { background: var(--bg-glass); }
  .cf-help-icon {
    width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    cursor: help; position: relative;
    flex-shrink: 0;
  }
  .cf-help-icon:hover { color: var(--text-secondary); }
  .cf-tooltip {
    position: absolute; bottom: calc(100% + 8px); left: -12px;
    width: 304px;
    background: var(--bg-canvas);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-m);
    padding: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    z-index: 30;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 14px;
    line-height: 20px;
    color: var(--text-secondary);
    white-space: normal;
    pointer-events: none;
    cursor: default;
  }
  body.dark .cf-tooltip { box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .cf-add-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--bg-glass);
    border: none; border-radius: var(--radius-m);
    padding: 8px;
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-sm);
    color: var(--text-primary);
    cursor: pointer;
  }
  .cf-add-btn:hover { background: rgba(0,0,0,0.06); }
  body.dark .cf-add-btn:hover { background: rgba(255,255,255,0.08); }
  /* Categories card on Step 6 */
  .cf-cats-card {
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-m);
    padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .cf-cats-card ul { margin: 0; padding-left: 21px; color: var(--text-secondary); font-size: var(--fs-sm); line-height: 1.4; }
  .cf-cats-card ul li { margin-bottom: 6px; }
  .cf-cats-card ul li:last-child { margin-bottom: 0; }
  .cf-cats-card ul li b { color: var(--text-primary); font-weight: 500; }
  /* Continue / Submit button row */
  .cf-btn-row { padding: 24px 0 120px; }
  .cf-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--text-primary); color: var(--bg-canvas);
    border: none; border-radius: var(--radius-m);
    padding: 12px 16px;
    font-family: 'Inter', sans-serif; font-weight: 500; font-size: var(--fs-md);
    cursor: pointer;
  }
  .cf-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .cf-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; color: var(--text-primary);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-m);
    padding: 12px 16px;
    font-family: 'Inter', sans-serif; font-weight: 500; font-size: var(--fs-md);
    cursor: pointer;
    margin-right: 12px;
  }
  /* Signature pad */
  .cf-sig-wrap {
    border: 1px solid var(--border-default);
    border-radius: var(--radius-m);
    background: var(--bg-canvas);
    height: 154px;
    position: relative;
    overflow: hidden;
  }
  .cf-sig-wrap canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
  .cf-sig-clear {
    position: absolute; top: 8px; right: 8px;
    background: var(--bg-glass); border: none;
    border-radius: 6px; padding: 4px 8px;
    font-size: 12px; color: var(--text-secondary);
    cursor: pointer;
  }
  .cf-sig-clear:hover { color: var(--text-primary); }
  /* Cancel modal */
  .cf-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .cf-modal {
    width: 440px; max-width: calc(100vw - 64px);
    background: var(--bg-canvas);
    border-radius: var(--radius-m);
    padding: 32px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.20);
  }
  body.dark .cf-modal { background: var(--bg-surface); }
  .cf-modal h3 {
    font-family: 'Serrif Condensed', Georgia, serif;
    font-weight: 300; font-size: 24px; line-height: 1.2;
    color: var(--text-primary);
    margin: 0 0 12px;
  }
  .cf-modal p {
    font-family: 'Inter', sans-serif; font-size: var(--fs-sm);
    color: var(--text-secondary); line-height: 18px;
    margin: 0 0 24px;
  }
  .cf-modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
  /* Submitted success view */
  .cf-success {
    text-align: center;
    padding: 80px 0;
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }
  .cf-success .check {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: #caffe8;
    display: flex; align-items: center; justify-content: center;
    color: #171717;
  }

  /* Welcome page micro-entry */
  .page-frame { animation: pageEnter 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes pageEnter {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* Bigger transition for the Create-a-fund route — fades out the prior
     view, then reveals the new one with a staggered cascade of its
     children (topbar, step rail, page) so it feels intentional. */
  .page-frame.cf-leaving {
    animation: cfPageExit 0.32s cubic-bezier(0.55, 0, 0.85, 0.5) forwards;
  }
  @keyframes cfPageExit {
    from { opacity: 1; transform: translateY(0)    scale(1); }
    to   { opacity: 0; transform: translateY(-8px) scale(0.99); }
  }
  @keyframes cfPageEnter {
    from { opacity: 0; transform: translateY(14px) scale(0.99); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  /* Stagger Create-a-fund chrome on mount. `backwards` keeps the from-state
     applied during the delay so nothing flashes before its turn. */
  .page-frame.cf-entering .brand           { animation: cfPageEnter 0.55s 0.05s cubic-bezier(0.22, 1, 0.36, 1) backwards; }
  .page-frame.cf-entering .cf-topbar-cta   { animation: cfPageEnter 0.55s 0.10s cubic-bezier(0.22, 1, 0.36, 1) backwards; }
  .page-frame.cf-entering .cf-stepper      { animation: cfPageEnter 0.55s 0.18s cubic-bezier(0.22, 1, 0.36, 1) backwards; }
  .page-frame.cf-entering .cf-page         { animation: cfPageEnter 0.55s 0.24s cubic-bezier(0.22, 1, 0.36, 1) backwards; }
  /* Same cascade applied when leaving Create-a-fund back to the rest of the app. */
  .page-frame.cf-entering > *:not(.brand):not(.cf-topbar-cta):not(.cf-stepper):not(.cf-page) {
    animation: cfPageEnter 0.55s 0.05s cubic-bezier(0.22, 1, 0.36, 1) backwards;
  }

  /* Mobile-only chrome — hidden by default on desktop, shown inside the
     ≤1023px media query below. Render unconditionally in JSX, gate
     visibility via CSS so the same render path works at all viewports. */
  .mob-menu-button,
  .mob-top-title,
  .cf-mob-footer,
  .cf-cancel-mob { display: none; }

  /* ============================================================
     MOBILE (≤ 1023px) — Phase 1 foundation
     Flatten the centered fixed-width frame into a fluid single column,
     hide the desktop sidebar/anchors/topbar-cta, swap in a compact
     topbar + a sticky bottom menu pill that opens an action sheet.
     ============================================================ */
  @media (max-width: 1023px) {
    /* Frame goes fluid */
    .page-frame {
      width: 100%;
      margin: 0;
      animation: none; /* page-frame entry animation looks heavy on small screens */
    }
    /* Floating navbar — inset from edges with a card-style background */
    .topbar-bg {
      top: 12px;
      left: 12px;
      right: 12px;
      height: 56px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      z-index: 70;
    }
    body.dark .topbar-bg { box-shadow: 0 6px 20px rgba(0,0,0,0.35); }
    /* Keep brand / title / menu button above the sub-page sheet overlay */
    .brand, .mob-top-title, .mob-menu-button { z-index: 71; }

    /* Hide desktop chrome */
    .sidebar { display: none; }
    .page-anchors { display: none; }
    .topbar-cta { display: none; }

    /* Compact topbar — brand sits inside the floating bar */
    .brand {
      left: 28px;
      top: 24px;
      gap: 10px;
    }
    .brand-logo { height: 32px; padding: 0; }
    .brand-logo img, .brand-logo svg { width: 64px; height: auto; }
    .brand-name { font-size: var(--fs-sm); }
    .theme-toggle { right: 16px; top: 20px; }

    /* Prevent any rogue horizontal overflow at the page level */
    html, body { overflow-x: hidden; }

    /* Content area — fluid, flows after fixed topbar */
    .content {
      position: static;
      left: auto; top: auto;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      padding: 88px 24px 48px;
      gap: 56px;
    }
    .content > .hero + * { margin-top: 0 !important; }
    /* Safety: any direct child of content should respect its container */
    .content > * { max-width: 100%; box-sizing: border-box; min-width: 0; }

    /* All 870-wide blocks become fluid */
    .hero, .page-footer, .cta-card-wide, .glossary,
    .cta-card, .download-card, .cta-dark, .glossary-cta,
    .accordion-row, .struct-diagram, .cf-page, .lead {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    .hero { height: 160px; }
    .hero h1 { font-size: 38px; line-height: 1.05; }
    /* Dark CTA — tighten padding so contents stay inside */
    .cta-dark { padding: 24px; height: auto; min-height: 160px; gap: 16px; flex-wrap: wrap; }
    .cta-dark .title { font-size: 36px; }
    /* Glossary CTA — allow wrap on narrow screens */
    .glossary-cta { flex-wrap: wrap; gap: 8px; }

    /* Section titles + heading sizes scale down slightly */
    .section-title { font-size: 22px; }

    /* Theme toggle hidden on mobile — lives inside the menu sheet instead. */
    .theme-toggle { display: none !important; }

    /* Mobile top bar — POD logo on the left collapses to logo-only on scroll,
       page title fades into the centre, hamburger sits at the right. */
    .brand-name {
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    body.scrolled .brand-name {
      opacity: 0;
      transform: translateX(-4px);
      pointer-events: none;
    }

    .mob-top-title {
      position: fixed;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      height: 56px;
      display: flex; align-items: center;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: var(--fs-md);
      line-height: 1;
      color: var(--text-primary);
      z-index: 71;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100vw - 200px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    body.scrolled .mob-top-title { opacity: 1; }

    /* Hamburger button — sits inside the floating bar, top-right. */
    .mob-menu-button {
      position: fixed;
      top: 20px;
      right: 24px;
      left: auto;
      bottom: auto;
      width: 40px;
      height: 40px;
      padding: 0;
      background: transparent;
      color: var(--text-primary);
      border: none;
      border-radius: var(--radius-m);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 71;
      box-shadow: none;
    }
    .mob-menu-button:active { background: var(--bg-glass); }
    .mob-menu-button .chev {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
      color: var(--text-primary);
    }
    /* Hide the label inside — only the hamburger icon is shown */
    .mob-menu-button > span:first-child { display: none; }

    /* Bottom sheet (used by nav + sub-pages + step indicator later) */
    .mob-sheet-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.32s ease;
    }
    .mob-sheet-backdrop.open { opacity: 1; pointer-events: auto; }

    .mob-sheet {
      position: fixed;
      left: 0; right: 0; top: 0;
      max-height: 92dvh;
      background: var(--bg-surface);
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      transform: translateY(-100%);
      transition: transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
      z-index: 101;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: max(8px, env(safe-area-inset-top)) 0 max(32px, calc(env(safe-area-inset-bottom) + 24px));
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .mob-sheet.open { transform: translateY(0); }
    .mob-sheet-handle {
      width: 40px; height: 4px;
      background: var(--border-strong);
      border-radius: 999px;
      margin: 14px auto 10px;
    }
    .mob-sheet-content { padding: 4px 20px 8px; }

    /* Sheet nav items */
    .mob-nav-section {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: var(--fs-xs);
      color: var(--text-secondary);
      padding: 14px 12px 6px;
    }
    .mob-nav-row {
      display: flex; align-items: center;
      padding: 14px 12px;
      border-radius: var(--radius-m);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: var(--fs-md);
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      min-height: 44px;
      box-sizing: border-box;
    }
    .mob-nav-row.active { background: var(--bg-glass); }
    .mob-nav-row:active { background: var(--bg-glass); }
    .mob-nav-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 12px 12px;
    }

    /* Cancel button at the bottom of sheets */
    .mob-sheet-cancel {
      width: 100%;
      background: var(--bg-glass);
      border: none;
      border-radius: var(--radius-m);
      padding: 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: var(--fs-md);
      color: var(--text-primary);
      cursor: pointer;
      margin-top: 12px;
    }

    /* ============================================================
       PAGE-LEVEL ADAPTATIONS (Phase 2)
       ============================================================ */

    /* Welcome — collapse multi-column rows */
    .provides-grid { grid-template-columns: 1fr; gap: 12px; }
    .pilot-row, .rel-row {
      flex-direction: column;
      gap: 32px;
      align-items: stretch;
    }
    .pilot-col, .rel-kpi { width: 100%; }

    /* Term sheet — stack term above definition */
    .glossary-row {
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 16px 0;
    }
    .glossary-row .term {
      font-size: var(--fs-md);
      font-weight: 500;
      color: var(--text-primary);
    }
    .glossary-header { margin-bottom: 16px; }
    .download-card { padding: var(--space-16); }

    /* Structure — collapse 3-col legal tables into stacked rows */
    table.legal-table { display: block; width: 100%; }
    table.legal-table thead { display: none; }
    table.legal-table tbody { display: block; width: 100%; }
    table.legal-table tr {
      display: block;
      width: 100%;
      padding: 28px 0;
      border-bottom: 1px solid var(--border-subtle);
      box-sizing: border-box;
    }
    table.legal-table tr:last-child { border-bottom: none; }
    table.legal-table td {
      display: block;
      width: 100%;
      padding: 4px 0;
      border: none;
      font-size: var(--fs-sm);
      line-height: var(--lh-tight);
      box-sizing: border-box;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    table.legal-table td.label-cell {
      font-size: var(--fs-md);
      font-weight: 500;
      color: var(--text-primary);
      padding-bottom: 8px;
    }
    /* Identification table (How it works) — stack label above value */
    table.id-table { display: block; width: 100%; }
    table.id-table tbody { display: block; width: 100%; }
    table.id-table tr {
      display: block;
      width: 100%;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
      box-sizing: border-box;
    }
    table.id-table tr:last-child { border-bottom: none; }
    table.id-table td {
      display: block;
      width: 100% !important;
      padding: 2px 0;
      box-sizing: border-box;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    table.id-table td:first-child {
      font-size: var(--fs-md);
      padding-bottom: 6px;
    }
    /* Structure diagram — render at larger size with horizontal scroll
       so users can pan to see detail (was forced to 100% which hid labels). */
    .struct-diagram-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -24px;
      padding: 0 24px 8px;
    }
    .content img[alt="Corporate structure diagram"] {
      width: 870px !important;
      max-width: none !important;
      height: auto !important;
    }
    .struct-diagram { padding: 16px; overflow-x: auto; }
    .struct-diagram svg, .struct-diagram img { max-width: 100%; height: auto; }

    /* Pricing — fee tier grid and calculator inputs stack */
    .pr-tier-grid { grid-template-columns: 1fr !important; }
    .pr-input-row { flex-direction: column !important; gap: 16px !important; }
    .pr-kpi-row { flex-direction: column !important; gap: 12px !important; }

    /* Timeline — break 2-col into stacked block */
    .tl-section { flex-direction: column !important; gap: 16px !important; }
    .tl-left { width: 100% !important; min-height: 0 !important; }
    .tl-left .tl-track { display: none; }
    .tl-right { padding-right: 0 !important; }

    /* Accordion bodies (FAQ + How it works) — more breathing room between
       rows, tap target the whole row. */
    .accordion-row { padding: 20px 0; }
    .accordion-head { min-height: 44px; }
    .accordion-row + .accordion-row { border-top: 1px solid var(--border-subtle); }

    /* Fee calculator card — tighten internal padding for mobile */
    .pr-calc-card { padding: 20px !important; gap: 28px !important; }

    /* Callout boxes (.callout) keep their style, just lose any fixed width */
    .callout { width: 100%; box-sizing: border-box; }

    /* Bottom-anchored variant of the mobile sheet — used for the
       create-fund step indicator (tap-to-expand). */
    .mob-sheet.from-bottom {
      top: auto;
      bottom: 0;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      transform: translateY(100%);
      box-shadow: 0 -8px 24px rgba(0,0,0,0.12);
      padding: 8px 0 max(16px, env(safe-area-inset-bottom));
    }
    .mob-sheet.from-bottom.open { transform: translateY(0); }
    .mob-sheet.from-bottom .mob-sheet-handle {
      margin: 6px auto 12px;
    }

    /* ============================================================
       CREATE A FUND — mobile chrome (Phase 4)
       ============================================================ */
    /* Hide desktop chrome on the create-fund route */
    .cf-stepper { display: none; }
    .cf-topbar-cta { display: none; }

    /* Form area becomes fluid; bottom padding leaves room for the
       sticky footer (step pill 56 + button row 64 + 24 buffer). */
    .cf-page {
      position: static;
      left: auto; top: auto;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      padding: 88px 24px 140px;
    }
    /* Hide the inline button row — we render a sticky footer instead. */
    .cf-btn-row { display: none !important; }

    /* Title + subtitle scale */
    .cf-title { font-size: 28px; }
    .cf-subtitle { margin-top: 16px; }

    /* Step 5 grid — collapse to single column */
    .cf-row.cf-grid { flex-direction: column; }
    .cf-row.cf-grid .cf-left,
    .cf-row.cf-grid .cf-right { width: 100%; flex: none; }

    /* Tooltip — keep within viewport */
    .cf-tooltip { max-width: calc(100vw - 40px); }

    /* Modal — full-width with side margins */
    .cf-modal { width: calc(100vw - 32px); padding: 24px; }

    /* Signature pad — taller for touch input */
    .cf-sig-wrap { height: 180px; }

    /* Cancel pill in the floating navbar (replaces .cf-topbar-cta) */
    .cf-cancel-mob {
      position: fixed;
      top: 20px;
      right: 24px;
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--text-primary);
      border: none;
      border-radius: var(--radius-m);
      z-index: 71;
      cursor: pointer;
    }
    .cf-cancel-mob:active { background: var(--bg-glass); }

    /* Backdrop shown when the sticky footer is expanded to its step list.
       Always mounted; opacity toggled via class so it fades both in AND out. */
    .cf-mob-footer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 49;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }
    .cf-mob-footer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* Sticky footer: step pill (tap to expand inline) + Back/Continue */
    .cf-mob-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-canvas);
      border-top: 1px solid var(--border-subtle);
      padding: 8px 16px max(12px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 50;
      box-shadow: 0 -6px 16px rgba(0,0,0,0.06);
    }
    body.dark .cf-mob-footer { box-shadow: 0 -6px 16px rgba(0,0,0,0.30); }

    /* Step rail — always renders the full step list; non-active rows
       collapse smoothly to zero height when the footer is collapsed and
       expand on toggle. Uses grid-template-rows 0fr → 1fr trick. */
    .cf-mob-step-rail {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      user-select: none;
    }
    .cf-mob-step-rail:focus { outline: none; }
    .cf-mob-step-wrap {
      max-height: 80px;
      overflow: hidden;
      margin-bottom: 2px;
      opacity: 1;
      transition:
        max-height 0.32s cubic-bezier(0.22, 1, 0.36, 1),
        margin-bottom 0.32s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.22s ease;
    }
    .cf-mob-step-wrap:last-child { margin-bottom: 0; }
    .cf-mob-step-wrap > .cf-step-row {
      height: auto;
      padding: 14px 16px;
      gap: 12px;
    }
    /* Collapsed: only the active wrap shows; others shrink to 0. */
    .cf-mob-footer:not(.expanded) .cf-mob-step-wrap:not(.active) {
      max-height: 0;
      margin-bottom: 0;
      opacity: 0;
      pointer-events: none;
    }
    .cf-mob-footer.expanded .cf-mob-step-rail { max-height: 60vh; overflow-y: auto; }

    .cf-mob-actions {
      display: flex;
      gap: 8px;
    }
    .cf-mob-actions .cf-primary {
      flex: 1;
      justify-content: center;
      height: 52px;
      padding: 0 16px;
      margin: 0;
    }
    .cf-mob-actions .cf-secondary {
      flex: 0 0 52px;
      width: 52px;
      height: 52px;
      padding: 0;
      margin: 0;
      justify-content: center;
      align-items: center;
    }
    /* Hide the "Back" label so it's icon-only — keeps the row compact and
       lets Continue stay full-width per the design. */
    .cf-mob-actions .cf-secondary > :not(svg) { display: none; }

    /* ============================================================
       SUB-PAGE SHEET — partial bottom sheet on mobile (Phase 3)
       Slides up from the bottom, sits ~80px from the top with a small
       peek of the underlying page visible above. Drag handle at the top,
       close button stays in the topbar.
       ============================================================ */
    .sheet-panel {
      top: 80px;
      right: 0;
      bottom: 0;
      left: 0;
      width: 100%;
      min-width: 0;
      max-width: 100%;
      transform: translateY(100%);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.18);
    }
    .sheet-panel.open { transform: translateY(0); }
    .sheet-panel::before {
      content: '';
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      width: 40px; height: 4px;
      border-radius: 999px;
      background: var(--border-strong);
      pointer-events: none;
    }
    .sheet-topbar {
      padding: 20px 20px 8px;
    }
    .sheet-body {
      padding: 0 20px 48px;
    }
    .sheet-body .provides-grid { grid-template-columns: 1fr; }
    .sheet-body .page-footer { margin-top: 40px; }
  }
</style>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* =============================================================
   ASSET MAP — pre-composited 785x200 hero banners + flower icons
   ============================================================= */
const HEADER = {
  welcome:           { img: 'header-2.png' }, // blue/pink

/* =============================================================

   ============================================================= */
function PageAnchors({ items }) {
  const [active, setActive] = useState(items[0]?.id);
  React.useEffect(() => {
    const onScroll = () => {
      // Find the section whose top is closest to (but above) the viewport top + 120px
      let current = items[0]?.id;
      for (const it of items) {
        const el = document.getElementById(it.id);
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (r.top <= 140) current = it.id;
      }
      setActive(current);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [items]);

  if (!items || !items.length) return null;
  return (
    <nav className="page-anchors">
      {items.map(it => (
        <a key={it.id} href={'#' + it.id}
           className={active === it.id ? 'active' : ''}
           onClick={(e)=>{e.preventDefault(); const el=document.getElementById(it.id); if(el) el.scrollIntoView({behavior:'smooth', block:'start'});}}>
          {it.label}
        </a>
      ))}
    </nav>
  );
}

function SubPageSheet({ page, onClose }) {
  // ESC closes
  React.useEffect(() => {
    if (!page) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    window.addEventListener('keydown', onKey);
    return () => {
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      window.removeEventListener('keydown', onKey);
    };
  }, [page, onClose]);

  const open = !!page;
  return ReactDOM.createPortal(
    <React.Fragment>
      <div className={'sheet-overlay' + (open ? ' open' : '')} onClick={onClose}/>
      <aside className={'sheet-panel' + (open ? ' open' : '')} role="dialog" aria-label={page ? SUB_PAGES[page]?.title : ''}>
        <div className="sheet-topbar">
          <button className="sheet-close" onClick={onClose}>
            <ArrowIcon direction="left"/> Close
          </button>
        </div>
        <div className="sheet-body">
          {open && <ProvidesContent page={page}/>}
        </div>
      </aside>
    </React.Fragment>,
    document.body
  );
}

  { label: 'Scaling',       range: '$25–75M',  min: 25, max: 75,   rate: 0.15, slug: 'scale',         desc: "A further reduction across mid-market AUM as you approach institutional scale." },
  { label: 'Institutional', range: '$75M+',    min: 75, max: 1e12, rate: 0.10, slug: 'institutional', desc: "POD's lowest take rate, applied as you reach institutional scale." },
];

function calcTierSlices(aum) {
  const res = []; let rem = aum, prev = 0;
  for (let i = 0; i < PRICING_TIERS.length; i++) {
    const slice = Math.min(Math.max(PRICING_TIERS[i].max - prev, 0), rem);
    res.push(slice);
    rem -= slice; prev = PRICING_TIERS[i].max;
    if (rem <= 0) break;
  }
  while (res.length < PRICING_TIERS.length) res.push(0);
  return res;
}
function currentTier(aum) {
  // Return the highest tier in which any of the AUM falls (matches where fees actually accrue).
  // At a boundary (e.g. AUM = $10M), all fees sit in the lower tier's slice — so we return that tier.
  const slices = calcTierSlices(aum);
  for (let i = slices.length - 1; i >= 0; i--) {
    if (slices[i] > 0) return PRICING_TIERS[i];
  }
  return PRICING_TIERS[0];
}

function FeeCalculator() {
  const [aumStr, setAumStr] = useState('10');
  const [retStr, setRetStr] = useState('20');
  const [mgmtStr, setMgmtStr] = useState('2');
  const [perfStr, setPerfStr] = useState('20');
  const [ciStr, setCiStr]    = useState('0');

  const aum = Math.max(parseFloat(aumStr) || 0, 0);
  const ret = Math.max(parseFloat(retStr) || 0, 0);
  const mgmt = Math.max(parseFloat(mgmtStr) || 0, 0);
  const perf = Math.max(parseFloat(perfStr) || 0, 0);
  const ci = Math.min(Math.max(parseFloat(ciStr) || 0, 0), aum);

  const aumV = aum * 1e6;
  const ciV = ci * 1e6;
  const mgmtInc = aumV * (mgmt / 100);
  const netRet  = Math.max(ret - mgmt, 0);
  const perfInc = aumV * (netRet / 100) * (perf / 100);
  const total   = mgmtInc + perfInc;

  const tierAmts = calcTierSlices(aum);
  let podBaseTotal = 0;
  const podFeePerTier = [];
  for (let i = 0; i < PRICING_TIERS.length; i++) {
    const feesInSlice = aum > 0 && tierAmts[i] > 0 ? total * (tierAmts[i] / aum) : 0;
    const fee = feesInSlice * PRICING_TIERS[i].rate;
    podFeePerTier.push(fee);
    podBaseTotal += fee;
  }
  const blendedBase = total > 0 ? podBaseTotal / total : 0;
  const ciFrac = aum > 0 ? ciV / aumV : 0;
  const podCI = total * ciFrac * 0.20;
  const podTotal = podBaseTotal + podCI;
  const keeps = Math.max(total - podTotal, 0);
  const keepPct = total > 0 ? (keeps / total) * 100 : 0;

  const blendedTotal = total > 0 ? (podBaseTotal + podCI) / total : 0;
  const feesAttributable = total * ciFrac;
  const fmtTierRange = (t) => t.max >= 1e10 ? `$${t.min}m+` : `$${t.min} – ${t.max}m`;
  const fmtAum = (m) => `$${m.toFixed(1)}m`;

  // Bar segments

    { k: 'keep', v: keeps,        c: '#45d59b', l: 'Your net fee income' },
    { k: 'base', v: podBaseTotal, c: '#0E0F12', l: 'POD base take' },
    { k: 'ci',   v: podCI,        c: '#82858B', l: 'POD cap intro take' },
  ].filter(s => s.v > 0);
  const segTotal = segs.reduce((a, s) => a + s.v, 0);

  return (
    <div className="pr-calc-card" style={{

    ]},
  ];

  const [currentSection, setCurrentSection] = useState(0);
  const [progress, setProgress] = useState(() => SECTIONS.map(() => 0));
  const sectionsRef = useRef(null);

  // Track active section + per-section line progress, both driven off the
  // 50%-viewport trigger Y. As that line passes through each section's
  // vertical line, the fill grows from 0 to 100%.
  useEffect(() => {
    const root = sectionsRef.current;
    if (!root) return;
    const update = () => {
      const triggerY = window.innerHeight * 0.5;
      // Active section: section of LAST card whose top has crossed triggerY
      const cardEls = root.querySelectorAll('[data-card]');
      let active = 0;
      cardEls.forEach(el => {
        if (el.getBoundingClientRect().top <= triggerY) {
          active = parseInt(el.getAttribute('data-section'), 10);
        }
      });
      setCurrentSection(active);
      // Per-line fill ratio
      const lineEls = root.querySelectorAll('[data-line]');
      const next = SECTIONS.map(() => 0);
      lineEls.forEach((el) => {
        const idx = parseInt(el.getAttribute('data-line'), 10);
        const rect = el.getBoundingClientRect();
        if (rect.height === 0) { next[idx] = 0; return; }
        if (triggerY <= rect.top) next[idx] = 0;
        else if (triggerY >= rect.bottom) next[idx] = 1;
        else next[idx] = (triggerY - rect.top) / rect.height;
      });
      setProgress(next);
    };
    update();
    window.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
    return () => {
      window.removeEventListener('scroll', update);
      window.removeEventListener('resize', update);
    };
  }, []);

  return (

                  <div className="tl-track" data-line={sIdx} style={{

// Field-completion ratio per step. Used by stepper progress arc.
function cfStepProgress(stepIdx, form) {
  const step = CF_STEPS[stepIdx];
  if (!step) return 0;
  let filled = 0, total = 0;
  step.fields.forEach(f => {
    if (f === 'keyPersons') {
      total += 1;
      if ((form.keyPersons || []).some(p => p && p.trim())) filled += 1;
    } else if (f === 'risks') {
      total += 1;
      if ((form.risks || []).some(r => r && (r.title || '').trim())) filled += 1;
    } else {
      total += 1;
      if ((form[f] || '').toString().trim()) filled += 1;
    }
  });
  return total === 0 ? 1 : filled / total;
}

function CFSignaturePad({ value, onChange }) {
  const canvasRef = useRef(null);
  const drawingRef = useRef(false);
  const lastRef = useRef({ x: 0, y: 0 });
  const lastMidRef = useRef({ x: 0, y: 0 });

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    // Match canvas pixel size to DOM size for crisp lines.
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 2;
    ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--text-primary').trim() || '#171717';
    if (value) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
      img.src = value;
    }
  }, []);

  const pos = (e) => {
    const r = canvasRef.current.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  };
  const start = (e) => {
    e.preventDefault();
    drawingRef.current = true;
    const p = pos(e);
    lastRef.current = p;
    lastMidRef.current = p;
    // Draw a tiny dot at the start point so single taps register.
    const ctx = canvasRef.current.getContext('2d');
    ctx.beginPath();
    ctx.arc(p.x, p.y, ctx.lineWidth / 2, 0, Math.PI * 2);
    ctx.fillStyle = ctx.strokeStyle;
    ctx.fill();
  };
  const move = (e) => {
    if (!drawingRef.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext('2d');
    const p = pos(e);
    // Quadratic-midpoint smoothing: draw a curve from the previous midpoint
    // to the new midpoint, with the actual previous point as the control.
    // This rounds the corner at every sample, masking the polyline jitter.
    const mid = { x: (lastRef.current.x + p.x) / 2, y: (lastRef.current.y + p.y) / 2 };
    ctx.beginPath();
    ctx.moveTo(lastMidRef.current.x, lastMidRef.current.y);
    ctx.quadraticCurveTo(lastRef.current.x, lastRef.current.y, mid.x, mid.y);
    ctx.stroke();
    lastMidRef.current = mid;
    lastRef.current = p;
  };
  const end = () => {
    if (!drawingRef.current) return;
    drawingRef.current = false;
    // Finish the stroke with a final segment to the actual last point so the
    // visible line ends where the cursor actually stopped (otherwise the
    // last midpoint trailed slightly behind the cursor).
    const ctx = canvasRef.current.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(lastMidRef.current.x, lastMidRef.current.y);
    ctx.lineTo(lastRef.current.x, lastRef.current.y);
    ctx.stroke();
    onChange(canvasRef.current.toDataURL('image/png'));
  };
  const clear = () => {
    const c = canvasRef.current;
    c.getContext('2d').clearRect(0, 0, c.width, c.height);
    onChange('');
  };

  return (
    <div className="cf-sig-wrap">
      <canvas
        ref={canvasRef}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}
      />
      <button type="button" className="cf-sig-clear" onClick={clear}>Clear</button>
    </div>
  );
}
