<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>POD · Pilot Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<style>
  /* ============================================================
     Serrif Condensed Light — provided by user, in /assets/
     ============================================================ */
  @font-face {
    font-family: 'Serrif Condensed';
    src: url('./fonts/SerrifCondensed-Light.woff2') format('woff2'),
         url('./fonts/SerrifCondensed-Light.woff') format('woff');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }

  /* ============================================================
     Design tokens — extracted from Figma file
     ============================================================ */
  :root {
    /* Backgrounds */
    --bg-canvas: #fefeff;
    --bg-white: #ffffff;
    --bg-glass: rgba(0,0,0,0.03);
    --bg-surface: #f8f8f8;

    /* Text */
    --text-primary: #171717;
    --text-secondary: #737373;
    --text-inverse: #fefeff;

    /* Borders */
    --border-subtle: #e5e5e5;
    --border-strong: #dbdbdc;

    /* Spacing */
    --space-2: 2px;
    --space-4: 4px;
    --space-7: 7px;
    --space-8: 8px;
    --space-12: 12px;
    --space-16: 16px;
    --space-24: 24px;
    --space-32: 32px;
    --space-48: 48px;

    /* Radius */
    --radius-s: 6px;
    --radius-m: 8px;
    --radius-l: 12px;

    /* Font sizes */
    --fs-xs: 12px;
    --fs-sm: 14px;
    --fs-md: 16px;
    --fs-lg: 18px;
    --fs-xl: 20px;
    --fs-3xl: 30px;
    --fs-6xl: 48px;

    /* Line heights */
    --lh-tight: 18px;
    --lh-normal: 22px;
    --lh-relaxed: 24px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-white);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    -webkit-font-smoothing: antialiased;
  }

  .serif {
    font-family: 'Serrif Condensed', Georgia, 'Times New Roman', serif;
    font-weight: 300;
  }

  /* Force a permanent vertical scrollbar gutter on html so opening a sheet
     (body overflow:hidden) doesn't disappear the scrollbar and shift viewport-anchored
     elements like the topbar/sidebar that anchor to calc(50% - 864px + X). */
  html { overflow-y: scroll; }

  /* ============================================================
     PAGE FRAME — fixed 1728 width, content at left:466
     ============================================================ */
  .page-frame {
    position: relative;
    width: 1728px;
    min-height: 100vh;
    background: var(--bg-white);
    margin: 0 auto;
    padding-bottom: 100px;
  }

  /* ============================================================
     TOP BAR — brand left, "Ready to setup..." right
     Sticky: anchored to centered 1728px frame via calc(50% - 864px + X)
     ============================================================ */
  .topbar-bg {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 88px;
    background: var(--bg-white);
    z-index: 4;
    pointer-events: none;
  }
  .brand {
    position: fixed;
    left: calc(50% - 864px + 32px);
    top: 16px;
    display: flex; gap: 16px; align-items: center;
    z-index: 5;
  }
  .brand-logo {
    height: 48px;
    display: inline-flex;
    align-items: center;
    padding: 0 8px;
    flex-shrink: 0;
    color: var(--text-primary);
  }
  .brand-logo img,
  .brand-logo svg {
    width: 110px; height: 26px; display: block;
  }
  .brand-name {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-md);
    line-height: var(--lh-normal);
    color: var(--text-primary);
    white-space: nowrap;
  }

  .topbar-cta {
    position: fixed;
    left: calc(50% - 864px + 1060px);
    top: 27px;
    display: flex; gap: 16px; align-items: center;
    justify-content: flex-end;
    z-index: 5;
  }
  .topbar-cta .label {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-primary);
    white-space: nowrap;
  }
  .pill-btn {
    display: inline-flex; gap: var(--space-8);
    align-items: center; justify-content: center;
    padding: var(--space-4) var(--space-8);
    background: var(--bg-glass);
    border: none;
    border-radius: var(--radius-m);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-xs);
    line-height: var(--lh-tight);
    color: var(--text-primary);
    text-decoration: none;
    transition: background 0.12s;
  }
  .pill-btn:hover { background: rgba(0,0,0,0.06); }
  .pill-btn .icon {
    width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .pill-btn .icon svg { width: 100%; height: 100%; display: block; }


  /* ============================================================
     SIDEBAR (NAV expandable) — sticky, aligned to centered frame
     ============================================================ */
  .sidebar {
    position: fixed;
    left: calc(50% - 864px + 32px);
    top: 112px;
    width: 220px;
    height: calc(100vh - 132px);
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: var(--space-24);
    z-index: 4;
  }
  .sb-row .sb-item.is-logout {
    display: flex; align-items: center; gap: 8px;
  }
  .sb-row .sb-item.is-logout svg {
    width: 16px; height: 16px;
    color: currentColor;
    flex-shrink: 0;
  }
  .sidebar::-webkit-scrollbar { width: 0; }
  .sb-group { display: flex; flex-direction: column; gap: 2px; width: 100%; }

  .sb-section-header {
    height: 38px;
    padding: var(--space-7) 12px;
    border-radius: var(--radius-m);
    display: flex; align-items: center;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-xs);
    line-height: var(--lh-tight);
    color: var(--text-primary);
    cursor: default;
  }

  .sb-row {
    height: 38px;
    padding-right: var(--space-4);
    width: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .sb-row .sb-item {
    flex: 1; height: 100%;
    padding: var(--space-7) 12px;
    border-radius: var(--radius-m);
    display: flex; align-items: center; gap: 0;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    line-height: var(--lh-normal);
    color: var(--text-secondary);
    cursor: pointer;
    text-decoration: none;
    user-select: none;
    transition: background 0.1s, color 0.1s;
  }
  .sb-row .sb-item:hover { background: var(--bg-glass); color: var(--text-primary); }
  .sb-row.active .sb-item { background: var(--bg-glass); color: var(--text-primary); }
  .sb-row .sb-chevron {
    width: 14px; height: 14px;
    flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
  }
  .sb-row .sb-chevron svg { width: 100%; height: 100%; }

  /* Sub items wrap: pl=24 pb=12, with border-left at 1px */
  .sb-sub-wrap { padding: 0 0 12px 24px; width: 100%; }
  .sb-sub-inner {
    display: flex; gap: 10px; align-items: stretch;
    width: 100%; padding-right: 0;
  }
  .sb-sub-border { width: 1px; background: var(--border-subtle); align-self: stretch; flex-shrink: 0; }
  .sb-sub-list { display: flex; flex-direction: column; gap: 1px; flex: 1; }
  .sb-sub-item {
    height: 30px;
    padding: var(--space-7) 10px;
    border-radius: var(--radius-s);
    display: flex; align-items: center;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
    cursor: pointer;
    text-decoration: none;
    user-select: none;
    transition: background 0.1s, color 0.1s;
  }
  .sb-sub-item:hover { background: var(--bg-glass); color: var(--text-primary); }
  .sb-sub-item.active { background: var(--bg-glass); color: var(--text-primary); }

  /* ============================================================
     CONTENT AREA — left:466 top:112 width:786
     ============================================================ */
  .content {
    position: absolute;
    left: 466px;
    top: 112px;
    width: 870px;
    display: flex; flex-direction: column;
    gap: 80px;
    padding-bottom: 100px;
  }

  /* ============================================================
     HERO BANNER — 785x200, image background + serif title overlay
     ============================================================ */
  .hero {
    width: 870px;
    height: 200px;
    border-radius: var(--radius-m);
    overflow: hidden;
    position: relative;
    background-color: #f0f0f0;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero h1 {
    font-family: 'Serrif Condensed', Georgia, 'Times New Roman', serif;
    font-weight: 300;
    font-size: var(--fs-6xl);
    line-height: 1;
    color: #fefeff;
    margin: 0;
    z-index: 2;
    text-align: center;
    letter-spacing: 0;
  }
  body.dark .hero h1 { color: #ffffff; }

  /* ============================================================
     TYPOGRAPHY
     ============================================================ */
  .lead {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-lg);
    line-height: var(--lh-normal);
    color: var(--text-primary);
    margin: 0;
    width: 810px;
  }

  .body-text {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
    margin: 0;
  }
  .body-text + .body-text { margin-top: 14px; }

  h2.section-title {
    font-family: 'Serrif Condensed', 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    font-weight: 300;
    font-size: 36px;
    line-height: 1.1;
    color: var(--text-primary);
    margin: 0 0 32px 0;
    letter-spacing: -0.005em;
  }

  h3.subsection-title {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: var(--fs-md);
    color: var(--text-primary);
    margin: 0 0 32px 0;
  }

  /* Hero → first sibling = 48px (overrides .content gap of 80px → effective 48px) */
  .content > .hero + * { margin-top: -32px; }

  /* ============================================================
     CARDS / KPI Tiles
     ============================================================ */
  .callout {
    width: 870px;
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-m);
    padding: 32px 40px;
    background: transparent;
  }
  .callout .q {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-primary);
    margin: 0 0 14px;
  }
  .callout .a {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-primary);
    margin: 0;
  }

  .cta-card {
    background: var(--bg-glass);
    border-radius: var(--radius-m);
    padding: var(--space-16) var(--space-24);
    display: flex; flex-direction: column;
    gap: var(--space-24);
    cursor: pointer;
    transition: background 0.12s;
    text-decoration: none;
  }
  .cta-card:hover { background: rgba(0,0,0,0.06); }
  .cta-card .label,
  .cta-card-wide .label {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
    margin: 0;
  }
  .cta-card-wide .label { color: #fefeff; }
  .cta-card .title,
  .cta-card-wide .title {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-xl);
    line-height: var(--lh-relaxed);
    color: var(--text-primary);
    margin: 0;
  }
  .cta-card .arrow,
  .cta-card-wide .arrow {
    width: 16px; height: 16px;
    color: var(--text-primary);
  }

  /* "What POD provides" 2-column grid filling 870px content width */
  .provides-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 17px 17px;
  }
  .provides-grid .cta-card.muted { opacity: 0.3; pointer-events: none; }

  /* Pilot role row (3 columns) */
  .pilot-row {
    display: flex; gap: var(--space-48);
    align-items: flex-start;
  }
  .pilot-col {
    width: 230px;
    display: flex; flex-direction: column;
    gap: var(--space-24);
  }
  .pilot-col .label {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }
  .pilot-col .title {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-xl); line-height: var(--lh-relaxed);
    color: var(--text-primary);
  }
  .pilot-col .desc {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-xs); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }

  /* Relationship row (3 KPIs) */
  .rel-row {
    display: flex; gap: var(--space-48);
    align-items: flex-start;
  }
  .rel-kpi {
    width: 230px;
    display: flex; flex-direction: column;
    gap: var(--space-24);
  }
  .rel-kpi .label {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }
  .rel-kpi .value {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-3xl); line-height: 1;
    color: var(--text-primary);
  }
  .rel-kpi .note {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-xs); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }

  /* "Where your SP fits" CTA card (large, bg-glass) */
  .cta-card-wide {
    width: 870px;
    background-color: var(--bg-glass);
    background-size: cover;
    background-position: center;
    border-radius: var(--radius-m);
    padding: var(--space-16) var(--space-24);
    display: flex; flex-direction: column;
    gap: var(--space-24);
    cursor: pointer;
    transition: filter 0.12s, background-color 0.12s;
    text-decoration: none;
  }
  .cta-card-wide:hover { background-color: rgba(0,0,0,0.06); filter: brightness(0.96); }

  /* ============================================================
     FOOTER
     ============================================================ */
  .page-footer {
    width: 870px;
    margin-top: 0;
    display: flex; flex-direction: column;
    gap: 22px;
  }
  .page-footer .conf {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }
  .page-footer .legal {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-xs); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }
  .page-footer .legal p { margin: 0 0 14px; }
  .page-footer .legal p:last-child { margin: 0; }

  /* ============================================================
     FAQ accordion / How-it-works accordion
     ============================================================ */
  .accordion-row {
    width: 870px;
    padding: var(--space-16) var(--space-4);
    cursor: pointer;
    user-select: none;
  }
  .accordion-head {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-primary);
  }
  .accordion-head .chev { color: var(--text-secondary); transition: transform 0.18s; }
  .accordion-row.open .accordion-head .chev { transform: rotate(180deg); }
  .accordion-body {
    margin-top: 12px;
    padding-bottom: 24px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
  }

  /* ============================================================
     TABS (Pricing) — grouped pill toggle
     ============================================================ */
  .tabs {
    display: inline-flex;
    align-items: stretch;
    background: var(--bg-glass);
    border-radius: var(--radius-m);
    padding: 4px;
    gap: 4px;
  }
  .tabs button {
    height: 34px;
    border: 1px solid transparent;
    background: transparent;
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-sm);
    line-height: 1;
    color: var(--text-secondary);
    border-radius: 8px;
    cursor: pointer;
    padding: 0 16px;
    transition: background 0.12s, color 0.12s;
  }
  .tabs button:hover { color: var(--text-primary); }
  .tabs button.active {
    background: var(--bg-white);
    color: var(--text-primary);
    border-color: var(--border-subtle);
    box-shadow: 0 1px 2px 0 rgba(10,13,18,0.05);
  }
  body.dark .tabs button.active {
    background: var(--bg-canvas);
    border-color: var(--border-subtle);
  }

  /* Pricing fee tier card uses .kpi-tile with screenshot */
  .fee-tier-circle {
    width: 163px; height: 172px;
    flex-shrink: 0;
    position: relative;
  }
  .fee-tier-circle img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  /* ============================================================
     STRUCTURE PAGE — corporate diagram
     ============================================================ */
  .struct-diagram {
    background: var(--bg-canvas);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-m);
    padding: 24px;
  }

  table.legal-table {
    width: 870px;
    border-collapse: collapse;
    font-size: var(--fs-sm);
  }
  table.legal-table th {
    text-align: left;
    padding: 8px 6px;
    font-weight: 500;
    color: var(--text-secondary);
    font-size: 11px;
    border-bottom: 1px solid var(--border-strong);
  }
  table.legal-table td {
    padding: 16px 6px;
    vertical-align: top;
    border-bottom: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    line-height: 1.55;
  }
  table.legal-table td.label-cell { color: var(--text-primary); font-weight: 500; }

  /* Identification table (How it works · Identification body) */
  table.id-table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--fs-sm);
  }
  table.id-table td {
    padding: 12px 8px 12px 0;
    vertical-align: top;
    border-bottom: 1px solid var(--border-subtle);
  }
  table.id-table td:first-child {
    color: var(--text-primary); font-weight: 500;
    width: 200px;
  }
  table.id-table td:last-child {
    color: var(--text-secondary); line-height: 1.6;
  }

  /* Glossary CTA (How it works) */
  .glossary-cta {
    background: var(--text-primary);
    color: #fff;
    padding: 14px 18px;
    border-radius: var(--radius-m);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    cursor: pointer;
    width: 870px;
  }

  /* CTA card dark (Create a fund) — uses header-4 image as background */
  .cta-dark {
    background-image: url('./assets/header-4.png');
    background-size: cover;
    background-position: center;
    background-color: #1a1c20;
    border-radius: var(--radius-m);
    padding: 48px 48px;
    display: flex; justify-content: space-between; align-items: center;
    color: #fff;
    width: 870px;
    height: 200px;
    overflow: hidden;
  }
  .cta-dark .title {
    font-family: 'Serrif Condensed', Georgia, serif;
    font-weight: 300;
    font-size: var(--fs-6xl);
    color: #fff;
    line-height: 1;
  }
  .cta-dark .pill-btn {
    background: #fff;
    color: var(--text-primary);
    padding: 8px 14px;
    height: 34px;
    font-size: 13px;
  }

  /* Download buttons row */
  .download-row {
    display: flex;
    gap: 12px;
    margin: 24px 0;
  }
  .download-btn {
    display: inline-flex; gap: 8px;
    align-items: center;
    padding: 8px 14px; height: 34px;
    background: var(--text-primary);
    color: var(--bg-canvas);
    border: none;
    border-radius: var(--radius-m);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
  }
  .download-btn .download-icon { width: 16px; height: 16px; color: currentColor; }
  .download-btn.outline {
    background: var(--bg-canvas);
    color: var(--text-primary);
    border: 1px solid var(--border-strong);
  }

  section { scroll-margin-top: 80px; }

  /* ============================================================
     DOWNLOAD CARD (Term sheet)
     ============================================================ */
  .download-card {
    width: 870px;
    background: var(--bg-glass);
    border-radius: var(--radius-m);
    padding: var(--space-16) var(--space-24);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
    transition: background 0.12s;
  }
  .download-card:hover { background: rgba(0,0,0,0.06); }
  .download-card-left { display: flex; align-items: center; gap: var(--space-16); }
  .download-card-text { display: flex; flex-direction: column; gap: var(--space-4); }
  .download-card-title {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-lg); line-height: var(--lh-normal);
    color: var(--text-primary);
  }
  .download-card-meta {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-secondary);
  }
  .download-icon {
    width: 24px; height: 24px;
    color: var(--text-primary);
    flex-shrink: 0;
  }

  /* File-type doc icon — uses provided SVGs */
  .doc-icon {
    width: 40px; height: 40px;
    flex-shrink: 0;
    display: block;
  }

  /* ============================================================
     RIGHT-SIDE PAGE ANCHORS (TOC)
     ============================================================ */
  .page-anchors {
    position: fixed;
    right: 32px;
    top: 112px;
    width: 200px;
    z-index: 4;
    display: flex; flex-direction: column;
    gap: 2px;
    padding: 0 0 16px 16px;
    border-left: 1px solid var(--border-subtle);
  }
  .page-anchors a {
    display: block;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    line-height: 18px;
    color: var(--text-secondary);
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .page-anchors a:hover { background: var(--bg-glass); color: var(--text-primary); }
  .page-anchors a.active { background: var(--bg-glass); color: var(--text-primary); }

  /* ============================================================
     THEME TOGGLE
     ============================================================ */
  .theme-toggle {
    position: fixed;
    top: 24px; right: 36px;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: var(--bg-canvas);
    cursor: pointer;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-primary);
    flex-shrink: 0;
    overflow: hidden;
    z-index: 6;
    transform: rotate(0deg);
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .theme-toggle::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 50%; bottom: 0;
    background: var(--text-primary);
  }
  body.dark .theme-toggle {
    transform: rotate(180deg);
  }

  /* Dark mode */
  body.dark {
    --bg-canvas: #171717;
    --bg-white: #171717;
    --bg-glass: rgba(255,255,255,0.06);
    --bg-surface: #1f1f1f;
    --text-primary: #F4F5F4;
    --text-secondary: #9DA0A4;
    --text-inverse: #171717;
    --border-subtle: #2A2D33;
    --border-strong: #3A3D45;
  }
  body.dark .theme-toggle::before {
    right: 0; left: 50%;
  }
  body.dark .download-card,
  body.dark .cta-card,
  body.dark .cta-card-wide {
    background-color: var(--bg-glass);
  }
  body.dark .pill-btn { background: var(--bg-glass); color: var(--text-primary); }
  body.dark .download-card:hover,
  body.dark .cta-card:hover,
  body.dark .pill-btn:hover { background: rgba(255,255,255,0.10); }
  body.dark .cta-card-wide:hover { background-color: rgba(255,255,255,0.10); filter: brightness(1.04); }
  body.dark .glossary-cta { background: var(--bg-white); color: var(--text-primary); border: 1px solid var(--border-subtle); }
  body.dark .cta-dark .pill-btn { background: var(--text-primary); color: var(--bg-canvas); }

  /* Glossary table (Term sheet) */
  .glossary {
    width: 870px;
    display: flex; flex-direction: column;
  }
  .glossary-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: var(--space-32);
  }
  .glossary-header h3 {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: var(--fs-lg); line-height: var(--lh-normal);
    color: var(--text-primary);
    margin: 0;
  }
  .glossary-row {
    display: grid;
    grid-template-columns: 240px 1fr;
    border-bottom: 1px solid var(--border-subtle);
  }
  .glossary-row .term {
    padding: 12px 16px;
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-sm); line-height: var(--lh-tight);
    color: var(--text-primary);
  }
  .glossary-row .definition {
    padding: 12px 16px;
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: var(--fs-xs); line-height: var(--lh-tight);
    color: var(--text-primary);
  }

  /* ============================================================
     SIDE SHEET (sub-page panel)
     ============================================================ */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 60;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: auto; }

  .sheet-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 33.333vw;
    min-width: 480px;
    max-width: 100vw;
    background: var(--bg-white);
    z-index: 61;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: -24px 0 48px rgba(0,0,0,0.18);
  }
  .sheet-panel.open { transform: translateX(0); }

  .sheet-topbar {
    padding: 20px 48px;
    flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sheet-close {
    display: inline-flex; gap: 6px; align-items: center;
    padding: 6px 12px;
    background: var(--bg-glass);
    border: none; border-radius: var(--radius-m);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-xs);
    color: var(--text-primary);
  }
  .sheet-close:hover { background: rgba(0,0,0,0.08); }

  .sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 48px 100px;
  }

  /* Reuse most styles inside the sheet, but tighten widths to fit panel */
  .sheet-body .hero { width: 100%; }
  .sheet-body .lead,
  .sheet-body .callout,
  .sheet-body .page-footer { width: 100%; }
  .sheet-body .provides-grid {
    grid-template-columns: 1fr 1fr;
  }
  .sheet-body .page-footer { margin-top: 70px; }

  /* ============================================================
     LOGIN GATE
     ============================================================ */
  .login-gate {
    position: fixed; inset: 0;
    background: var(--bg-canvas);
    display: flex; align-items: stretch; justify-content: center;
    padding: 64px;
    overflow-y: auto;
    z-index: 200;
  }
  .login-card {
    width: 100%;
    max-width: 1604px;
    display: flex;
    overflow: hidden;
    gap: 32px;
  }
  .login-form-pane {
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
    padding: 96px 100px;
    gap: 32px;
    min-width: 0;
  }
  .login-form-pane .header {
    display: flex; flex-direction: column; gap: 16px;
  }
  .login-form-pane h1 {
    font-family: 'Serrif Condensed', Georgia, serif;
    font-weight: 300;
    font-size: 38px;
    line-height: 1.1;
    color: var(--text-primary);
    margin: 0;
  }
  .login-form-pane .desc {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
    color: var(--text-secondary);
    margin: 0;
  }
  .login-form { display: flex; flex-direction: column; gap: 32px; }
  .login-fields { display: flex; flex-direction: column; gap: 16px; }
  /* Floating-label input — mirrors the FloatingField in manager-os-nav */
  .login-ff {
    position: relative;
    height: 56px;
    border: 1px solid var(--border-default, var(--border-strong));
    border-radius: var(--radius-s, 8px);
    background: var(--bg-white);
    transition: border-color 0.12s;
  }
  .login-ff.focused { border-color: var(--text-primary); }
  .login-ff label {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: var(--text-secondary);
    pointer-events: none;
    white-space: nowrap;
    transition: top 0.12s, font-size 0.12s, color 0.12s, transform 0.12s, font-weight 0.12s;
  }
  .login-ff.float label {
    top: 6px;
    transform: none;
    font-size: 11px;
    font-weight: 500;
  }
  .login-ff.focused label { color: var(--text-primary); }
  .login-ff input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    padding: 0 14px;
    outline: none;
    box-sizing: border-box;
  }
  .login-ff.float input { padding-top: 24px; }
  .login-submit {
    width: 100%;
    height: 54px;
    background: var(--text-primary);
    color: var(--bg-white);
    border: none;
    border-radius: var(--radius-s, 8px);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 16px;
    cursor: pointer;
  }
  .login-submit:hover { opacity: 0.92; }
  .login-link {
    background: var(--bg-glass);
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: var(--fs-xs);
    color: var(--text-primary);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    align-self: center;
    padding: 8px 14px;
    border-radius: var(--radius-m, 12px);
    transition: background 0.12s;
  }
  body.dark .login-link { background: rgba(255,255,255,0.06); }
  .login-link:hover { background: rgba(0,0,0,0.06); }
  body.dark .login-link:hover { background: rgba(255,255,255,0.10); }
  .login-error {
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-xs);
    color: #c43a3a;
    margin-top: -8px;
  }
  .login-success {
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-sm);
    color: var(--text-primary);
    line-height: var(--lh-tight);
    padding: 16px;
    background: var(--bg-glass);
    border-radius: var(--radius-s, 8px);
  }
  .login-hero-pane {
    flex: 0 0 870px;
    position: relative;
    background: #0a0d0a;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    border-radius: var(--radius-m, 12px);
    align-self: stretch;
  }
  .login-hero-bg,
  .login-hero-top {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
  }
  .login-hero-bg { z-index: 0; }
  .login-hero-top { z-index: 1; }
  .login-hero-overlay {
    display: flex; align-items: center; gap: 16px;
    color: #fefeff;
    z-index: 2;
    position: relative;
  }
  .login-hero-overlay svg {
    width: 160px; height: 38px;
    color: #fefeff;
    flex-shrink: 0;
  }
  .login-hero-overlay .name {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 22px;
    line-height: 1;
    color: #fefeff;
    white-space: nowrap;
  }
  @media (max-width: 1100px) {
    .login-card { flex-direction: column-reverse; min-height: 0; }
    .login-form-pane { padding: 48px; }
    .login-hero-pane { flex: 0 0 320px; }
  }

  /* Login → app transition */
  .login-form-pane,
  .login-hero-pane {
    transition: transform 0.5s cubic-bezier(0.7, 0, 0.84, 0), opacity 0.4s ease-in;
  }
  .login-card.exiting .login-form-pane {
    transform: translateX(-130%);
    opacity: 0;
  }
  .login-card.exiting .login-hero-pane {
    transform: translateX(130%);
    opacity: 0;
  }
  /* Cursor-following radial gradient (used inside .login-hero-pane) */
  .cursor-gradient { position: absolute; inset: 0; overflow: hidden; }
  .cursor-gradient-radial { position: absolute; inset: -10%; will-change: background; }

  /* Welcome page micro-entry */
  .page-frame { animation: pageEnter 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes pageEnter {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* =============================================================
   ASSET MAP — pre-composited 785x200 hero banners + flower icons
   ============================================================= */
const HEADER = {
  welcome:           { img: 'header-2.png' }, // blue/pink
  administration:    { img: 'header-1.png' }, // green
  'fund-structure':  { img: 'header-1.png' },
  'investor-base':   { img: 'header-1.png' },
  identity:          { img: 'header-1.png' },
  structure:         { img: 'header-3.png' }, // pink
  howitworks:        { img: 'header-4.png' }, // dark
  'create-fund':     { img: 'header-4.png' },
  'term-sheet':      { img: 'header-1.png' }, // green (per design)
  faqs:              { img: 'header-5.png' }, // silver
  pricing:           { img: 'header-6.png' }, // purple
};

/* =============================================================
   SHARED COMPONENTS
   ============================================================= */
function PodLogo({ src }) {
  // SVG logo asset from Figma. If src not provided, fall back to inline POD SVG.
  if (src) return <img src={src} alt="POD" />;
  return (
    <svg viewBox="0 0 116 28" fill="none">
      <path d="M18.52 14.51c0 2.96-2.4 5.35-5.35 5.35s-5.36-2.4-5.36-5.35 2.4-5.36 5.36-5.36 5.35 2.4 5.35 5.36Zm6.21-3.74a13.54 13.54 0 0 1 .3 9.62l-.45.92c-1.73 3.55-4.95 5.81-8.9 5.81h-5.07c-3.95 0-7.13-2.26-8.86-5.81l-.45-.92a13.54 13.54 0 0 1 .3-9.62l2.54-5.26A9.21 9.21 0 0 1 8.92 1.16c2.69-1.2 5.76-1.2 8.44 0 2.02.91 3.69 2.43 4.78 4.36l2.59 5.26M20.43 16.09c-.85-.85-.85-2.22 0-3.07 1.58-1.58 1.58-4.15 0-5.74-1.59-1.59-4.16-1.59-5.74 0a2.18 2.18 0 0 1-3.07 0c-1.59-1.59-4.16-1.59-5.74 0l-.06.06c-1.58 1.58-1.5 4.1.07 5.7.83.85.83 2.22-.01 3.06-1.59 1.58-1.59 4.15 0 5.74 1.58 1.58 4.15 1.58 5.74 0 .84-.84 2.22-.84 3.06 0 1.59 1.58 4.16 1.58 5.75 0 1.58-1.58 1.58-4.15 0-5.74Z" fill="currentColor"/>
      <path d="M40.98 16.86v6.33h-5.95V4.2h14.25c6.82 0 8.86 2.7 8.86 6.17v.25c0 3.4-2.07 6.23-8.86 6.23h-8.3Zm0-4.26h8.2c1.86 0 2.75-.72 2.75-2v-.08c0-1.27-.87-2.01-2.76-2.01h-8.2V12.6ZM87 13.26v.77c0 3.34-1.38 9.49-13.35 9.49h-1.1c-12.02 0-13.37-6.15-13.37-9.49v-.77c0-3.4 1.35-9.4 13.37-9.4h1.1c11.94 0 13.35 6 13.35 9.4ZM65.4 13.44v.31c0 2.17 1.28 5.15 7.69 5.15s7.68-2.91 7.68-5.1v-.36c0-2.19-1.27-4.97-7.68-4.97s-7.69 2.78-7.69 4.97Zm36.18-9.24c11 0 13.4 4.72 13.4 8.99v.76c0 4.08-2.27 9.27-13.38 9.24H88.99V4.2h12.59Zm-.46 14.42c6.74 0 7.63-2.96 7.63-4.9v-.15c0-1.94-.82-4.88-7.63-4.88h-6.18v9.93h6.18Z" fill="currentColor"/>
    </svg>
  );
}

function Brand() {
  return (
    <div className="brand">
      <div className="brand-logo">
        <PodLogo/>
      </div>
      <span className="brand-name">Pilot Program</span>
    </div>
  );
}

function ArrowIcon({ direction = 'right' }) {
  const path = direction === 'left' ? "M13 8H3M7 4 3 8l4 4" : "M3 8h10M9 4l4 4-4 4";
  return (
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
      <path d={path}/>
    </svg>
  );
}

function ChevronIcon() {
  return (
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 5.5 7 9.5 11 5.5"/>
    </svg>
  );
}

/* =============================================================
   TOP BAR — brand + back + ready/get started + theme toggle
   ============================================================= */
function ThemeToggle({ dark, onToggle }) {
  return (
    <button className="theme-toggle" onClick={onToggle} aria-label={dark ? 'Switch to light mode' : 'Switch to dark mode'} title={dark ? 'Light mode' : 'Dark mode'}/>
  );
}

function TopBar() {
  return (
    <React.Fragment>
      <Brand/>
      <div className="topbar-cta">
        <span className="label">Ready to setup a fund?</span>
        <button className="pill-btn">
          Get started
          <span className="icon"><ArrowIcon/></span>
        </button>
      </div>
    </React.Fragment>
  );
}

/* =============================================================
   RIGHT-SIDE PAGE ANCHORS
   ============================================================= */
function PageAnchors({ items }) {
  const [active, setActive] = useState(items[0]?.id);
  React.useEffect(() => {
    const onScroll = () => {
      // Find the section whose top is closest to (but above) the viewport top + 120px
      let current = items[0]?.id;
      for (const it of items) {
        const el = document.getElementById(it.id);
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (r.top <= 140) current = it.id;
      }
      setActive(current);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [items]);

  if (!items || !items.length) return null;
  return (
    <nav className="page-anchors">
      {items.map(it => (
        <a key={it.id} href={'#' + it.id}
           className={active === it.id ? 'active' : ''}
           onClick={(e)=>{e.preventDefault(); const el=document.getElementById(it.id); if(el) el.scrollIntoView({behavior:'smooth', block:'start'});}}>
          {it.label}
        </a>
      ))}
    </nav>
  );
}

/* =============================================================
   SIDEBAR
   ============================================================= */
function Sidebar({ route, onNav, onLogout }) {
  const Row = ({ id, label }) => (
    <div className={'sb-row' + (route === id ? ' active' : '')}>
      <a className="sb-item" href="#" onClick={(e)=>{e.preventDefault(); onNav(id);}}>{label}</a>
    </div>
  );

  return (
    <nav className="sidebar">
      <div className="sb-group">
        <div className="sb-section-header">Overview</div>
        <Row id="welcome"    label="Welcome"/>
        <Row id="term-sheet" label="Term sheet"/>
        <Row id="structure"  label="Structure"/>
        <Row id="pricing"    label="Pricing"/>
        <Row id="faq"        label="FAQ"/>
      </div>
      <div className="sb-group">
        <div className="sb-section-header">Fund Creation</div>
        <Row id="how-it-works" label="How it works"/>
        <button className="pill-btn" style={{marginTop: 8, marginLeft: 12, alignSelf: 'flex-start'}} onClick={()=>onNav('create-fund')}>
          Create a fund
          <span className="icon"><ArrowIcon/></span>
        </button>
      </div>
      {onLogout && (
        <div className="sb-group" style={{marginTop: 'auto'}}>
          <div className="sb-row">
            <a className="sb-item is-logout" href="#" onClick={(e)=>{e.preventDefault(); onLogout();}}>
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/>
                <path d="M11 11l3-3-3-3"/>
                <path d="M14 8H6"/>
              </svg>
              Log out
            </a>
          </div>
        </div>
      )}
    </nav>
  );
}

/* =============================================================
   HERO BANNER — uses page P3 jpg as background
   ============================================================= */
function Hero({ page, title }) {
  const h = HEADER[page] || HEADER.welcome;
  return (
    <div className="hero" style={{ backgroundImage: `url(./assets/${h.img})` }}>
      <h1 className="serif">{title}</h1>
    </div>
  );
}

/* =============================================================
   PAGE FOOTER
   ============================================================= */
function PageFooter() {
  return (
    <div className="page-footer">
      <div className="conf">Confidential · For prospective Investment Advisors</div>
      <div className="legal">
        <p>This document is confidential and prepared solely for prospective Investment Advisors evaluating partnership with POD. It may not be reproduced, distributed, or transmitted in whole or in part without POD's prior written consent. Nothing in this material constitutes an offer to sell or a solicitation of an offer to buy any security; any such offer will only be made by the Offering Memorandum and applicable Supplement, and only in jurisdictions where lawful. The Fund (POD Emerging Alpha 1 Fund SPC) is a BVI Segregated Portfolio Company recognised by the BVI Financial Services Commission, with portfolio management delegated under the Investment Advisory Agreement and administration provided by Elysium Fund Services, regulated by the Central Bank of Ireland.</p>
        <p>All commercial terms — including fee tiers, the Partnership Period, Revenue Share, and Continuity provisions — are summary indications based on the current term sheet and are non-binding pending execution of the definitive Investment Advisory Agreement and supporting Fund documents. Calculator outputs, illustrative AUM scenarios, and sample Share Class structures are provided for explanatory purposes only and do not represent forecasts, guarantees, or commitments. Investment in any Segregated Portfolio involves risk, including possible loss of principal, and is suitable only for investors who can bear that risk; prospective Investment Advisors should not rely on this material as a substitute for independent legal, tax, and regulatory advice.</p>
      </div>
    </div>
  );
}

/* =============================================================
   NEXT-PAGE CTA — small "Next page" card at bottom of each page

function ProvidesContent({ page }) {

    <div style={{display:'flex', flexDirection:'column', gap:40, paddingTop:8}}>
      <Hero page={page} title={data.title}/>

      </div>

function SubPageSheet({ page, onClose }) {
  // ESC closes
  React.useEffect(() => {
    if (!page) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    window.addEventListener('keydown', onKey);
    return () => {
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      window.removeEventListener('keydown', onKey);
    };
  }, [page, onClose]);

  const open = !!page;
  return ReactDOM.createPortal(
    <React.Fragment>
      <div className={'sheet-overlay' + (open ? ' open' : '')} onClick={onClose}/>
      <aside className={'sheet-panel' + (open ? ' open' : '')} role="dialog" aria-label={page ? SUB_PAGES[page]?.title : ''}>
        <div className="sheet-topbar">
          <button className="sheet-close" onClick={onClose}>
            <ArrowIcon direction="left"/> Close
          </button>
        </div>
        <div className="sheet-body">
          {open && <ProvidesContent page={page}/>}
        </div>
      </aside>
    </React.Fragment>,
    document.body
  );
}

const PRICING_TIERS = [
  { label: 'Launch stage',  range: '$0–10M',   min: 0,  max: 10,   rate: 0.25, slug: 'launch',        desc: "For the early stages of your fund growth when POD's value to you is highest." },
  { label: 'Early growth',  range: '$10–25M',  min: 10, max: 25,   rate: 0.20, slug: 'grow',          desc: "A reduced rate as your fund gains traction." },
  { label: 'Scaling',       range: '$25–75M',  min: 25, max: 75,   rate: 0.15, slug: 'scale',         desc: "A further reduction across mid-market AUM as you approach institutional scale." },
  { label: 'Institutional', range: '$75M+',    min: 75, max: 1e12, rate: 0.10, slug: 'institutional', desc: "POD's lowest take rate, applied as you reach institutional scale." },
];

function calcTierSlices(aum) {
  const res = []; let rem = aum, prev = 0;
  for (let i = 0; i < PRICING_TIERS.length; i++) {
    const slice = Math.min(Math.max(PRICING_TIERS[i].max - prev, 0), rem);
    res.push(slice);
    rem -= slice; prev = PRICING_TIERS[i].max;
    if (rem <= 0) break;
  }
  while (res.length < PRICING_TIERS.length) res.push(0);
  return res;
}
function currentTier(aum) {
  // Return the highest tier in which any of the AUM falls (matches where fees actually accrue).
  // At a boundary (e.g. AUM = $10M), all fees sit in the lower tier's slice — so we return that tier.
  const slices = calcTierSlices(aum);
  for (let i = slices.length - 1; i >= 0; i--) {
    if (slices[i] > 0) return PRICING_TIERS[i];
  }
  return PRICING_TIERS[0];
}

function FeeCalculator() {
  const [aumStr, setAumStr] = useState('10');
  const [retStr, setRetStr] = useState('20');
  const [mgmtStr, setMgmtStr] = useState('2');
  const [perfStr, setPerfStr] = useState('20');
  const [ciStr, setCiStr]    = useState('0');

  const aum = Math.max(parseFloat(aumStr) || 0, 0);
  const ret = Math.max(parseFloat(retStr) || 0, 0);
  const mgmt = Math.max(parseFloat(mgmtStr) || 0, 0);
  const perf = Math.max(parseFloat(perfStr) || 0, 0);
  const ci = Math.min(Math.max(parseFloat(ciStr) || 0, 0), aum);

  const aumV = aum * 1e6;
  const ciV = ci * 1e6;
  const mgmtInc = aumV * (mgmt / 100);
  const netRet  = Math.max(ret - mgmt, 0);
  const perfInc = aumV * (netRet / 100) * (perf / 100);
  const total   = mgmtInc + perfInc;

  const tierAmts = calcTierSlices(aum);
  let podBaseTotal = 0;
  const podFeePerTier = [];
  for (let i = 0; i < PRICING_TIERS.length; i++) {
    const feesInSlice = aum > 0 && tierAmts[i] > 0 ? total * (tierAmts[i] / aum) : 0;
    const fee = feesInSlice * PRICING_TIERS[i].rate;
    podFeePerTier.push(fee);
    podBaseTotal += fee;
  }
  const blendedBase = total > 0 ? podBaseTotal / total : 0;
  const ciFrac = aum > 0 ? ciV / aumV : 0;
  const podCI = total * ciFrac * 0.20;
  const podTotal = podBaseTotal + podCI;
  const keeps = Math.max(total - podTotal, 0);
  const keepPct = total > 0 ? (keeps / total) * 100 : 0;

  const tier = currentTier(aum);

  React.useEffect(() => {

const SITE_KEY = 'POD2026';

function FloatingField({ label, value, onChange, type = 'text', autoComplete, autoFocus }) {
  const [focused, setFocused] = useState(false);
  const hasValue = value !== '' && value !== null && value !== undefined;
  const float = focused || hasValue;
  const cls = 'login-ff' + (focused ? ' focused' : '') + (float ? ' float' : '');
  return (
    <div className={cls}>
      <label>{label}</label>
      <input
        type={type}
        value={value}
        onChange={onChange}
        onFocus={() => setFocused(true)}
        onBlur={() => setFocused(false)}
        autoComplete={autoComplete}
        autoFocus={autoFocus}
      />
    </div>
  );
}

function LoginScreen({ onLogin, onRequestAccess }) {
  const [email, setEmail] = useState('');
  const [key, setKey] = useState('');
  const [err, setErr] = useState('');

  const submit = (e) => {
    e.preventDefault();
    if (!email.trim()) { setErr('Enter your email.'); return; }
    if (key.trim() !== SITE_KEY) { setErr('That site key doesn’t match. Check with your POD contact or request access below.'); return; }
    try {
      localStorage.setItem(AUTH_STORAGE_KEY, '1');
      localStorage.setItem('pilot.email', email.trim());
    } catch (_) {}
    onLogin();
  };

  return (
    <form className="login-form-pane" onSubmit={submit}>
      <div className="header">
        <h1>Join the Pilot Program</h1>
        <p className="desc">We're partnering with a select group of launch PMs to be the first to experience POD. Enter your email and site key below to get started.</p>
      </div>
      <div className="login-form">
        <div className="login-fields">
          <FloatingField label="Email" type="email" autoComplete="email" value={email} onChange={e => { setEmail(e.target.value); setErr(''); }}/>
          <FloatingField label="Site key" type="password" autoComplete="off" value={key} onChange={e => { setKey(e.target.value); setErr(''); }}/>
          {err && <div className="login-error">{err}</div>}
        </div>
        <button type="submit" className="login-submit">Login</button>
        <button type="button" className="login-link" onClick={onRequestAccess}>Request access <ArrowIcon/></button>
      </div>
    </form>
  );
}

function RequestAccessScreen({ onBack }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [sent, setSent] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    if (!name.trim() || !email.trim()) return;
    try {
      const queue = JSON.parse(localStorage.getItem('pilot.access-requests') || '[]');
      queue.push({ name: name.trim(), email: email.trim(), at: new Date().toISOString() });
      localStorage.setItem('pilot.access-requests', JSON.stringify(queue));
    } catch (_) {}
    setSent(true);
  };

  return (
    <form className="login-form-pane" onSubmit={submit}>
      <div className="header">
        <h1>Request access</h1>
        <p className="desc">Tell us who you are and we'll be in touch with a site key.</p>
      </div>
      <div className="login-form">
        {sent ? (
          <div className="login-success">Thanks — we've recorded your request. A POD contact will follow up at the email you provided.</div>

          <div className="login-fields">

      </div>
    </form>
  );
}

/* =============================================================
   CursorGradient — full-bleed radial gradient with cursor-follow lag.
   Decorative (aria-hidden). Renders children above the gradient.
   Tracks cursor in gradient-container coordinates and lerps toward
   target each frame; updates only --mx / --my so the gradient string
   isn't re-parsed each frame.
   ============================================================= */
const CURSOR_GRADIENT_DEFAULT_STOPS = [
  ['#0e1416', '0%'],
  ['#1a2326', '18%'],
  ['#2f3c3d', '28%'],
  ['#5d6f6a', '40%'],
  ['#9eb1a7', '52%'],
  ['#c8d4cb', '65%'],
  ['#d8e1d6', '78%'],
  ['#dde5da', '100%'],
];
function CursorGradient({ smoothing = 0.12, motionScale = 0.1875, colorStops = CURSOR_GRADIENT_DEFAULT_STOPS, children }) {
  const radialRef = useRef(null);
  const containerRef = useRef(null);

  useEffect(() => {
    const radial = radialRef.current;
    const container = containerRef.current;
    if (!radial || !container) return;

    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let targetX = 50, targetY = 50;
    let currentX = 50, currentY = 50;
    let raf = 0;

    const setVars = () => {
      radial.style.setProperty('--mx', currentX.toFixed(2) + '%');
      radial.style.setProperty('--my', currentY.toFixed(2) + '%');
    };

    const onMove = (clientX, clientY) => {
      const rect = container.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      const rawX = ((clientX - rect.left) / rect.width) * 100;
      const rawY = ((clientY - rect.top) / rect.height) * 100;
      // Scale motion around the centre so motionScale=0.5 halves the travel distance
      targetX = 50 + (rawX - 50) * motionScale;
      targetY = 50 + (rawY - 50) * motionScale;
      if (prefersReduced) {
        currentX = targetX;
        currentY = targetY;
        setVars();
      }
    };
    const onMouseMove = (e) => onMove(e.clientX, e.clientY);
    const onTouchMove = (e) => {
      if (e.touches.length) onMove(e.touches[0].clientX, e.touches[0].clientY);
    };
    const easeBack = () => { targetX = 50; targetY = 50; };

    window.addEventListener('mousemove', onMouseMove, { passive: true });
    window.addEventListener('touchmove', onTouchMove, { passive: true });
    document.addEventListener('mouseleave', easeBack);
    container.addEventListener('mouseleave', easeBack);

    setVars();
    if (!prefersReduced) {
      const tick = () => {
        currentX += (targetX - currentX) * smoothing;
        currentY += (targetY - currentY) * smoothing;
        setVars();
        raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    }

    return () => {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('mouseleave', easeBack);
      container.removeEventListener('mouseleave', easeBack);
      if (raf) cancelAnimationFrame(raf);
    };
  }, [smoothing]);

  const gradientStops = colorStops.map(([color, stop]) => `${color} ${stop}`).join(', ');
  const bg = `radial-gradient(circle at var(--mx) var(--my), ${gradientStops})`;

  return (
    <div ref={containerRef} className="cursor-gradient" aria-hidden="true">
      <div ref={radialRef} className="cursor-gradient-radial" style={{ background: bg, '--mx': '50%', '--my': '50%' }}/>
      {children}
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(() => {
    try { return localStorage.getItem(AUTH_STORAGE_KEY) === '1'; } catch (_) { return false; }
  });
  const [exiting, setExiting] = useState(false);
  const logout = () => {
    try { localStorage.removeItem(AUTH_STORAGE_KEY); } catch (_) {}
    setAuthed(false);
    setExiting(false);
  };
  const handleLogin = () => {
    setExiting(true);
    setTimeout(() => { setAuthed(true); setExiting(false); }, 500); // play the exit animation, then mount the app
  };
  if (!authed) return <LoginGate exiting={exiting} onLogin={handleLogin}/>;
  return <PilotApp onLogout={logout}/>;
}

function PilotApp({ onLogout }) {
  const [route, setRoute] = useState(() => {
    const hash = window.location.hash.replace('#', '');
    return hash || 'welcome';
  });
  const [sheet, setSheet] = useState(null);  // null | 'fund-structure' | 'administration' | 'investor-base' | 'identity'
  const [dark, setDark] = useState(() => localStorage.getItem('pilot.theme') === 'dark');

  const SUB_KEYS = ['fund-structure','administration','investor-base','identity'];

  React.useEffect(() => {
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('pilot.theme', dark ? 'dark' : 'light');
    document.querySelectorAll('img.theme-aware-img').forEach(img => {
      const src = dark ? img.getAttribute('data-dark') : img.getAttribute('data-light');
      if (src) img.setAttribute('src', src);
    });
  }, [dark, route]);

  const setRouteAndScroll = (id) => {
    // Sub-pages now open as side sheet instead of routing
    if (SUB_KEYS.includes(id)) {
      setSheet(id);
      return;
    }
    if (['partnership','pilot-role','relationship','what-pod-provides'].includes(id)) {
      if (route !== 'welcome') {
        setRoute('welcome');
        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
        }, 50);
      } else {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
      }
      return;
    }
    setRoute(id);
    window.scrollTo({top:0, behavior:'instant'});
    window.location.hash = id;
  };

  // Cross-sheet navigation via custom event
  React.useEffect(() => {
    const handler = (e) => setSheet(e.detail);
    window.addEventListener('open-subsheet', handler);
    return () => window.removeEventListener('open-subsheet', handler);
  }, []);

  // If hash points at a sub-page, open the sheet
  React.useEffect(() => {
    const hash = window.location.hash.replace('#', '');
    if (SUB_KEYS.includes(hash)) { setSheet(hash); setRoute('welcome'); }
  }, []);

  let view;
  switch (route) {
    case 'welcome':         view = <WelcomePage onNav={setRouteAndScroll}/>; break;
    case 'structure':       view = <StructurePage onNav={setRouteAndScroll}/>; break;
    case 'how-it-works':    view = <HowItWorksPage onNav={setRouteAndScroll}/>; break;
    case 'create-fund':     view = (
      <div className="content">
        <div>
          <Hero page="howitworks" title="Create a fund"/>
          <p className="lead" style={{marginTop: 48}}>Fund creation flow — separate design in progress.</p>
        </div>
        <PageFooter/>
      </div>
    ); break;
    case 'term-sheet':      view = <TermSheetPage onNav={setRouteAndScroll}/>; break;
    case 'faq':             view = <FAQPage onNav={setRouteAndScroll}/>; break;
    case 'pricing':         view = <PricingPage onNav={setRouteAndScroll}/>; break;
    default:                view = <WelcomePage onNav={setRouteAndScroll}/>;
  }

  const anchors = PAGE_ANCHORS[route] || [];

  return (
    <React.Fragment>
      <div className="topbar-bg"/>
      <div className="page-frame">
        <TopBar/>
        <Sidebar route={route} onNav={setRouteAndScroll} onLogout={onLogout}/>
        {view}
        {anchors.length > 0 && <PageAnchors items={anchors}/>}
        <ThemeToggle dark={dark} onToggle={()=>setDark(d => !d)}/>
      </div>
      <SubPageSheet page={sheet} onClose={()=>setSheet(null)}/>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
