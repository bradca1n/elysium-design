// Pre-loaded PDF assets (logo + POD signature) cached as data URLs so we
// can synchronously embed them via doc.addImage. Loaded once on first call.
let _pdfAssets = null;
async function loadPdfAssets() {
  if (_pdfAssets) return _pdfAssets;
  const fetchAsDataUrl = async (url) => {
    const res = await fetch(url);
    const blob = await res.blob();
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    });
  };
  const [logo, podSig] = await Promise.all([
    fetchAsDataUrl('./assets/pod-logo.png').catch(() => null),
    fetchAsDataUrl('./assets/pod-signature.png').catch(() => null),
  ]);
  _pdfAssets = { logo, podSig };
  return _pdfAssets;
}

// Build a clean PDF of the entire form using jsPDF + autoTable. Two columns:
// Question (left) + Response (right), grouped under section headers.
async function buildFundFormPdfDoc(form) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const margin = 48;
  const assets = await loadPdfAssets();

  const dash = (v) => (v === null || v === undefined || v === '' ? '—' : String(v));
  const sections = [
    { title: '1. Identification', rows: [
      ['SP name', dash(form.spName)],
      ['Investment advisor entity', dash(form.iaEntity)],
      ['Key persons', dash((form.keyPersons || []).filter(p => p && p.trim()).join('\n'))],
      ['Currency', dash(form.currency)],
    ]},
    { title: '2. Investment Mandate', rows: [
      ['Investment objective', dash(form.objective)],
      ['Investment strategy', dash(form.strategy)],
      ['Portfolio investments', dash(form.portfolioInvestments)],
      ['Investment restrictions', dash(form.restrictions)],
      ['Leverage', dash(form.leverage)],
    ]},
    { title: '3. Dealing & Liquidity', rows: [
      ['Subscription point', dash(form.subscriptionPoint)],
      ['Valuation frequency', dash(form.valuationFrequency)],
      ['Redemption point', dash(form.redemptionPoint)],
      ['Redemption gate', dash(form.redemptionGate)],
      ['Redemption notice period', dash(form.redemptionNoticePeriod)],
    ]},
    { title: '4. Fees & Economics', rows: [
      ['Management fee', form.mgmtFee ? form.mgmtFee + '%' : '—'],
      ['Performance fee', form.perfFee ? form.perfFee + '%' : '—'],
      ['Performance period', dash(form.perfPeriod)],
      ['Hurdle rate', dash(form.hurdleRate)],
      ['High water mark', dash(form.hwm)],
    ]},
    { title: '5. Share Class setup', rows: [
      ['Class designation', dash(form.classDesignation)],
      ['Sub-class', dash(form.subClass)],
      ['Minimum initial investment', dash(form.minInitialInv)],
      ['Minimum additional investment', dash(form.minAdditionalInv)],
      ['Subscription price', dash(form.subscriptionPrice)],
      ['Subscription fee', dash(form.subscriptionFee)],
      ['Distribution type', dash(form.distributionType)],
      ['Redemption price', dash(form.redemptionPrice)],
      ['Redemption fee', dash(form.redemptionFee)],
      ['Minimum redemption amount', dash(form.minRedemptionAmount)],
      ['Lock-up period', dash(form.lockupPeriod)],
      ['Minimum holding', dash(form.minHolding)],
      ['Expenses cap', form.expensesCap ? form.expensesCap + '%' : '—'],
    ]},
    { title: '6. SP-Specific Risk Factors', rows:
      ((form.risks || []).filter(r => r.title || r.description).length
        ? form.risks.filter(r => r.title || r.description).map((r, i) => [
            `Risk ${i + 1}${r.title ? ' — ' + r.title : ''}`,
            dash(r.description)
          ])
        : [['Risks', '—']])
    },
    { title: '7. Special Situations', rows: [
      ['Special situation shares', dash(form.specialSituationShares)],
      ['Dividend policy', dash(form.dividendPolicy)],
      ['Initial offer period', dash(form.iop)],
      ['Anchor investor terms', dash(form.anchorTerms)],
    ]},
  ];

  // Logo + cover header
  let coverTopY = margin;
  if (assets.logo) {
    try { doc.addImage(assets.logo, 'PNG', margin, coverTopY, 80, 19); } catch (e) {}
    coverTopY += 36;
  }
  doc.setFont('helvetica', 'bold').setFontSize(20).setTextColor(20);
  doc.text('Fund Creation Supplement', margin, coverTopY + 10);
  doc.setFont('helvetica', 'normal').setFontSize(10).setTextColor(120);
  doc.text(`Generated ${new Date().toLocaleString('en-GB')}`, margin, coverTopY + 30);

  let startY = coverTopY + 50;

  sections.forEach(s => {
    // Section title row
    doc.autoTable({
      startY,
      margin: { left: margin, right: margin },
      head: [[s.title]],
      body: [],
      theme: 'plain',
      headStyles: {
        fillColor: [23, 23, 23], textColor: [254, 254, 255],
        fontStyle: 'bold', fontSize: 11,
        cellPadding: { top: 8, right: 12, bottom: 8, left: 12 },
      },
    });
    startY = doc.lastAutoTable.finalY;

    // Field rows
    doc.autoTable({
      startY,
      margin: { left: margin, right: margin },
      head: [['Question', 'Response']],
      body: s.rows,
      theme: 'grid',
      styles: {
        font: 'helvetica', fontSize: 10, cellPadding: 8,
        lineColor: [220, 220, 220], lineWidth: 0.5,
        valign: 'top',
      },
      headStyles: {
        fillColor: [248, 248, 248], textColor: [115, 115, 115],
        fontStyle: 'bold', fontSize: 9,
      },
      columnStyles: {
        0: { cellWidth: 200, fontStyle: 'bold', textColor: [60, 60, 60] },
        1: { cellWidth: 'auto', textColor: [20, 20, 20] },
      },
    });
    startY = doc.lastAutoTable.finalY + 16;
  });

  // Signatures section — needs custom rendering to embed the signature image.
  doc.autoTable({
    startY,
    margin: { left: margin, right: margin },
    head: [['8. Signatures']],
    body: [],
    theme: 'plain',
    headStyles: {
      fillColor: [23, 23, 23], textColor: [254, 254, 255],
      fontStyle: 'bold', fontSize: 11,
      cellPadding: { top: 8, right: 12, bottom: 8, left: 12 },
    },
  });
  startY = doc.lastAutoTable.finalY;

  doc.autoTable({
    startY,
    margin: { left: margin, right: margin },
    head: [['Question', 'Response']],
    body: [
      ['Investment advisor — Name', dash(form.iaName)],
      ['Investment advisor — Title', dash(form.iaTitle)],
      ['Investment advisor — Date', dash(form.iaDate)],
      ['Investment advisor — Signature', form.iaSignature ? '' : '—'],
      ['POD — Name', 'Patrick Lynch'],
      ['POD — Title', 'CEO'],
      ['POD — Signature', assets.podSig ? '' : '—'],
      ['POD — Date', new Date().toLocaleDateString('en-GB')],
    ],
    theme: 'grid',
    styles: { font: 'helvetica', fontSize: 10, cellPadding: 8, lineColor: [220,220,220], lineWidth: 0.5, valign: 'top' },
    headStyles: { fillColor: [248,248,248], textColor: [115,115,115], fontStyle: 'bold', fontSize: 9 },
    columnStyles: {
      0: { cellWidth: 200, fontStyle: 'bold', textColor: [60,60,60] },
      1: { cellWidth: 'auto' },
    },
    didDrawCell: (data) => {
      if (data.section !== 'body' || data.column.index !== 1) return;
      // IA signature — embed the canvas data URL.
      if (data.row.index === 3 && form.iaSignature) {
        try {
          const w = Math.min(180, data.cell.width - 16);
          doc.addImage(form.iaSignature, 'PNG', data.cell.x + 8, data.cell.y + 8, w, w * 0.4);
        } catch (e) {}
      }
      // POD signature — embed the bundled sample signature PNG.
      if (data.row.index === 6 && assets.podSig) {
        try {
          const w = Math.min(180, data.cell.width - 16);
          doc.addImage(assets.podSig, 'PNG', data.cell.x + 8, data.cell.y + 8, w, w * 0.4);
        } catch (e) {}
      }
    },
    didParseCell: (data) => {
      if (data.section !== 'body' || data.column.index !== 1) return;
      // Reserve row height for embedded signature images.
      if (data.row.index === 3 && form.iaSignature) data.cell.styles.minCellHeight = 80;
      if (data.row.index === 6 && assets.podSig)   data.cell.styles.minCellHeight = 80;
    },
  });

  return doc;
}

// Returns a Blob ready to attach to an email request.
async function generateFundFormPdfBlob(form) {
  if (!window.jspdf) throw new Error('PDF library failed to load.');
  const doc = await buildFundFormPdfDoc(form);
  return doc.output('blob');
}

// Trigger an in-browser download (kept for demo purposes alongside email send).
async function downloadFundFormPdf(form) {
  if (!window.jspdf) { alert('PDF library failed to load — check your network and try again.'); return; }
  const doc = await buildFundFormPdfDoc(form);
  doc.save('POD-fund-creation.pdf');
}

// To enable real email delivery, sign up for a free Web3Forms access key
// at https://web3forms.com (60-second signup, no credit card) and paste it
// below. Without a key the send is mocked: the PDF is generated in-memory
// but nothing leaves the browser — the success screen still shows.
const WEB3FORMS_ACCESS_KEY = '';
const FUND_FORM_RECIPIENT = 'work@bradcain.co';

async function emailFundFormPdf(form) {
  let blob;
  try { blob = await generateFundFormPdfBlob(form); }
  catch (e) { console.error(e); return { ok: false, mocked: false, error: e.message }; }

  // Mock mode: no key configured. Pretend success so the demo flow still works.
  if (!WEB3FORMS_ACCESS_KEY) {
    console.warn(
      `[email mock] Would have sent the PDF (${Math.round(blob.size / 1024)} KB) ` +
      `to ${FUND_FORM_RECIPIENT}. Add a Web3Forms access key in WEB3FORMS_ACCESS_KEY to enable real delivery.`
    );
    return { ok: true, mocked: true };
  }

  const fd = new FormData();
  fd.append('access_key', WEB3FORMS_ACCESS_KEY);
  fd.append('subject', 'POD Fund Creation Supplement — submission');
  fd.append('from_name', form.iaName || 'POD Fund Creation');
  fd.append('email', FUND_FORM_RECIPIENT);
  fd.append('message', `Submission from ${form.iaName || 'an investment advisor'}.\n\nSee the attached PDF for the full Supplement.`);
  fd.append('attachment', blob, 'POD-fund-creation.pdf');

  try {
    const res = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: fd });
    return { ok: res.ok, mocked: false };
  } catch (e) {
    console.error('[email] send failed', e);
    return { ok: false, mocked: false, error: e.message };

function CreateFundPage({ onNav }) {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('pilot.fundForm') || 'null');
      return saved || CF_INITIAL;
    } catch { return CF_INITIAL; }
  });
  const [submitted, setSubmitted] = useState(false);
  const [sendStatus, setSendStatus] = useState(null); // 'sent' | 'mocked' | 'failed'
  const [showCancel, setShowCancel] = useState(false);

  useEffect(() => {
    try { localStorage.setItem('pilot.fundForm', JSON.stringify(form)); } catch {}
  }, [form]);

  const set = (key, value) => setForm(f => ({...f, [key]: value}));

  const stepProgress = React.useMemo(() => CF_STEPS.map((_, i) => cfStepProgress(i, form)), [form]);

  const goBack = () => setStep(s => Math.max(0, s - 1));
  const goNext = () => setStep(s => Math.min(CF_STEPS.length - 1, s + 1));
  const submit = async () => {
    setSubmitted(true);
    const res = await emailFundFormPdf(form);
    setSendStatus(res.mocked ? 'mocked' : res.ok ? 'sent' : 'failed');
  };

  const exitToWelcome = () => {
    try { localStorage.removeItem('pilot.fundForm'); } catch {}
    onNav('welcome');
  };

  if (submitted) {
    return (
      <React.Fragment>
        <CFCustomTopbar onCancel={null}/>
        <div className="cf-page">
          <CFSubmittedView onHome={exitToWelcome} onDownload={() => downloadFundFormPdf(form)} sendStatus={sendStatus}/>
        </div>
      </React.Fragment>
    );
  }

  const currentStep = CF_STEPS[step];
  const StepRenderer = [CFStep1, CFStep2, CFStep3, CFStep4, CFStep5, CFStep6, CFStep7, CFStep8][step];
  const isLast = step === CF_STEPS.length - 1;

  return (
    <React.Fragment>
      <CFCustomTopbar onCancel={() => setShowCancel(true)}/>
      <CFStepIndicator steps={CF_STEPS} current={step} progress={stepProgress[step]} onJump={setStep}/>
      <div className="cf-page">
        <h1 className="cf-title">{currentStep.title}</h1>
        <p className="cf-subtitle">{currentStep.subtitle}</p>
        <div style={{marginTop: 64, display:'flex', flexDirection:'column', gap: 48}}>
          <StepRenderer form={form} set={set}/>
        </div>
        <div className="cf-btn-row" style={{display:'flex', alignItems:'center'}}>
          {step > 0 && <button type="button" className="cf-secondary" onClick={goBack}><ArrowIcon direction="left"/> Back</button>}
          <button type="button" className="cf-primary" onClick={isLast ? submit : goNext}>
            {isLast ? 'Submit' : 'Continue'}
            <ArrowIcon/>
          </button>
        </div>
      </div>
      <CFMobileFooter
        steps={CF_STEPS}
        current={step}
        stepProgress={stepProgress}
        onJump={setStep}
        onBack={goBack}
        onNext={isLast ? submit : goNext}
        isLast={isLast}
      />
      {showCancel && <CFCancelModal onConfirm={exitToWelcome} onClose={() => setShowCancel(false)}/>}
    </React.Fragment>
  );
}

/* Mobile footer for the Create-a-fund flow: sticky bottom showing just the
   active step row (with its progress circle and label). Tapping the rail
   expands the footer upward to reveal the full step list (done / active /
   pending). Continue is full-width; Back is a compact icon button on
   steps 2+. */
function CFMobileFooter({ steps, current, stepProgress, onBack, onNext, isLast }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <React.Fragment>
      <div className={'cf-mob-footer-backdrop' + (expanded ? ' open' : '')} onClick={() => setExpanded(false)}/>

        <div
          className="cf-mob-step-rail"
          onClick={() => setExpanded(v => !v)}
          role="button"
          tabIndex={0}
          aria-expanded={expanded}
          aria-label={expanded ? 'Hide all steps' : 'View all steps'}
        >
          {steps.map((s, i) => {
            const state = i < current ? 'done' : i === current ? 'active' : 'pending';
            const progress = i === current ? (stepProgress[i] || 0) : 0;
            return (
              <div key={s.key} className={'cf-mob-step-wrap' + (state === 'active' ? ' active' : '')}>
                <div className={'cf-step-row ' + state}>
                  <span className="cf-step-circle">
                  {state === 'done' && (
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                      <circle cx="12" cy="12" r="11" fill="var(--text-primary)"/>
                      <path d="M7.5 12.5l3 3 6-7" stroke="var(--bg-canvas)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                    </svg>
                  )}
                  {state === 'pending' && (
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                      <circle cx="12" cy="12" r="11" stroke="var(--border-strong)" strokeWidth="1.4"/>
                    </svg>
                  )}
                  {state === 'active' && (
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                      <circle cx="12" cy="12" r="11" stroke="var(--border-strong)" strokeWidth="1.4"/>
                      <circle
                        cx="12" cy="12" r="11"
                        stroke="var(--text-primary)" strokeWidth="1.6"
                        fill="none"
                        strokeDasharray={2 * Math.PI * 11}
                        strokeDashoffset={2 * Math.PI * 11 * (1 - progress)}
                        transform="rotate(-90 12 12)"
                        style={{transition: 'stroke-dashoffset 0.3s ease'}}
                      />
                    </svg>
                  )}
                </span>
                  <span className="label">{s.label}</span>

        </div>
        <div className="cf-mob-actions">

            <button type="button" className="cf-secondary" onClick={onBack} aria-label="Back">

            </button>

            {isLast ? 'Submit' : 'Continue'}
            <ArrowIcon/>
          </button>

    </React.Fragment>
  );
}

   Hidden on desktop by CSS; only render at ≤1023px viewports.

function BottomSheet({ open, onClose, children, anchor = 'top' }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
    const prevHtml = document.documentElement.style.overflow;
    const prevBody = document.body.style.overflow;
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    document.addEventListener('keydown', onKey);
    return () => {
      document.documentElement.style.overflow = prevHtml;
      document.body.style.overflow = prevBody;
      document.removeEventListener('keydown', onKey);
    };
  }, [open, onClose]);

  // Always render so the close transition can play; visibility toggled via class.
  const sheetClass = 'mob-sheet' + (anchor === 'bottom' ? ' from-bottom' : '') + (open ? ' open' : '');
  return ReactDOM.createPortal(
    <React.Fragment>
      <div className={'mob-sheet-backdrop' + (open ? ' open' : '')} onClick={onClose}/>
      <div className={sheetClass} role="dialog" aria-modal="true" aria-hidden={!open}>
        {anchor === 'bottom' && <div className="mob-sheet-handle"/>}
        <div className="mob-sheet-content">
          {children}
        </div>
        {anchor === 'top' && <div className="mob-sheet-handle"/>}
      </div>
    </React.Fragment>,
    document.body
  );
}

/* =============================================================
   CursorGradient — full-bleed radial gradient with cursor-follow lag.
   Decorative (aria-hidden). Renders children above the gradient.
   Tracks cursor in gradient-container coordinates and lerps toward
   target each frame; updates only --mx / --my so the gradient string
   isn't re-parsed each frame.
   ============================================================= */
const CURSOR_GRADIENT_DEFAULT_STOPS = [
  ['#0e1416', '0%'],
  ['#1a2326', '18%'],
  ['#2f3c3d', '28%'],
  ['#5d6f6a', '40%'],
  ['#9eb1a7', '52%'],
  ['#c8d4cb', '65%'],
  ['#d8e1d6', '78%'],
  ['#dde5da', '100%'],
];
function CursorGradient({ smoothing = 0.12, motionScale = 0.1875, colorStops = CURSOR_GRADIENT_DEFAULT_STOPS, children }) {
  const radialRef = useRef(null);
  const containerRef = useRef(null);

  useEffect(() => {
    const radial = radialRef.current;
    const container = containerRef.current;
    if (!radial || !container) return;

    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let targetX = 50, targetY = 50;
    let currentX = 50, currentY = 50;
    let raf = 0;

    const setVars = () => {
      radial.style.setProperty('--mx', currentX.toFixed(2) + '%');
      radial.style.setProperty('--my', currentY.toFixed(2) + '%');
    };

    const onMove = (clientX, clientY) => {
      const rect = container.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      const rawX = ((clientX - rect.left) / rect.width) * 100;
      const rawY = ((clientY - rect.top) / rect.height) * 100;
      // Scale motion around the centre so motionScale=0.5 halves the travel distance
      targetX = 50 + (rawX - 50) * motionScale;
      targetY = 50 + (rawY - 50) * motionScale;
      if (prefersReduced) {
        currentX = targetX;
        currentY = targetY;
        setVars();
      }
    };
    const onMouseMove = (e) => onMove(e.clientX, e.clientY);
    const onTouchMove = (e) => {
      if (e.touches.length) onMove(e.touches[0].clientX, e.touches[0].clientY);
    };
    const easeBack = () => { targetX = 50; targetY = 50; };

    window.addEventListener('mousemove', onMouseMove, { passive: true });
    window.addEventListener('touchmove', onTouchMove, { passive: true });
    document.addEventListener('mouseleave', easeBack);
    container.addEventListener('mouseleave', easeBack);

    setVars();
    if (!prefersReduced) {
      const tick = () => {
        currentX += (targetX - currentX) * smoothing;
        currentY += (targetY - currentY) * smoothing;
        setVars();
        raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    }

    return () => {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('mouseleave', easeBack);
      container.removeEventListener('mouseleave', easeBack);
      if (raf) cancelAnimationFrame(raf);
    };
  }, [smoothing]);

  const gradientStops = colorStops.map(([color, stop]) => `${color} ${stop}`).join(', ');
  const bg = `radial-gradient(circle at var(--mx) var(--my), ${gradientStops})`;

  return (
    <div ref={containerRef} className="cursor-gradient" aria-hidden="true">
      <div ref={radialRef} className="cursor-gradient-radial" style={{ background: bg, '--mx': '50%', '--my': '50%' }}/>
      {children}
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(() => {
    try { return localStorage.getItem(AUTH_STORAGE_KEY) === '1'; } catch (_) { return false; }
  });
  const [exiting, setExiting] = useState(false);
  const logout = () => {
    try { localStorage.removeItem(AUTH_STORAGE_KEY); } catch (_) {}
    setAuthed(false);
    setExiting(false);
  };
  const handleLogin = () => {
    setExiting(true);
    setTimeout(() => { setAuthed(true); setExiting(false); }, 500); // play the exit animation, then mount the app
  };
  if (!authed) return <LoginGate exiting={exiting} onLogin={handleLogin}/>;
  return <PilotApp onLogout={logout}/>;
}

function PilotApp({ onLogout }) {
  const [route, setRoute] = useState(() => {
    const hash = window.location.hash.replace('#', '');
    return hash || 'welcome';
  });
  const [sheet, setSheet] = useState(null);  // null | 'fund-structure' | 'administration' | 'investor-base' | 'identity'
  const [dark, setDark] = useState(() => localStorage.getItem('pilot.theme') === 'dark');

  const SUB_KEYS = ['fund-structure','administration','investor-base','identity'];

  React.useEffect(() => {
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('pilot.theme', dark ? 'dark' : 'light');
    document.querySelectorAll('img.theme-aware-img').forEach(img => {
      const src = dark ? img.getAttribute('data-dark') : img.getAttribute('data-light');
      if (src) img.setAttribute('src', src);
    });
  }, [dark, route]);

  const [transitioning, setTransitioning] = useState(false);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

  // Track scroll so the mobile topbar can collapse from full brand into
  // logo + centred page title once the user moves away from the top.
  React.useEffect(() => {
    const onScroll = () => {
      document.body.classList.toggle('scrolled', window.scrollY > 16);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const setRouteAndScroll = (id) => {
    // Sub-pages now open as side sheet instead of routing
    if (SUB_KEYS.includes(id)) {
      setSheet(id);
      return;
    }
    if (['partnership','pilot-role','relationship','what-pod-provides'].includes(id)) {
      if (route !== 'welcome') {
        setRoute('welcome');
        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
        }, 50);
      } else {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
      }
      return;
    }
    // Create-a-fund route gets a real exit + cascading enter animation.
    const isCfHop = id === 'create-fund' || route === 'create-fund';
    if (isCfHop && id !== route) {
      setTransitioning(true);
      setTimeout(() => {
        setRoute(id);
        window.scrollTo({ top: 0, behavior: 'instant' });
        window.location.hash = id;
        // Allow the entering animation to play, then drop the flag.
        setTimeout(() => setTransitioning(false), 700);
      }, 320); // matches cfPageExit duration
      return;
    }
    setRoute(id);
    window.scrollTo({top:0, behavior:'instant'});
    window.location.hash = id;
  };

  // Cross-sheet navigation via custom event
  React.useEffect(() => {
    const handler = (e) => setSheet(e.detail);
    window.addEventListener('open-subsheet', handler);
    return () => window.removeEventListener('open-subsheet', handler);
  }, []);

  // If hash points at a sub-page, open the sheet
  React.useEffect(() => {
    const hash = window.location.hash.replace('#', '');
    if (SUB_KEYS.includes(hash)) { setSheet(hash); setRoute('welcome'); }
  }, []);

  let view;
  switch (route) {
    case 'welcome':         view = <WelcomePage onNav={setRouteAndScroll}/>; break;
    case 'structure':       view = <StructurePage onNav={setRouteAndScroll}/>; break;
    case 'how-it-works':    view = <HowItWorksPage onNav={setRouteAndScroll}/>; break;
    case 'create-fund':     view = <CreateFundPage onNav={setRouteAndScroll}/>; break;
    case 'term-sheet':      view = <TermSheetPage onNav={setRouteAndScroll}/>; break;
    case 'faq':             view = <FAQPage onNav={setRouteAndScroll}/>; break;
    case 'pricing':         view = <PricingPage onNav={setRouteAndScroll}/>; break;
    case 'timeline':        view = <OnboardingTimelinePage onNav={setRouteAndScroll}/>; break;
    default:                view = <WelcomePage onNav={setRouteAndScroll}/>;
  }

  const anchors = PAGE_ANCHORS[route] || [];

  // While transitioning we keep the OLD chrome on screen but apply the
  // exit class. Once the route swaps below, the new chrome mounts with the
  // entering class, which kicks off the staggered child cascade.
  const transitionClass = transitioning
    ? ' cf-leaving'
    : (route === 'create-fund' ? ' cf-entering' : '');

  const currentLabel = MOB_ROUTE_LABELS[route] || 'Pilot Program';

  // Create Fund flow renders its own chrome (custom topbar, step rail, no sidebar/anchors).
  if (route === 'create-fund' && !transitioning) {
    return (
      <React.Fragment>
        <div className="topbar-bg"/>
        <div className={'page-frame' + transitionClass}>
          {view}
          <ThemeToggle dark={dark} onToggle={()=>setDark(d => !d)}/>
        </div>
      </React.Fragment>
    );
  }

  return (
    <React.Fragment>
      <div className="topbar-bg"/>
      <div className={'page-frame' + transitionClass}>
        <TopBar onNav={setRouteAndScroll}/>
        <Sidebar route={route} onNav={setRouteAndScroll} onLogout={onLogout}/>
        {view}
        {anchors.length > 0 && <PageAnchors items={anchors}/>}
        <ThemeToggle dark={dark} onToggle={()=>setDark(d => !d)}/>
        {/* Mobile-only: centred page title (fades in once the user scrolls)
             + hamburger menu trigger top-right. Both hidden on desktop via CSS. */}
        <div className="mob-top-title" aria-hidden="true">{currentLabel}</div>
        <MobileMenuButton label={currentLabel} onClick={() => setMobileMenuOpen(true)}/>
      </div>
      <SubPageSheet page={sheet} onClose={()=>setSheet(null)}/>
      <MobileNavSheet
        open={mobileMenuOpen}
        onClose={() => setMobileMenuOpen(false)}
        route={route}
        onNav={setRouteAndScroll}
        dark={dark}
        onToggleTheme={() => setDark(d => !d)}
        onLogout={onLogout}
      />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
