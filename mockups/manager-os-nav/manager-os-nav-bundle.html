<style>
  :root {
    --bg-canvas: #FFFFFF;
    --bg-surface: #FAF9F7;
    --bg-card: #FFFFFF;
    --bg-subtle: #EAEFEC;
    --ink-1: #0E0F12;
    --ink-2: #4F5258;
    --ink-3: #82858B;
    --line-1: #E4E3DE;
    --line-2: #D2D1CB;
    --accent-plum: #1d7d59;
    --accent-plum-soft: rgba(69,213,155,0.16);
    --accent-plum-on: #FFFFFF;
    --accent-grad: linear-gradient(135deg,#29b07d,#1d7d59);
    --green-50: rgba(69,213,155,0.08);
    --green-200: rgba(69,213,155,0.20);
    --green-300: #82e0b9;
    --green-400: #5edaa6;
    --green-500: #45d59b;
    --green-600: #29b07d;
    --green-700: #1d7d59;
    --pos: #1d7d59;
    --neg: #e13733;
    --info-bg: #EEF3F9;
    --info-border: #D2DFEC;
    --info-fg: #345B85;
    --glass-bg: rgba(0,0,0,0.03);
    --glass-border: rgba(0,0,0,0.06);
  }
  .dark {
    --bg-canvas: #08090B;
    --bg-surface: #0F1115;
    --bg-card: #131519;
    --bg-subtle: #1B1E24;
    --ink-1: #F4F5F4;
    --ink-2: #9DA0A4;
    --ink-3: #6B6E73;
    --line-1: #23262C;
    --line-2: #2F333B;
    --green-50: rgba(69,213,155,0.10);
    --green-200: rgba(69,213,155,0.25);
    --green-300: #1d7d59;
    --green-400: #29b07d;
    --green-500: #45d59b;
    --green-600: #82e0b9;
    --green-700: #b1ecd2;
    --pos: #45d59b;
    --neg: #e13733;
    --info-bg: rgba(95,184,218,0.10);
    --info-border: rgba(95,184,218,0.25);
    --info-fg: #9CC9DD;
    --glass-bg: #131519;
    --glass-border: #23262C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-canvas);
    color: var(--ink-1);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  button { font-family: inherit; }
  input, select { font-family: inherit; outline: none; }
  input:focus, select:focus { border-color: var(--ink-1) !important; box-shadow: 0 0 0 3px var(--bg-card); }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  table td, table th { vertical-align: middle; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 6px; border: 2px solid var(--bg-canvas); }
  ::-webkit-scrollbar-track { background: var(--bg-canvas); }

  /* ─── Page-load micro-interactions ─── */
  @keyframes pageRise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes navFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes navSlideIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes kpiCount {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes barGrow {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }
  @keyframes donutDraw {
    from { stroke-dashoffset: var(--dash-full, 600); }
    to   { stroke-dashoffset: var(--dash-final, 0); }
  }
  @keyframes rowSlide {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Stagger children of page root on mount */
  [data-page] > *:not(.no-page-anim) {
    animation: pageRise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  [data-page] > *:nth-child(1) { animation-delay: 0.00s; }
  [data-page] > *:nth-child(2) { animation-delay: 0.05s; }
  [data-page] > *:nth-child(3) { animation-delay: 0.10s; }
  [data-page] > *:nth-child(4) { animation-delay: 0.15s; }
  [data-page] > *:nth-child(5) { animation-delay: 0.20s; }
  [data-page] > *:nth-child(6) { animation-delay: 0.25s; }
  [data-page] > *:nth-child(7) { animation-delay: 0.30s; }
  [data-page] > *:nth-child(n+8) { animation-delay: 0.35s; }

  /* KPI tiles: subtle count-up rise */
  [data-kpi-grid] > * {
    animation: kpiCount 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  [data-kpi-grid] > *:nth-child(1) { animation-delay: 0.10s; }
  [data-kpi-grid] > *:nth-child(2) { animation-delay: 0.18s; }
  [data-kpi-grid] > *:nth-child(3) { animation-delay: 0.26s; }
  [data-kpi-grid] > *:nth-child(4) { animation-delay: 0.34s; }

  /* Allocation/progress bars */
  [data-bar-fill] {
    transform-origin: left center;
    animation: barGrow 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.35s;
  }

  /* Table rows */
  [data-row] {
    animation: rowSlide 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  [data-row]:nth-child(1) { animation-delay: 0.30s; }
  [data-row]:nth-child(2) { animation-delay: 0.36s; }
  [data-row]:nth-child(3) { animation-delay: 0.42s; }
  [data-row]:nth-child(4) { animation-delay: 0.48s; }
  [data-row]:nth-child(5) { animation-delay: 0.54s; }
  [data-row]:nth-child(6) { animation-delay: 0.60s; }
  [data-row]:nth-child(7) { animation-delay: 0.66s; }
  [data-row]:nth-child(n+8) { animation-delay: 0.72s; }

  /* Donut chart arc draw */
  [data-donut-arc] {
    stroke-dasharray: var(--dash-total, 600);
    stroke-dashoffset: var(--dash-total, 600);
    animation: donutDraw 1.0s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  [data-donut-arc]:nth-child(1) { animation-delay: 0.20s; }
  [data-donut-arc]:nth-child(2) { animation-delay: 0.28s; }
  [data-donut-arc]:nth-child(3) { animation-delay: 0.36s; }
  [data-donut-arc]:nth-child(4) { animation-delay: 0.44s; }
  [data-donut-arc]:nth-child(5) { animation-delay: 0.52s; }

  /* Sidebar items enter */
  [data-sidebar-item] {
    animation: navSlideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  /* Respect reduced-motion preferences */
  @media (prefers-reduced-motion: reduce) {
    [data-page] > *, [data-kpi-grid] > *, [data-bar-fill],
    [data-row], [data-donut-arc], [data-sidebar-item] {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      stroke-dashoffset: 0 !important;
    }
  }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; width: 300px;
    background: var(--bg-canvas); border: 1px solid var(--line-1);
    border-radius: 14px; box-shadow: 0 18px 48px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.06);
    padding: 18px 18px 16px; z-index: 90;
    font-size: 13px;
  }
  .tweaks-panel h4 { margin: 0 0 12px; font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .tweaks-panel .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--line-1); }
  .tweaks-panel .row:first-of-type { border-top: none; }
  .tweaks-panel label { color: var(--ink-2); }
  .swatches { display: flex; gap: 6px; flex-wrap: wrap; max-width: 200px; }
  .swatches button { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--line-2); cursor: pointer; padding: 0; }
  .swatches button.active { border-color: var(--ink-1); transform: scale(1.08); }
  .tweak-select { height: 28px; border-radius: 6px; border: 1px solid var(--line-2); background: var(--bg-canvas); color: var(--ink-1); padding: 0 8px; font-size: 12px; }

  /* ─── Terminal theme overrides (apply in BOTH light + dark) ─── */
  body { font-feature-settings: normal; }

  /* Lock dark-mode accent to bright terminal lime; light mode flows from accent swatch */
  .dark { --accent-plum: #45d59b !important; --accent-plum-soft: rgba(69,213,155,0.18) !important; --accent-plum-on: #0A1106 !important; --accent-grad: linear-gradient(135deg, #45d59b, #29b07d) !important; }

  /* Tables — hairline dividers, sentence-case headers, no fill on th row */
  table thead tr { background: transparent !important; }
  table thead th {
    font-size: 11.5px !important;
    color: var(--ink-3) !important;
    font-weight: 500 !important;
    border-bottom: 1px solid var(--line-1) !important;
    background: transparent !important;
  }
  table tbody tr:hover td { background: var(--glass-bg) !important; }

  /* KPI tile — refined terminal style with numbered badge */
  [data-kpi-grid] > * {
    background: var(--bg-card) !important;
    backdrop-filter: none !important;
    border-radius: 10px !important;
    padding: 18px 20px 16px !important;
    position: relative !important;
  }
  body:not(.dark) [data-kpi-grid] > * { border: 1px solid var(--line-1) !important; }
  [data-kpi-grid] > *::before {
    content: attr(data-kpi-num);
    position: absolute; top: 14px; right: 14px;
    width: 18px; height: 18px;
    border: 1px solid var(--line-2); border-radius: 4px;
    color: var(--ink-3); font-size: 9.5px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  [data-kpi-grid] > *:not([data-kpi-num])::before { display: none; }
  [data-kpi-grid] > * > div:first-child {
    font-size: 11.5px !important;
    color: var(--ink-3) !important;
    font-weight: 500 !important;
    margin-bottom: 16px !important;
  }
  [data-kpi-grid] > * > div:nth-child(2) {
    margin-bottom: 24px !important;
  }
  [data-kpi-grid] > * > div:nth-child(3) {
    color: var(--ink-2) !important;
    margin-top: 0 !important;
  }

  /* Buttons — terminal corner radii (6px); icon/avatar stay circular */
  button { border-radius: 6px !important; }
  .icon-btn, .avatar-btn, .avatar-btn .avatar-circle { border-radius: 50% !important; }
  .swatches button { border-radius: 50% !important; }
  .tab-btn { border-radius: 0 !important; }

  /* Duration profile graph — sharper corners (colour driven by JSX from accent) */
  [data-duration-bar] { border-radius: 4px !important; border: none !important; }

  /* Comments thread (giscus) */
  .comments { max-width: 1200px; margin: 0 auto; padding: 48px 40px 96px; border-top: 1px solid var(--line-1); background: var(--bg-canvas); font-family: 'Inter', sans-serif; }
  .comments h2 { font-size: 22px; font-weight: 600; margin: 0 0 6px; color: var(--ink-1); letter-spacing: -0.01em; }
  .comments .comments-sub { font-size: 13px; color: var(--ink-2); margin-bottom: 28px; }

  /* ─── Cinematic mode ─── */
  .cinematic-camera {
    position: relative;
    transform-origin: 0 0;
    will-change: transform;
  }
  #cine-cursor {
    position: fixed;
    width: 30px;
    height: 30px;
    pointer-events: none;
    z-index: 9999;
    top: 0;
    left: 0;
    opacity: 0;
    will-change: transform, opacity;
  }
  #cine-cursor svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 3px 9px rgba(0,0,0,0.30));
  }
  #cine-cursor .cursor-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 2px solid rgba(29,125,89,0.6);
    opacity: 0;
    will-change: transform, opacity;
  }
  #cine-toast {
    position: fixed;
    top: 24px;
    right: 24px;
    width: 320px;
    background: var(--bg-canvas);
    border: 1px solid var(--line-1);
    border-left: 3px solid var(--accent-plum);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    z-index: 9998;
    opacity: 0;
    transform: translateX(20px);
    will-change: transform, opacity;
  }
  #cine-toast .toast-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent-plum);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    flex-shrink: 0;
  }
  #cine-toast .toast-text {
    font-size: 13px;
    color: var(--ink-1);
    font-weight: 500;
    line-height: 1.4;
  }

  /* Hide Save Draft in cinematic mode so Create gets full width */
  body.cine-active [data-cine="save-draft"] { display: none !important; }

  /* Active input field — white border + soft diffused glow */
  [data-cine^="field-"].cine-active-input {
    border-color: #ffffff !important;
    box-shadow:
      0 0 0 1px rgba(69, 213, 155, 0.20),
      0 0 36px 8px rgba(69, 213, 155, 0.35) !important;
    background: var(--bg-canvas) !important;
    transition: box-shadow 0.35s ease, border-color 0.35s ease !important;
  }

  /* Create-button loader state */
  @keyframes cine-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .cine-create-loading {
    pointer-events: none;
    display: inline-flex !important;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .cine-create-loading svg {
    width: 16px; height: 16px;
    animation: cine-spin 1s linear infinite;
  }

  /* Fake dropdown popover (used to visualise the Fee tier selection) */
  #cine-fake-dropdown {
    background: var(--bg-canvas);
    border: 1px solid var(--line-2);
    border-radius: 10px;
    box-shadow: 0 12px 36px rgba(0,0,0,0.14);
    padding: 6px;
    z-index: 70;
    color: var(--ink-1);
    pointer-events: none;
    opacity: 0;
    transform: translateY(-6px);
    will-change: transform, opacity;
  }
  #cine-fake-dropdown .cine-dd-item {
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.2;
    transition: background-color 0.15s, color 0.15s;
  }
  #cine-fake-dropdown .cine-dd-item.cine-dd-highlight {
    background: var(--bg-subtle);
    color: var(--ink-1);
    font-weight: 500;
  }

  /* Confirmation modal */
  #cine-modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    will-change: opacity;
  }
  #cine-modal .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
  }
  #cine-modal .modal-card {
    position: relative;
    background: var(--bg-canvas);
    border-radius: 14px;
    width: 440px;
    padding: 36px 32px 28px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.20);
    text-align: center;
    transform: translateY(12px) scale(0.98);
    will-change: transform;
  }
  #cine-modal .modal-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent-plum);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
  }
  #cine-modal .modal-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--ink-1);
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  #cine-modal .modal-sub {
    font-size: 13px;
    color: var(--ink-2);
    margin-bottom: 20px;
  }
  #cine-modal .modal-cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 38px;
    padding: 0 18px;
    background: var(--ink-1);
    color: var(--bg-canvas);
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
  }
</style>

/* ─────────────────────────── CHART ─────────────────────────── */
// Generate deterministic NAV history series
function makeSeries(days, base, trend, volatility, seed=1) {
  const out = [];
  let v = base;
  let r = seed;
  for (let i = 0; i < days; i++) {
    r = (r * 9301 + 49297) % 233280;
    const rand = r / 233280 - 0.5;
    v += trend + rand * volatility;
    out.push(v);
  }
  return out;
}

function NavChart({ range, height = 280 }) {
  const ref = useRef(null);
  const [hover, setHover] = useState(null);
  const [w, setW] = useState(800);

  useEffect(() => {
    const ro = new ResizeObserver(() => { if (ref.current) setW(ref.current.clientWidth); });
    if (ref.current) ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);

  const days = { '1W': 7, '1M': 30, '3M': 90, 'YTD': 38, '1Y': 365, 'All': 730 }[range] || 30;
  const series = useMemo(() => makeSeries(days, 45000000, 10000, 220000, 7), [days]);
  const pad = { l: 56, r: 16, t: 14, b: 28 };
  const H = height;
  const W = w;
  const min = Math.min(...series) * 0.995;
  const max = Math.max(...series) * 1.005;
  const sx = i => pad.l + (W - pad.l - pad.r) * (i / (series.length - 1));
  const sy = v => pad.t + (H - pad.t - pad.b) * (1 - (v - min) / (max - min));

  const path = series.map((v, i) => `${i===0?'M':'L'}${sx(i)},${sy(v)}`).join(' ');
  const area = path + ` L${sx(series.length-1)},${H-pad.b} L${sx(0)},${H-pad.b} Z`;

  // secondary dashed series (NAV/share) — flatter trend
  const share = useMemo(() => makeSeries(days, 98, 0.02, 0.55, 13), [days]);
  const smin = Math.min(...share) * 0.99;
  const smax = Math.max(...share) * 1.01;
  const syS = v => pad.t + (H - pad.t - pad.b) * (1 - (v - smin) / (smax - smin));
  const pathS = share.map((v, i) => `${i===0?'M':'L'}${sx(i)},${syS(v)}`).join(' ');

  const yTicks = 4;
  const yLabels = Array.from({length: yTicks}, (_,i) => {
    const v = min + (max - min) * (1 - i / (yTicks - 1));
    const y = pad.t + (H - pad.t - pad.b) * (i / (yTicks - 1));
    return { v, y, label: `$${(v/1e6).toFixed(1)}M` };
  });

  // x-axis labels
  const xLabels = [0, 0.25, 0.5, 0.75, 1].map(t => {
    const i = Math.round((series.length - 1) * t);
    const d = new Date();
    d.setDate(d.getDate() - (days - 1 - i));
    return { i, label: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) };
  });

  function onMove(e) {
    const r = ref.current.getBoundingClientRect();
    const x = e.clientX - r.left;
    const frac = Math.max(0, Math.min(1, (x - pad.l) / (W - pad.l - pad.r)));
    const i = Math.round(frac * (series.length - 1));
    setHover({ i, x: sx(i), y: sy(series[i]), ys: syS(share[i]), v: series[i], s: share[i] });
  }

  return (
    <div ref={ref} style={{ position: 'relative' }} onMouseMove={onMove} onMouseLeave={() => setHover(null)}>
      <svg width={W} height={H} style={{ display: 'block' }}>
        <defs>
          <linearGradient id="area-grad-chart" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="var(--green-700)" stopOpacity="0.14"/>
            <stop offset="100%" stopColor="var(--green-700)" stopOpacity="0"/>
          </linearGradient>
        </defs>
        {yLabels.map((t, i) => (
          <g key={i}>
            <line x1={pad.l} y1={t.y} x2={W-pad.r} y2={t.y} stroke="var(--line-1)" strokeDasharray={i===yLabels.length-1?'':'2 3'}/>
            <text x={pad.l - 10} y={t.y + 4} textAnchor="end" fontSize="10.5" fill="var(--ink-3)" fontFamily="Inter">{t.label}</text>
          </g>
        ))}
        {xLabels.map((t, i) => (
          <text key={i} x={sx(t.i)} y={H-8} textAnchor={i===0?'start':i===xLabels.length-1?'end':'middle'} fontSize="10.5" fill="var(--ink-3)" fontFamily="Inter">{t.label}</text>
        ))}
        <path d={area} fill="url(#area-grad-chart)"/>
        <path d={path} fill="none" stroke="var(--green-700)" strokeWidth="1.75"/>
        <path d={pathS} fill="none" stroke="var(--info-fg)" strokeWidth="1.25" strokeDasharray="3 3" opacity="0.9"/>
        {hover && (
          <g>
            <line x1={hover.x} y1={pad.t} x2={hover.x} y2={H-pad.b} stroke="var(--ink-3)" strokeDasharray="2 2"/>
            <circle cx={hover.x} cy={hover.y} r="4" fill="var(--green-700)" stroke="var(--bg-canvas)" strokeWidth="2"/>
            <circle cx={hover.x} cy={hover.ys} r="3.5" fill="var(--info-fg)" stroke="var(--bg-canvas)" strokeWidth="2"/>
          </g>
        )}
      </svg>
      {hover && (
        <div style={{
          position: 'absolute',
          left: Math.min(hover.x + 12, W - 190),
          top: Math.max(hover.y - 60, 8),
          background: 'var(--bg-canvas)',
          border: '1px solid var(--line-2)',
          borderRadius: '8px',
          padding: '10px 12px',
          fontSize: '12px',
          boxShadow: '0 4px 16px rgba(0,0,0,0.08)',
          minWidth: 180,
          pointerEvents: 'none',
          fontVariantNumeric: 'tabular-nums',
        }}>
          <div style={{ color: 'var(--ink-3)', fontSize: 11, marginBottom: 4 }}>
            {(() => { const d = new Date(); d.setDate(d.getDate() - (days - 1 - hover.i)); return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }); })()}
          </div>
          <div style={{ display:'flex', justifyContent:'space-between', gap: 12, marginBottom: 2 }}>
            <span style={{color:'var(--ink-2)'}}>Fund NAV</span>
            <b>${(hover.v/1e6).toFixed(2)}M</b>
          </div>
          <div style={{ display:'flex', justifyContent:'space-between', gap: 12 }}>
            <span style={{color:'var(--ink-2)'}}>NAV / share</span>
            <b>${hover.s.toFixed(2)}</b>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────── DONUT ─────────────────────────── */
function Donut({ slices, total, label = 'NAV' }) {
  const sum = slices.reduce((s, x) => s + x.value, 0);
  let cum = 0;
  const stops = slices.map(s => {
    const a = cum / sum * 100;
    cum += s.value;
    const b = cum / sum * 100;
    return `${s.color} ${a.toFixed(2)}% ${b.toFixed(2)}%`;
  }).join(', ');
  return (
    <div style={{ width: 200, height: 200, borderRadius: '50%', position: 'relative', background: `conic-gradient(${stops})` }}>
      <div style={{ position: 'absolute', inset: 30, borderRadius: '50%', background: 'var(--bg-canvas)', boxShadow: 'inset 0 0 0 1px var(--line-1)' }}/>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none' }}>
        <div style={{ fontSize: 11.5, color: 'var(--ink-3)', fontWeight: 500 }}>{label}</div>
        <div style={{ fontSize: 22, fontWeight: 600, letterSpacing: '-0.01em', fontVariantNumeric: 'tabular-nums', marginTop: 2 }}>{total}</div>
        <div style={{ fontSize: 11, color: 'var(--ink-2)', marginTop: 2 }}>{slices.length} assets</div>
      </div>
    </div>
  );
}

/* ─────────────────────────── CHROME ─────────────────────────── */
function NextDealingCountdown() {
  const targetRef = React.useRef(null);
  if (targetRef.current === null) {
    const initialMs = (3 * 24 * 3600 + 14 * 3600 + 22 * 60) * 1000;
    targetRef.current = Date.now() + initialMs;
  }
  const [, setTick] = React.useState(0);
  React.useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, []);
  const remaining = Math.max(0, targetRef.current - Date.now());
  const days = Math.floor(remaining / 86_400_000);
  const hours = Math.floor((remaining % 86_400_000) / 3_600_000);
  const mins = Math.floor((remaining % 3_600_000) / 60_000);
  const secs = Math.floor((remaining % 60_000) / 1000);
  const pad = n => String(n).padStart(2, '0');
  return (
    <span style={{fontSize:12.5,color:'var(--ink-2)',whiteSpace:'nowrap',fontVariantNumeric:'tabular-nums'}}>
      Next dealing · {pad(days)}d {pad(hours)}h {pad(mins)}m {pad(secs)}s
    </span>
  );
}

// ---------- Helpers ----------
function DonutChart({ assets, activeAsset, onHover }) {
  const total = assets.reduce((s,a) => s + a.pct, 0);
  const SIZE = 300;
  const VB = 200;
  const cx = VB / 2, cy = VB / 2;
  const R = 78;
  const STROKE = 14;
  const GAP_DEG = 1;

  const slices = [];
  let cumDeg = -90;
  assets.forEach(a => {
    const sweep = (a.pct / total) * 360;
    slices.push({
      id: a.id,
      sym: a.sym,
      color: a.donutColor,
      pct: a.pct,
      startDeg: cumDeg + GAP_DEG / 2,
      endDeg: cumDeg + sweep - GAP_DEG / 2,
      midDeg: cumDeg + sweep / 2,
    });
    cumDeg += sweep;
  });

  const polar = (deg, r) => {
    const rad = deg * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  };

  const arcPath = (startDeg, endDeg) => {
    const [x1, y1] = polar(startDeg, R);
    const [x2, y2] = polar(endDeg, R);
    const large = (endDeg - startDeg) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;
  };

  const active = slices.find(s => s.id === activeAsset);

  const project = (deg, r) => {
    const rad = deg * Math.PI / 180;
    return {
      x: SIZE / 2 + (r * Math.cos(rad) / VB) * SIZE,
      y: SIZE / 2 + (r * Math.sin(rad) / VB) * SIZE,
    };
  };

  const callout = active ? (() => {
    const edge = project(active.midDeg, R + STROKE / 2);
    const stub = project(active.midDeg, R + STROKE / 2 + 22);
    const above = Math.sin(active.midDeg * Math.PI / 180) < 0;
    return { edge, stub, above };
  })() : null;

  return (
    <div style={{position:'relative',width:SIZE,height:SIZE,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={SIZE} height={SIZE} viewBox={`0 0 ${VB} ${VB}`} style={{overflow:'visible',position:'absolute',inset:0}}>
        {slices.map((s,i) => {
          const dimmed = activeAsset && s.id !== activeAsset;
          return (
            <path key={i} d={arcPath(s.startDeg, s.endDeg)}
              fill="none"
              stroke={dimmed ? 'var(--ink-4)' : s.color}
              strokeWidth={STROKE}
              opacity={dimmed ? 0.4 : 1}
              style={{transition:'stroke 0.25s, opacity 0.25s',cursor:'pointer'}}
              onMouseEnter={() => onHover && onHover(s.id)}
              onMouseLeave={() => onHover && onHover(null)}
            />
          );
        })}
      </svg>

      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',pointerEvents:'none'}}>
        <div style={{fontSize:11.5,color:'var(--ink-3)',fontWeight:500}}>NAV</div>
        <div style={{fontSize:28,fontWeight:500,letterSpacing:'-0.05em',fontVariantNumeric:'tabular-nums',marginTop:2}}>$47.46M</div>
        <div style={{fontSize:12,color:'var(--ink-3)',marginTop:2}}>{assets.length} assets</div>
      </div>

      {callout && (
        <>
          <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`}
            style={{position:'absolute',left:0,top:0,pointerEvents:'none',overflow:'visible'}}>
            <line x1={callout.edge.x} y1={callout.edge.y}
                  x2={callout.stub.x} y2={callout.stub.y}
                  stroke="var(--ink-3)" strokeWidth="1" opacity="0.5"/>
            <circle cx={callout.edge.x} cy={callout.edge.y} r="2" fill={active.color}/>
          </svg>
          <div style={{
            position:'absolute',
            left: callout.stub.x,
            top: callout.stub.y + (callout.above ? -10 : 10),
            transform: callout.above ? 'translate(-50%, -100%)' : 'translate(-50%, 0)',
            display:'inline-flex',alignItems:'center',gap:8,
            fontSize:12,fontWeight:500,
            whiteSpace:'nowrap',
            pointerEvents:'none',
            transition:'left 0.25s ease, top 0.25s ease',
          }}>
            <span style={{width:8,height:8,borderRadius:'50%',background:active.color}}/>
            <span style={{color:'var(--ink-1)'}}>{active.sym}</span>
            <span style={{color:'var(--ink-3)',fontVariantNumeric:'tabular-nums'}}>{active.pct}%</span>
          </div>
        </>
      )}
    </div>
  );
}

    </div>

}

function PerformanceChart({ range }) {
  const def = RANGE_DEFS.find(d => d.k === range);
  const days = def.days;
  const portSlice  = MASTER_PORTFOLIO.slice(-days - 1);
  const benchSlice = MASTER_BENCHMARK.slice(-days - 1);
  const port  = portSlice.map(v => v - portSlice[0]);
  const bench = benchSlice.map(v => v - benchSlice[0]);

  const allVals = [...port, ...bench, 0];
  const yMin = Math.floor(Math.min(...allVals) / 10) * 10;
  const yMax = Math.ceil(Math.max(...allVals) / 10) * 10;

  const W = 1000, H = 300, LABEL_W = 80;
  const xScale = i => (i / (port.length - 1)) * W;
  const yScale = v => H - ((v - yMin) / (yMax - yMin)) * H;

  const portPath  = port.map((v,i)  => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(v).toFixed(1)}`).join(' ');
  const portFill  = `${portPath} L${xScale(port.length-1).toFixed(1)},${H} L${xScale(0).toFixed(1)},${H} Z`;
  const benchPath = bench.map((v,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(v).toFixed(1)}`).join(' ');

  const ticks = [];
  for (let t = yMin; t <= yMax; t += 10) ticks.push(t);

  const today = new Date('2026-04-30');
  const xLabelCount = days <= 30 ? 4 : days <= 95 ? 5 : days <= 180 ? 6 : 7;
  const xLabels = [];
  for (let i = 0; i < xLabelCount; i++) {
    const fraction = i / (xLabelCount - 1);
    const dataIndex = Math.round(fraction * (port.length - 1));
    const daysAgo = port.length - 1 - dataIndex;
    const d = new Date(today); d.setDate(d.getDate() - daysAgo);
    xLabels.push({ pct: fraction * 100, text: d.toLocaleDateString('en-US', { month: 'short' }) });
  }

  const portLast  = port[port.length - 1];
  const benchLast = bench[bench.length - 1];
  const fmt = v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%';

  const [hover, setHover] = _u1(null);
  const wrapRef = React.useRef(null);

  const onMove = (e) => {
    const rect = wrapRef.current.getBoundingClientRect();
    const chartW = rect.width - LABEL_W;
    const xPx = e.clientX - rect.left;
    if (xPx < 0 || xPx > chartW) { setHover(null); return; }
    const fraction = xPx / chartW;
    const idx = Math.max(0, Math.min(port.length - 1, Math.round(fraction * (port.length - 1))));
    setHover(idx);
  };

  let tooltip = null;
  if (hover != null) {
    const daysAgo = port.length - 1 - hover;
    const d = new Date(today); d.setDate(d.getDate() - daysAgo);
    const dateLabel = d.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: '2-digit' });
    const xPct = (hover / (port.length - 1)) * 100;
    const onLeftSide = xPct < 50;
    tooltip = {
      portVal: port[hover],
      benchVal: bench[hover],
      dateLabel,
      xPct,
      onLeftSide,
    };
  }

  return (
    <div ref={wrapRef} onMouseMove={onMove} onMouseLeave={() => setHover(null)} style={{position:'relative', height: H + 28, paddingRight: LABEL_W}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} preserveAspectRatio="none" style={{display:'block', overflow:'visible'}}>
        <defs>
          <linearGradient id="portGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#4080FF" stopOpacity="0.40"/>
            <stop offset="100%" stopColor="#4080FF" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <line x1="0" y1={yScale(0)} x2={W} y2={yScale(0)} stroke="var(--line-2)" strokeWidth="1" vectorEffect="non-scaling-stroke"/>
        <path d={portFill} fill="url(#portGrad)"/>
        <path d={portPath}  fill="none" stroke="#4080FF" strokeWidth="1.5" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>
        <path d={benchPath} fill="none" stroke="#5ed9b5" strokeWidth="1.5" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>
        {hover != null && (
          <line x1={xScale(hover)} y1={0} x2={xScale(hover)} y2={H} stroke="var(--ink-3)" strokeWidth="1" vectorEffect="non-scaling-stroke" opacity="0.6" style={{pointerEvents:'none'}}/>
        )}
      </svg>

      {hover != null && (
        <>
          <div style={{
            position:'absolute',
            left: `calc((100% - ${LABEL_W}px) * ${hover/(port.length-1)})`,
            top: yScale(port[hover]),
            width: 10, height: 10, borderRadius: '50%',
            background: '#5b9bff',
            border: '2px solid var(--bg-canvas)',
            transform: 'translate(-50%, -50%)',
            pointerEvents:'none',
            zIndex: 2,
          }}/>
          <div style={{
            position:'absolute',
            left: `calc((100% - ${LABEL_W}px) * ${hover/(port.length-1)})`,
            top: yScale(bench[hover]),
            width: 10, height: 10, borderRadius: '50%',
            background: '#6dd9b1',
            border: '2px solid var(--bg-canvas)',
            transform: 'translate(-50%, -50%)',
            pointerEvents:'none',
            zIndex: 2,
          }}/>
        </>
      )}

      {/* Y-axis labels */}
      {ticks.map(t => (
        <div key={t} style={{
          position:'absolute', right: 0, top: yScale(t),
          transform:'translateY(-50%)',
          fontSize: 11, color:'var(--ink-3)',
          fontVariantNumeric:'tabular-nums',
          paddingLeft: 8, lineHeight: 1, pointerEvents:'none',
        }}>{t.toFixed(2)}%</div>
      ))}

      {/* X-axis labels */}
      {xLabels.map((l, i) => (
        <div key={i} style={{
          position:'absolute',
          left: `calc((100% - ${LABEL_W}px) * ${l.pct/100})`,
          top: H + 8,
          transform:'translateX(-50%)',
          fontSize: 11, color:'var(--ink-3)', whiteSpace:'nowrap',
        }}>{l.text}</div>
      ))}

      {/* Legend pills at end of each line — filled, two-tone */}
      <div style={{position:'absolute', right: 0, top: yScale(benchLast), transform:'translateY(-50%)', display:'inline-flex', alignItems:'stretch', fontSize:12, fontWeight:500, lineHeight:1.4, zIndex:2}}>
        <span style={{background:'#6dd9b1', color:'#0e3829', padding:'3px 8px', borderRadius:'5px 0 0 5px'}}>BTCUSD</span>
        <span style={{background:'#a3e7ce', color:'#0e3829', padding:'3px 8px', borderRadius:'0 5px 5px 0', fontVariantNumeric:'tabular-nums'}}>{fmt(benchLast)}</span>
      </div>
      <div style={{position:'absolute', right: 0, top: yScale(portLast), transform:'translateY(-50%)', display:'inline-flex', alignItems:'stretch', fontSize:12, fontWeight:500, lineHeight:1.4, zIndex:2}}>
        <span style={{background:'#5b9bff', color:'#0c1f4a', padding:'3px 8px', borderRadius:'5px 0 0 5px'}}>Portfolio</span>
        <span style={{background:'#a5c4ff', color:'#0c1f4a', padding:'3px 8px', borderRadius:'0 5px 5px 0', fontVariantNumeric:'tabular-nums'}}>{fmt(portLast)}</span>
      </div>

      {/* Crosshair tooltip */}
      {tooltip && (
        <div style={{
          position:'absolute',
          left: `calc((100% - ${LABEL_W}px) * ${tooltip.xPct/100})`,
          top: 16,
          transform: tooltip.onLeftSide ? 'translate(12px, 0)' : 'translate(calc(-100% - 12px), 0)',
          background:'rgba(28, 30, 36, 0.96)',
          backdropFilter:'blur(8px)',
          WebkitBackdropFilter:'blur(8px)',
          border:'1px solid rgba(255,255,255,0.08)',
          borderRadius:8,
          padding:'10px 14px',
          color:'#fff',
          fontSize:13,
          fontFamily:'inherit',
          pointerEvents:'none',
          zIndex:3,
          minWidth:200,
          boxShadow:'0 4px 16px rgba(0,0,0,0.3)',
        }}>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:6}}>
            <span style={{display:'inline-flex',alignItems:'center',gap:8}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:'#5b9bff'}}/>
              <span style={{fontWeight:500}}>Portfolio</span>
            </span>
            <span style={{marginLeft:'auto',fontVariantNumeric:'tabular-nums',fontWeight:500}}>{fmt(tooltip.portVal)}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <span style={{display:'inline-flex',alignItems:'center',gap:8}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:'#6dd9b1'}}/>
              <span style={{fontWeight:500}}>BTCUSD</span>
            </span>
            <span style={{marginLeft:'auto',fontVariantNumeric:'tabular-nums',fontWeight:500}}>{fmt(tooltip.benchVal)}</span>
          </div>
          <div style={{textAlign:'center',color:'rgba(255,255,255,0.55)',fontSize:11.5,marginTop:8,paddingTop:8,borderTop:'1px solid rgba(255,255,255,0.10)'}}>{tooltip.dateLabel}</div>
        </div>
      )}
    </div>
  );
}

function RiskCard({ title, value, peerValue, peerLabel, verdict }) {
  const delta = value - peerValue;
  const isPos = delta > 0.001;
  const isNeg = delta < -0.001;
  const arrow = isPos ? '↑' : isNeg ? '↓' : '=';
  const deltaColor = isPos ? 'var(--pos)' : isNeg ? 'var(--neg)' : 'var(--ink-3)';
  const valueColor = value < 0 ? 'var(--neg)' : 'var(--ink-1)';
  const fmt = v => v.toFixed(2);
  return (
    <div style={{background:'var(--glass-bg)',backdropFilter:'blur(10px)',borderRadius:12,padding:'20px 24px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:14,fontWeight:500,color:'var(--ink-2)'}}>{title}</span>
        <span aria-hidden="true" style={{
          display:'inline-flex',alignItems:'center',justifyContent:'center',
          width:14,height:14,borderRadius:'50%',
          background:'var(--bg-subtle)',color:'var(--ink-3)',
          fontSize:10,fontWeight:600,
        }}>?</span>
      </div>
      <div style={{display:'flex',alignItems:'baseline',gap:14,marginTop:10,flexWrap:'wrap'}}>
        <span style={{fontSize:32,fontWeight:500,letterSpacing:'-0.03em',color:valueColor,fontVariantNumeric:'tabular-nums',lineHeight:1}}>{fmt(value)}</span>
        <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:13}}>
          <span style={{color:deltaColor,fontWeight:500,fontVariantNumeric:'tabular-nums'}}>{arrow} {fmt(Math.abs(delta))}</span>

function RiskCheckList() {
  const checks = [
    { l: 'Source venue authenticated', d: 'API session valid · IP allowlist matched' },
    { l: 'Destination address whitelisted', d: 'Added 14 Jan 2026 by S. Patel' },
    { l: 'Counterparty risk within limits', d: 'Exposure to Coinbase Prime 24% of AUM · cap 35%' },
    { l: 'Travel rule info exchanged', d: 'Notabene attestation ok · reference NB-4817' },
    { l: 'AML & sanctions screening clear', d: 'Chainalysis KYT pass · risk score 0.08' },
    { l: 'Sufficient post-move buffer', d: 'Binance remaining cash covers 4.2× avg daily margin' },
  ];
  const [done, setDone] = React.useState(0);
  React.useEffect(() => {
    if (done >= checks.length) return;
    const t = setTimeout(() => setDone(d => d + 1), done === 0 ? 220 : 360);
    return () => clearTimeout(t);
  }, [done]);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div>
        <div style={{fontSize:16,fontWeight:500,marginBottom:4}}>Risk check</div>
        <div style={{fontSize:13,color:'var(--ink-2)'}}>Automated pre-flight checks. All must pass before you can sign.</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:0}}>
        {checks.map((c,i) => {
          const state = i < done ? 'done' : i === done ? 'running' : 'pending';
          return (
            <div key={i} style={{display:'flex',alignItems:'flex-start',gap:14,padding:'12px 2px',borderBottom: i===checks.length-1?'none':'1px solid var(--line-1)',opacity: state==='pending'?0.45:1,transition:'opacity 0.25s'}}>
              <div style={{width:22,height:22,borderRadius:'50%',flexShrink:0,marginTop:1,display:'inline-flex',alignItems:'center',justifyContent:'center',background: state==='done'?'var(--green-600)':'transparent',color: state==='done'?'#fff':'var(--ink-3)'}}>
                {state === 'done' && (
                  <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3.5 8 6.5 11 12.5 5"/></svg>
                )}
                {state === 'running' && (
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{animation:'rcSpin 0.9s linear infinite'}}>
                    <path d="M21 12a9 9 0 1 1-6.2-8.55" />
                  </svg>
                )}
                {state === 'pending' && (
                  <div style={{width:8,height:8,borderRadius:'50%',background:'var(--line-2)'}}/>
                )}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13.5,fontWeight:500,color:'var(--ink-1)'}}>{c.l}</div>
                <div style={{fontSize:12,color:'var(--ink-3)',marginTop:2}}>{c.d}</div>
              </div>
              {state === 'running' && <span style={{fontSize:11,color:'var(--ink-3)'}}>Checking…</span>}
              {state === 'done' && <span style={{fontSize:11,color:'var(--green-700)'}}>Pass</span>}
            </div>
          );
        })}
      </div>
      <style>{`@keyframes rcSpin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

function DurationDonut() {
  // Available 24.1%, In notice 13.5%, Locked 62.4%
  const segs = [
    { label: 'Available', pct: 24.1, color: 'var(--accent-plum)' },
    { label: 'In notice', pct: 13.5, color: 'color-mix(in oklab, var(--accent-plum) 55%, var(--bg-canvas))' },
    { label: 'Locked',    pct: 62.4, color: 'color-mix(in oklab, var(--accent-plum) 22%, var(--bg-canvas))' },
  ];
  const SIZE = 280, VB = 200;
  const cx = VB / 2, cy = VB / 2;
  const R = 78, STROKE = 14, GAP_DEG = 1;
  const total = segs.reduce((s,a) => s + a.pct, 0);

  const slices = [];
  let cumDeg = -90;
  segs.forEach(s => {
    const sweep = (s.pct / total) * 360;
    slices.push({
      color: s.color,
      startDeg: cumDeg + GAP_DEG / 2,
      endDeg:   cumDeg + sweep - GAP_DEG / 2,
    });
    cumDeg += sweep;
  });

  const polar = (deg, r) => {
    const rad = deg * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  };
  const arcPath = (startDeg, endDeg) => {
    const [x1, y1] = polar(startDeg, R);
    const [x2, y2] = polar(endDeg, R);
    const large = (endDeg - startDeg) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;
  };

  return (
    <div style={{position:'relative',width:SIZE,height:SIZE,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={SIZE} height={SIZE} viewBox={`0 0 ${VB} ${VB}`} style={{overflow:'visible',position:'absolute',inset:0}}>
        {slices.map((s,i) => (
          <path key={i} d={arcPath(s.startDeg, s.endDeg)}
            fill="none" stroke={s.color} strokeWidth={STROKE}
            style={{transition:'stroke 0.25s'}}
          />
        ))}
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',pointerEvents:'none'}}>
        <div style={{fontSize:11.5,color:'var(--ink-3)',fontWeight:500}}>Available</div>
        <div style={{fontSize:28,fontWeight:500,letterSpacing:'-0.05em',fontVariantNumeric:'tabular-nums',marginTop:2}}>24.1%</div>
        <div style={{fontSize:12,color:'var(--ink-3)',marginTop:2}}>$11.4M of AUM</div>
      </div>
    </div>
  );
}

          return <circle key={i} r={R} cx={0} cy={0} fill="none" stroke={s.color} strokeWidth={30} strokeDasharray={`${len} ${C}`} strokeDashoffset={off}/>;

    </svg>
  );
}

                <div style={{height:mgtH,background:'#1d7d59'}}/>

}

                ['emerald','#5edaa6'],
                ['jade','#1d7d59'],
                ['lime','#82e0b9'],
                ['chartreuse','#b1ecd2'],
              ].map(([k,c]) => (
                <button key={k} onClick={()=>setTweak('accent', k)} className={tweaks.accent===k?'active':''} style={{background:c}} title={k}/>
              ))}
            </div>
          </div>
          <div className="row">
            <label>Density</label>
            <select className="tweak-select" value={tweaks.density} onChange={e=>setTweak('density', e.target.value)}>
              <option value="comfortable">Comfortable</option>
              <option value="compact">Compact</option>
            </select>
          </div>
          <div className="row">
            <label>Jump to</label>
            <select className="tweak-select" value={route} onChange={e=>setRoute(e.target.value)}>
              <option value="overview">Overview</option>
              <option value="nav">NAV</option>
              <option value="order-book">Order book</option>
              <option value="collateral">Move collateral</option>
              <option value="share-register">Share register</option>
              <option value="share-classes">Share classes</option>
              <option value="reconciliation">Reconciliation</option>
              <option value="pnl">Profit & Loss</option>
              <option value="balance-sheet">Balance Sheet</option>
              <option value="economics">Economics</option>
            </select>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// Terminal-theme post-mount tagger:
// - numbers each KPI tile within its grid (data-kpi-num="01"…)
// - tags the duration profile bar (data-duration-bar) so dark CSS can recolor it
function applyTerminalTags() {
  document.querySelectorAll('[data-kpi-grid]').forEach(grid => {
    Array.from(grid.children).forEach((tile, i) => {
      tile.setAttribute('data-kpi-num', String(i + 1).padStart(2, '0'));
    });
  });
  // Duration profile: a flex row of 3 segments inside Share Register summary charts
  document.querySelectorAll('div').forEach(el => {
    if (el.dataset.durationBar) return;
    const txt = el.textContent || '';
    if (!/Duration profile/i.test(txt)) return;
    // Walk siblings to find the bar (a flex container with 3 colored % segments)
    const next = el.nextElementSibling;
    if (next && next.children.length === 3 && getComputedStyle(next).display === 'flex') {
      next.setAttribute('data-duration-bar', '1');
    }
  });
}
const obs = new MutationObserver(() => applyTerminalTags());
obs.observe(document.body, { childList: true, subtree: true });
window.addEventListener('load', applyTerminalTags);
setTimeout(applyTerminalTags, 100);
setTimeout(applyTerminalTags, 600);
</script>

<script id="cinematic-mode">
// Cinematic mode entry. Activates only when ?cine=1.
// See docs/superpowers/plans/2026-05-12-manager-os-cinematic-plan.md
(function() {
  if (!window.__CINE__) return;
  console.info('[cine] activated');
  document.body.classList.add('cine-active');

  const VIEWPORT = { w: 1920, h: 1080 };

  function $(name) { return document.querySelector(`[data-cine="${name}"]`); }

  function cameraTo(target, scale = 1, dur = 0.6, ease = 'expo.out') {
    const el = typeof target === 'string' ? $(target) : target;
    if (!el) { console.warn('[cine] cameraTo: target not found', target); return; }
    const camEl = document.querySelector('.cinematic-camera');
    const prevTransform = camEl.style.transform;
    camEl.style.transform = '';
    const rect = el.getBoundingClientRect();
    camEl.style.transform = prevTransform;
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    const x = VIEWPORT.w / 2 - tx * scale;
    const y = VIEWPORT.h / 2 - ty * scale;
    return gsap.to(camEl, { scale, x, y, duration: dur, ease });
  }

  function cameraSnap(target, scale = 1) {
    const el = typeof target === 'string' ? $(target) : target;
    if (!el) return;
    const camEl = document.querySelector('.cinematic-camera');
    const prevTransform = camEl.style.transform;
    camEl.style.transform = '';
    const rect = el.getBoundingClientRect();
    camEl.style.transform = prevTransform;
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    gsap.set(camEl, { scale, x: VIEWPORT.w / 2 - tx * scale, y: VIEWPORT.h / 2 - ty * scale });
  }

  // Identity reset — used for "wide shot" framing. Targeting page-root at
  // scale 1.0 would centre the (very tall) page in the 1080 viewport,
  // pushing the header out of frame. The wide shot is just no transform.
  function cameraReset(dur = 0, ease = 'quart.inOut') {
    const camEl = document.querySelector('.cinematic-camera');
    if (dur <= 0) return gsap.set(camEl, { scale: 1, x: 0, y: 0 });
    return gsap.to(camEl, { scale: 1, x: 0, y: 0, duration: dur, ease });
  }

  function waitForMount() {
    return new Promise(resolve => {
      const start = performance.now();
      const tick = () => {
        if ($('chart') && $('page-root') && $('add-class-btn')) return resolve();
        if (performance.now() - start > 5000) return resolve();
        requestAnimationFrame(tick);
      };
      tick();
    });
  }

  // ── Synthetic cursor ──
  let cursorEl;
  function ensureCursor() {
    if (cursorEl) return cursorEl;
    cursorEl = document.createElement('div');
    cursorEl.id = 'cine-cursor';
    cursorEl.innerHTML = `
      <svg viewBox="0 0 20 20">
        <path d="M2 2 L18 10 L10 11 L7 18 Z" fill="#0E0F12" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
      <div class="cursor-ring"></div>
    `;
    document.body.appendChild(cursorEl);
    return cursorEl;
  }
  function cursorTo(target, dur = 0.4, ease = 'cubic.inOut') {
    const el = typeof target === 'string' ? $(target) : target;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    return gsap.to(ensureCursor(), { x: cx - 15, y: cy - 15, duration: dur, ease });
  }
  // Send cursor to viewport center — used when a parallel cameraTo is
  // bringing the target to the centre, so the cursor lands where the
  // target will be (not where it is now).
  function cursorToCenter(dur = 0.5, ease = 'cubic.inOut') {
    return gsap.to(ensureCursor(), { x: 960 - 15, y: 540 - 15, duration: dur, ease });
  }
  // Dim peripheral sections of the Overview when the chart is the focus.
  // Active = chart at 100%; status panel, recent activity, share classes,
  // strategy, NAV tile and page header all → 20%.
  function focusChart(on) {
    const targets = ['nav-tile', 'page-header', 'status-panel', 'classes-section', 'recent-activity', 'strategy-section'];
    targets.forEach(name => {
      const el = $(name);
      if (!el) return;
      gsap.to(el, { opacity: on ? 0.20 : 1, duration: 0.4, ease: 'cubic.out' });
    });
  }

  // Dim everything in the sheet body EXCEPT the row containing the active
  // field. Pass null to restore all.
  function focusField(activeName) {
    const sheet = $('sheet');
    if (!sheet) return;
    const active = activeName ? sheet.querySelector(`[data-cine="${activeName}"]`) : null;
    // The active field's row = the direct child of sheet-body that contains it.
    // sheet structure: sheet > [topbar, body, footer]; body has many sibling
    // rows (title, section labels, field wrappers).
    const body = sheet.querySelector('[data-cine="sheet-footer"]')?.previousElementSibling
              || sheet.children[1]; // body div
    if (!body) return;
    const rows = Array.from(body.children);
    const activeRow = active ? rows.find(r => r === active || r.contains(active)) : null;
    rows.forEach(row => {
      const target = activeName == null ? 1 : (row === activeRow ? 1 : 0.20);
      gsap.to(row, { opacity: target, duration: 0.3, ease: 'cubic.out' });
    });
    // Also dim the topbar (Cancel button) and footer when focusing a field
    const topbar = sheet.children[0];
    const footer = $('sheet-footer');
    [topbar, footer].forEach(el => {
      if (!el) return;
      gsap.to(el, { opacity: activeName == null ? 1 : 0.20, duration: 0.3, ease: 'cubic.out' });
    });
    // Highlight active field — white border + halo glow
    document.querySelectorAll('[data-cine^="field-"]').forEach(el => {
      el.classList.toggle('cine-active-input', el.getAttribute('data-cine') === activeName);
    });
  }
  function cursorShow() { return gsap.to(ensureCursor(), { opacity: 1, duration: 0.2 }); }
  function cursorHide() { return gsap.to(ensureCursor(), { opacity: 0, duration: 0.2 }); }
  function cursorPulse() {
    const c = ensureCursor();
    const ring = c.querySelector('.cursor-ring');
    return gsap.timeline()
      .to(c, { scale: 0.85, duration: 0.08, ease: 'power2.out' })
      .to(c, { scale: 1.0, duration: 0.12, ease: 'back.out(2)' })
      .fromTo(ring, { opacity: 0.7, scale: 0.6 }, { opacity: 0, scale: 1.6, duration: 0.4, ease: 'power2.out' }, 0);
  }

  // ── Chart line draw-in ──
  // After setPerfRange, the chart SVG re-renders with new paths. We animate
  // each stroke path with stroke-dasharray so it draws in over ~500ms.
  function drawChartLines() {
    const chartEl = $('chart');
    if (!chartEl) return;
    // Wait one frame for React's re-render so we grab the NEW paths.
    requestAnimationFrame(() => {
      const paths = chartEl.querySelectorAll('svg path[fill="none"]');
      paths.forEach(p => {
        const len = p.getTotalLength();
        if (!isFinite(len) || len === 0) return;
        gsap.set(p, { strokeDasharray: len, strokeDashoffset: len });
        gsap.to(p, { strokeDashoffset: 0, duration: 0.6, ease: 'cubic.out' });
      });
      // Filled area: fade in
      const fills = chartEl.querySelectorAll('svg path[fill]:not([fill="none"])');
      fills.forEach(f => {
        gsap.fromTo(f, { opacity: 0 }, { opacity: 1, duration: 0.6, ease: 'cubic.out' });
      });
    });
  }

  // ── Portfolio-return number ticker ──
  function tickPortReturn(fromPct, toPct, dur = 0.35) {
    const el = $('port-return');
    if (!el) return;
    const obj = { v: fromPct };
    return gsap.to(obj, {
      v: toPct,
      duration: dur,
      ease: 'cubic.out',
      onUpdate: () => {
        const sign = obj.v >= 0 ? '+' : '−';
        el.textContent = sign + Math.abs(obj.v).toFixed(2) + '%';
      },
    });
  }

  // Observed from MASTER_PORTFOLIO. Default range is 3M.
  const PORT_RETURNS = { '3M': 20.00, '1M': 6.30, '1Y': 55.00 };

  // ── Toast ──
  let toastEl;
  function ensureToast(msg) {
    if (toastEl) {
      toastEl.querySelector('.toast-text').textContent = msg;
      return toastEl;
    }
    toastEl = document.createElement('div');
    toastEl.id = 'cine-toast';
    toastEl.setAttribute('data-cine', 'toast');
    toastEl.innerHTML = `
      <span class="toast-icon">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </span>
      <span class="toast-text">${msg}</span>
    `;
    document.body.appendChild(toastEl);
    return toastEl;
  }
  function showToast(msg) {
    const el = ensureToast(msg);
    return gsap.to(el, { opacity: 1, x: 0, duration: 0.4, ease: 'cubic.out' });
  }
  function hideToast() {
    if (!toastEl) return;
    return gsap.to(toastEl, { opacity: 0, x: 20, duration: 0.3, ease: 'cubic.in' });
  }

  // ── Fake dropdown (for select-style fields) ──
  // Renders a popover below the given field, optionally highlights one option.
  // Append inside the field's row so it inherits the camera's transform.
  function showFakeDropdown(fieldCineKey, options, highlightIdx) {
    const field = $(fieldCineKey);
    if (!field) return;
    const row = field.parentNode;
    let dd = document.getElementById('cine-fake-dropdown');
    if (!dd) {
      dd = document.createElement('div');
      dd.id = 'cine-fake-dropdown';
    }
    if (dd.parentNode !== row) {
      row.style.position = row.style.position || 'relative';
      row.appendChild(dd);
    }
    // Position below the field, full width (offsetTop/Left ignore transforms)
    dd.style.position = 'absolute';
    dd.style.top = (field.offsetTop + field.offsetHeight + 6) + 'px';
    dd.style.left = field.offsetLeft + 'px';
    dd.style.width = field.offsetWidth + 'px';
    dd.innerHTML = options.map((opt, i) =>
      `<div class="cine-dd-item${i === highlightIdx ? ' cine-dd-highlight' : ''}">${opt}</div>`
    ).join('');
    gsap.to(dd, { opacity: 1, y: 0, duration: 0.2, ease: 'expo.out' });
  }
  function highlightDropdown(idx) {
    const dd = document.getElementById('cine-fake-dropdown');
    if (!dd) return;
    Array.from(dd.children).forEach((it, i) => {
      it.classList.toggle('cine-dd-highlight', i === idx);
    });
  }
  function hideFakeDropdown() {
    const dd = document.getElementById('cine-fake-dropdown');
    if (!dd) return;
    return gsap.to(dd, { opacity: 0, y: -6, duration: 0.18, ease: 'cubic.in' });
  }

  // ── Create-button loader state ──
  function setCreateLoading(on) {
    const btn = $('create-btn');
    if (!btn) return;
    if (on) {
      btn.dataset.cineOriginalLabel = btn.textContent;
      btn.classList.add('cine-create-loading');
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
        <span>Creating&hellip;</span>
      `;
    } else {
      btn.classList.remove('cine-create-loading');
      btn.textContent = btn.dataset.cineOriginalLabel || 'Create Class';
    }
  }

  // ── Confirmation modal ──
  let modalEl;
  function ensureModal() {
    if (modalEl) return modalEl;
    modalEl = document.createElement('div');
    modalEl.id = 'cine-modal';
    modalEl.setAttribute('data-cine', 'modal');
    modalEl.innerHTML = `
      <div class="modal-backdrop"></div>
      <div class="modal-card">
        <div class="modal-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="modal-title">Share class created</div>
        <div class="modal-sub">Class B is now live and ready for subscriptions.</div>
        <button class="modal-cta">Done</button>
      </div>
    `;
    document.body.appendChild(modalEl);
    return modalEl;
  }
  function showModal() {
    const el = ensureModal();
    const card = el.querySelector('.modal-card');
    gsap.to(el, { opacity: 1, duration: 0.3, ease: 'cubic.out' });
    gsap.to(card, { y: 0, scale: 1, duration: 0.4, ease: 'back.out(1.4)' });
  }
  function hideModal() {
    if (!modalEl) return;
    const card = modalEl.querySelector('.modal-card');
    gsap.to(modalEl, { opacity: 0, duration: 0.3, ease: 'cubic.in' });
    gsap.to(card, { y: 12, scale: 0.98, duration: 0.3, ease: 'cubic.in' });
  }

  // ── Typewriter helpers ──
  // Schedule per-character setField calls onto the timeline.
  function typeFieldOnto(tl, key, text, startAt, perChar = 0.08) {
    for (let i = 1; i <= text.length; i++) {
      const t = startAt + i * perChar;
      tl.add(() => window.cine?.setField?.(key, text.slice(0, i)), t);
    }
  }
  // Instant set (dropdowns / non-typewriter fields).
  function setFieldOnto(tl, key, value, at) {
    tl.add(() => window.cine?.setField?.(key, value), at);
  }

  function buildTimeline() {
    const tl = gsap.timeline({ paused: true });

    tl
      // ── Intro: pageRise (0.0 → 0.5) ──
      .fromTo('[data-page]',
        { opacity: 0, y: 8 },
        { opacity: 1, y: 0, duration: 0.5, ease: 'cubic.out' }, 0)

      // ── Establish (0.0 → 0.8) ──
      .add(() => cameraReset(), 0)
      .to({}, { duration: 0.8 }, 0)

      // ── Zoom to chart + dim peripheral sections (0.8 → 1.4) ──
      .add(() => { cameraTo('chart', 1.8, 0.7, 'expo.out'); focusChart(true); }, 0.8)

      // ── Timeframe cycling 1M (initial) → 3M → 1Y (1.4 → 3.4) ──
      // Two clicks since we already start on 1M.
      .add(() => cursorShow(), 1.4)
      .add(() => cursorTo('toggle-3M', 0.5, 'cubic.inOut'), 1.4)
      .add(() => { window.cine.setPerfRange('3M'); cursorPulse(); drawChartLines(); }, 2.0)
      .add(() => tickPortReturn(PORT_RETURNS['1M'], PORT_RETURNS['3M']), 2.0)
      .add(() => cursorTo('toggle-1Y', 0.4, 'cubic.inOut'), 2.6)
      .add(() => { window.cine.setPerfRange('1Y'); cursorPulse(); drawChartLines(); }, 3.1)
      .add(() => tickPortReturn(PORT_RETURNS['3M'], PORT_RETURNS['1Y']), 3.1)

      // ── Pan to CTA — restore peripheral opacity so the CTA reads (3.7 → 4.4) ──
      .add(() => { cameraTo('add-class-btn', 1.8, 0.7, 'expo.out'); focusChart(false); }, 3.7)
      .add(() => cursorToCenter(0.7, 'expo.out'), 3.7)

      // ── Hold so the click reads (4.4 → 4.7) ──
      // ── Button press + sheet open (4.7) ──
      .add(() => {
        const btn = $('add-class-btn');
        if (btn) {
          gsap.fromTo(btn,
            { scale: 1 },
            { scale: 0.95, duration: 0.08, yoyo: true, repeat: 1, ease: 'power2.out' });
        }
        cursorPulse();
        window.cine?.openCreateSheet?.();
      }, 4.7)

      // ── Sheet slide-in shows full structure first (4.7 → 5.4) ──
      // Brief beat where ALL fields read at full opacity, then tighten.
      .add(() => cursorHide(), 5.0)

      // ── Tight zoom on Class name + fields dim (5.4 → 6.0) ──
      .add(() => { cameraTo('field-name', 2.2, 0.7, 'expo.out'); focusField('field-name'); }, 5.4)

      // ── Field micro-pans + focus (7.2 → 9.4) ── currency removed
      .add(() => { cameraTo('field-fee', 2.2, 0.35, 'expo.out'); focusField('field-fee'); }, 7.2)
      .add(() => { cameraTo('field-mgmt', 2.2, 0.35, 'expo.out'); focusField('field-mgmt'); }, 8.0)
      .add(() => { cameraTo('field-min', 2.2, 0.35, 'expo.out'); focusField('field-min'); }, 9.1)

      // ── Pull back to footer; cursor approaches Create button (10.6 → 11.4) ──
      .add(() => { focusField(null); cameraTo('sheet-footer', 1.4, 0.7, 'expo.out'); }, 10.6)
      .add(() => { cursorShow(); cursorTo('create-btn', 0.7, 'expo.out'); }, 10.7)

      // ── Cursor pulses + button-press flash + clickCreate + loader (11.5) ──
      .add(() => {
        const btn = $('create-btn');
        if (btn) {
          gsap.fromTo(btn,
            { scale: 1 },
            { scale: 0.95, duration: 0.08, yoyo: true, repeat: 1, ease: 'power2.out' });
        }
        cursorPulse();
        setCreateLoading(true);
      }, 11.5)

      // ── Cursor fades, loader runs for ~1s (11.7) ──
      .add(() => cursorHide(), 11.7)

      // ── Loader holds, then sheet closes + zoom out (12.2 → 13.0) ──
      .add(() => { setCreateLoading(false); window.cine?.closeSheet?.(); }, 12.2)
      .add(() => cameraReset(0.8, 'expo.out'), 12.4)

      // ── Confirmation modal appears (13.0) ──
      .add(() => showModal(), 13.0)

      // ── Hold on modal (13.0 → 14.6) ──
      .to({}, { duration: 1.6 }, 13.0)

      // ── Modal fades + outro (15.0 → 15.9) ──
      .add(() => hideModal(), 15.0)
      .to('[data-page]',
        { opacity: 0, y: -6, duration: 0.4, ease: 'cubic.in' }, 15.5);

    // ── Field fills (typewriter + dropdown) — currency removed ──
    const FEE_TIER_OPTS = ['Retail','Institutional','Seed','Platform','Bundled'];
    typeFieldOnto(tl, 'name', 'Class B', 6.00);                       // ~6.00 → 6.56

    // Fee tier: open dropdown → hover Institutional → commit + close
    tl.add(() => showFakeDropdown('field-fee', FEE_TIER_OPTS, -1), 7.40);
    tl.add(() => highlightDropdown(1), 7.55);                           // Institutional = idx 1
    tl.add(() => { window.cine?.setField?.('feeTier', 'Institutional'); hideFakeDropdown(); }, 7.80);

    typeFieldOnto(tl, 'mgmtNum', '1.50', 8.30);                       // ~8.30 → 8.62
    typeFieldOnto(tl, 'perfNum', '20',   8.70);                       // ~8.70 → 8.86
    // Min investment — feed pre-formatted strings so commas appear naturally
    const MIN_STEPS = ['1', '10', '100', '1,000', '10,000', '100,000'];
    MIN_STEPS.forEach((s, i) => {
      tl.add(() => window.cine?.setField?.('minInvestment', s), 9.40 + (i + 1) * 0.10);
    });

    return tl;
  }

  waitForMount().then(() => {
    cameraReset();
    // Initial state: chart on 1M (per design)
    if (window.cine?.setPerfRange) window.cine.setPerfRange('1M');
    window.cineTimeline = buildTimeline();
    window.cineTimeline.timeScale(0.5);  // play at half speed per feedback
    console.info('[cine] timeline built, base duration =', window.cineTimeline.duration().toFixed(2), 's, scaled =', (window.cineTimeline.duration() / window.cineTimeline.timeScale()).toFixed(2), 's');

    // Auto-play in regular browsers; loop for preview. Playwright/headless
    // pauses + scrubs explicitly so this is a no-op there.
    requestAnimationFrame(() => window.cineTimeline.play());
    window.cineTimeline.eventCallback('onComplete', () => {
      if (!/HeadlessChrome|Headless/.test(navigator.userAgent)) {
        setTimeout(() => {
          if (toastEl) toastEl.style.opacity = '0';
          window.cineTimeline.restart();
        }, 400);
      }
    });
  });

  window.cineCamera = { cameraTo, cameraSnap, $ };
})();
</script>
