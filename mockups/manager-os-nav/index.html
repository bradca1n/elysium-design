<style>
  :root {
    --bg-canvas: #FFFFFF;
    --bg-surface: #FAF9F7;
    --bg-card: #FFFFFF;
    --bg-subtle: #F2F0EC;
    --ink-1: #0E0F12;
    --ink-2: #4F5258;
    --ink-3: #82858B;
    --line-1: #E4E3DE;
    --line-2: #D2D1CB;
    --accent-plum: #3D5F1F;
    --accent-plum-soft: rgba(86,140,40,0.16);
    --accent-plum-on: #FFFFFF;
    --accent-grad: linear-gradient(135deg,#5C8A2C,#3D5F1F);
    --green-50: rgba(86,140,40,0.08);
    --green-200: rgba(86,140,40,0.20);
    --green-300: #8EB763;
    --green-400: #6FA241;
    --green-500: #568C28;
    --green-600: #3D5F1F;
    --green-700: #2B4516;
    --pos: #3D5F1F;
    --neg: #e13733;
    --info-bg: #EEF3F9;
    --info-border: #D2DFEC;
    --info-fg: #345B85;
    --glass-bg: rgba(0,0,0,0.03);
    --glass-border: rgba(0,0,0,0.06);
  }
  .dark {
    --bg-canvas: #08090B;
    --bg-surface: #0F1115;
    --bg-card: #131519;
    --bg-subtle: #1B1E24;
    --ink-1: #F4F5F4;
    --ink-2: #9DA0A4;
    --ink-3: #6B6E73;
    --line-1: #23262C;
    --line-2: #2F333B;
    --green-50: rgba(69,213,155,0.10);
    --green-200: rgba(69,213,155,0.25);
    --green-300: #4F7A38;
    --green-400: #6FBF55;
    --green-500: #45d59b;
    --green-600: #B8F18C;
    --green-700: #D2F7AE;
    --pos: #45d59b;
    --neg: #e13733;
    --info-bg: rgba(95,184,218,0.10);
    --info-border: rgba(95,184,218,0.25);
    --info-fg: #9CC9DD;
    --glass-bg: #131519;
    --glass-border: #23262C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-canvas);
    color: var(--ink-1);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  button { font-family: inherit; }
  input, select { font-family: inherit; outline: none; }
  input:focus, select:focus { border-color: var(--ink-1) !important; box-shadow: 0 0 0 3px var(--bg-card); }
  table td, table th { vertical-align: middle; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 6px; border: 2px solid var(--bg-canvas); }
  ::-webkit-scrollbar-track { background: var(--bg-canvas); }

  /* ─── Page-load micro-interactions ─── */
  @keyframes pageRise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes navFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes navSlideIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes kpiCount {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes barGrow {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }
  @keyframes donutDraw {
    from { stroke-dashoffset: var(--dash-full, 600); }
    to   { stroke-dashoffset: var(--dash-final, 0); }
  }
  @keyframes rowSlide {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Stagger children of page root on mount */
  [data-page] > *:not(.no-page-anim) {
    animation: pageRise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  [data-page] > *:nth-child(1) { animation-delay: 0.00s; }
  [data-page] > *:nth-child(2) { animation-delay: 0.05s; }
  [data-page] > *:nth-child(3) { animation-delay: 0.10s; }
  [data-page] > *:nth-child(4) { animation-delay: 0.15s; }
  [data-page] > *:nth-child(5) { animation-delay: 0.20s; }
  [data-page] > *:nth-child(6) { animation-delay: 0.25s; }
  [data-page] > *:nth-child(7) { animation-delay: 0.30s; }
  [data-page] > *:nth-child(n+8) { animation-delay: 0.35s; }

  /* KPI tiles: subtle count-up rise */
  [data-kpi-grid] > * {
    animation: kpiCount 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  [data-kpi-grid] > *:nth-child(1) { animation-delay: 0.10s; }
  [data-kpi-grid] > *:nth-child(2) { animation-delay: 0.18s; }
  [data-kpi-grid] > *:nth-child(3) { animation-delay: 0.26s; }
  [data-kpi-grid] > *:nth-child(4) { animation-delay: 0.34s; }

  /* Allocation/progress bars */
  [data-bar-fill] {
    transform-origin: left center;
    animation: barGrow 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.35s;
  }

  /* Table rows */
  [data-row] {
    animation: rowSlide 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  [data-row]:nth-child(1) { animation-delay: 0.30s; }
  [data-row]:nth-child(2) { animation-delay: 0.36s; }
  [data-row]:nth-child(3) { animation-delay: 0.42s; }
  [data-row]:nth-child(4) { animation-delay: 0.48s; }
  [data-row]:nth-child(5) { animation-delay: 0.54s; }
  [data-row]:nth-child(6) { animation-delay: 0.60s; }
  [data-row]:nth-child(7) { animation-delay: 0.66s; }
  [data-row]:nth-child(n+8) { animation-delay: 0.72s; }

  /* Donut chart arc draw */
  [data-donut-arc] {
    stroke-dasharray: var(--dash-total, 600);
    stroke-dashoffset: var(--dash-total, 600);
    animation: donutDraw 1.0s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  [data-donut-arc]:nth-child(1) { animation-delay: 0.20s; }
  [data-donut-arc]:nth-child(2) { animation-delay: 0.28s; }
  [data-donut-arc]:nth-child(3) { animation-delay: 0.36s; }
  [data-donut-arc]:nth-child(4) { animation-delay: 0.44s; }
  [data-donut-arc]:nth-child(5) { animation-delay: 0.52s; }

  /* Sidebar items enter */
  [data-sidebar-item] {
    animation: navSlideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  /* Respect reduced-motion preferences */
  @media (prefers-reduced-motion: reduce) {
    [data-page] > *, [data-kpi-grid] > *, [data-bar-fill],
    [data-row], [data-donut-arc], [data-sidebar-item] {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      stroke-dashoffset: 0 !important;
    }
  }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; width: 300px;
    background: var(--bg-canvas); border: 1px solid var(--line-1);
    border-radius: 14px; box-shadow: 0 18px 48px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.06);
    padding: 18px 18px 16px; z-index: 90;
    font-size: 13px;
  }
  .tweaks-panel h4 { margin: 0 0 12px; font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .tweaks-panel .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--line-1); }
  .tweaks-panel .row:first-of-type { border-top: none; }
  .tweaks-panel label { color: var(--ink-2); }
  .swatches { display: flex; gap: 6px; flex-wrap: wrap; max-width: 200px; }
  .swatches button { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--line-2); cursor: pointer; padding: 0; }
  .swatches button.active { border-color: var(--ink-1); transform: scale(1.08); }
  .tweak-select { height: 28px; border-radius: 6px; border: 1px solid var(--line-2); background: var(--bg-canvas); color: var(--ink-1); padding: 0 8px; font-size: 12px; }

  /* ─── Terminal theme overrides (apply in BOTH light + dark) ─── */
  body { font-feature-settings: normal; }

  /* Lock dark-mode accent to bright terminal lime; light mode flows from accent swatch */
  .dark { --accent-plum: #45d59b !important; --accent-plum-soft: rgba(69,213,155,0.18) !important; --accent-plum-on: #0A1106 !important; --accent-grad: linear-gradient(135deg, #45d59b, #6FBF55) !important; }

  /* Tables — hairline dividers, uppercase tracked headers, no fill on th row */
  table thead tr { background: transparent !important; }
  table thead th {
    text-transform: uppercase !important;
    letter-spacing: 0.10em !important;
    font-size: 10px !important;
    color: var(--ink-3) !important;
    font-weight: 500 !important;
    border-bottom: 1px solid var(--line-1) !important;
    background: transparent !important;
  }
  .dark table tbody tr:hover td { background: var(--bg-card) !important; }
  body:not(.dark) table tbody tr:hover td { background: var(--bg-surface) !important; }

  /* KPI tile — refined terminal style with numbered badge */
  [data-kpi-grid] > * {
    background: var(--bg-card) !important;
    backdrop-filter: none !important;
    border-radius: 10px !important;
    padding: 18px 20px 16px !important;
    position: relative !important;
  }
  body:not(.dark) [data-kpi-grid] > * { border: 1px solid var(--line-1) !important; }
  [data-kpi-grid] > *::before {
    content: attr(data-kpi-num);
    position: absolute; top: 14px; right: 14px;
    width: 18px; height: 18px;
    border: 1px solid var(--line-2); border-radius: 4px;
    color: var(--ink-3); font-size: 9.5px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  [data-kpi-grid] > *:not([data-kpi-num])::before { display: none; }
  [data-kpi-grid] > * > div:first-child {
    text-transform: uppercase !important;
    letter-spacing: 0.10em !important;
    font-size: 10px !important;
    color: var(--ink-3) !important;
    font-weight: 500 !important;
    margin-bottom: 16px !important;
  }
  [data-kpi-grid] > * > div:nth-child(2) {
    margin-bottom: 24px !important;
  }
  [data-kpi-grid] > * > div:nth-child(3) {
    color: var(--ink-2) !important;
    margin-top: 0 !important;
  }

  /* Buttons — terminal corner radii (6px); icon/avatar stay circular */
  button { border-radius: 6px !important; }
  .icon-btn, .avatar-btn, .avatar-btn .avatar-circle { border-radius: 50% !important; }
  .swatches button { border-radius: 50% !important; }

  /* Duration profile graph — sharper corners (colour driven by JSX from accent) */
  [data-duration-bar] { border-radius: 4px !important; border: none !important; }

  /* Comments thread (giscus) */
  .comments { max-width: 1200px; margin: 0 auto; padding: 48px 40px 96px; border-top: 1px solid var(--line-1); background: var(--bg-canvas); font-family: 'Inter', sans-serif; }
  .comments h2 { font-size: 22px; font-weight: 600; margin: 0 0 6px; color: var(--ink-1); letter-spacing: -0.01em; }
  .comments .comments-sub { font-size: 13px; color: var(--ink-2); margin-bottom: 28px; }
</style>

<script type="application/json" id="__tweaks">

<div class="comments">

  <script src="https://giscus.app/client.js"
          data-repo="bradca1n/elysium-design"

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="views-nav-terminal.jsx"></script>
<script type="text/babel" src="views-other-terminal.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": true,
  "accent": "kelly",
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const [route, setRoute] = React.useState(() => localStorage.getItem('mos.route') || 'nav');
  const [showTweaks, setShowTweaks] = React.useState(false);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => { localStorage.setItem('mos.route', route); }, [route]);

  React.useEffect(() => {
    // Only control dark mode if user hasn't set an explicit theme in the account menu
    if (!localStorage.getItem('mos.theme')) document.body.classList.toggle('dark', tweaks.dark);
    const accents = {
      // [light-strong, dark-strong, light-soft, dark-soft, light-gradient]
      // Light-mode greens — picked for vibrancy on paper-white (#FBFBF9) at AA on body text
      moss:       ['#3D5F1F', '#45d59b', 'rgba(86,140,40,0.16)',  'rgba(69,213,155,0.18)', 'linear-gradient(135deg,#5C8A2C,#3D5F1F)'],
      forest:     ['#1F6B3A', '#45d59b', 'rgba(31,107,58,0.14)',  'rgba(69,213,155,0.18)', 'linear-gradient(135deg,#2E8C50,#1F6B3A)'],
      kelly:      ['#2E8B3D', '#45d59b', 'rgba(46,139,61,0.14)',  'rgba(69,213,155,0.18)', 'linear-gradient(135deg,#43B056,#2E8B3D)'],
      shamrock:   ['#1AAA5C', '#45d59b', 'rgba(26,170,92,0.13)',  'rgba(69,213,155,0.18)', 'linear-gradient(135deg,#2BC872,#1AAA5C)'],
      emerald:    ['#0D9F70', '#45d59b', 'rgba(13,159,112,0.14)', 'rgba(69,213,155,0.18)', 'linear-gradient(135deg,#22C58E,#0D9F70)'],
      jade:       ['#117F5C', '#45d59b', 'rgba(17,127,92,0.14)',  'rgba(69,213,155,0.18)', 'linear-gradient(135deg,#1FA178,#117F5C)'],
      lime:       ['#4F8C1A', '#45d59b', 'rgba(79,140,26,0.15)',  'rgba(69,213,155,0.18)', 'linear-gradient(135deg,#7BBF34,#4F8C1A)'],
      chartreuse: ['#5C8A0E', '#45d59b', 'rgba(92,138,14,0.14)',  'rgba(69,213,155,0.18)', 'linear-gradient(135deg,#92BE2A,#5C8A0E)'],
    };
    const [fgLight, fgDark, softLight, softDark, grad] = accents[tweaks.accent] || accents.moss;
    const isDark = document.body.classList.contains('dark');
    document.documentElement.style.setProperty('--accent-plum', isDark ? fgDark : fgLight);
    document.documentElement.style.setProperty('--accent-plum-soft', isDark ? softDark : softLight);
    document.documentElement.style.setProperty('--accent-plum-on', isDark ? '#0A1106' : '#FFFFFF');
    document.documentElement.style.setProperty('--accent-grad', grad);
    // Keep positive/up indicators in lockstep with the accent in light mode
    if (!isDark) {
      document.documentElement.style.setProperty('--pos', fgLight);
      document.documentElement.style.setProperty('--green-600', fgLight);
    } else {
      document.documentElement.style.removeProperty('--pos');
      document.documentElement.style.removeProperty('--green-600');
    }
  }, [tweaks]);

  // Tweaks host protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    setTweaks(t => {
      const next = { ...t, [k]: v };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      return next;
    });
  };

  let view;
  if (route === 'order-book') view = <OrderBookView onNav={setRoute}/>;
  else if (route === 'collateral') view = <CollateralView onNav={setRoute}/>;
  else if (route === 'share-register') view = <ShareRegisterView onNav={setRoute}/>;
  else if (route === 'reconciliation') view = <ReconciliationView onNav={setRoute}/>;
  else if (route === 'pnl') view = <ProfitLossView onNav={setRoute}/>;
  else if (route === 'balance-sheet') view = <BalanceSheetView onNav={setRoute}/>;
  else if (route === 'economics') view = <EconomicsView onNav={setRoute}/>;
  else view = <NavView onNav={setRoute} showTweaks={showTweaks}/>;

  return (
    <div style={{display:'flex',minHeight:'100vh',background:'var(--bg-canvas)'}}>
      <Sidebar route={route} onNav={setRoute}/>
      <div style={{display:'flex',flexDirection:'column',flex:1,minWidth:0}}>
        <div style={{position:'sticky',top:0,zIndex:30,background:'var(--bg-canvas)'}}>
          <Navbar route={route} onNav={setRoute}/>
        </div>
        <main style={{flex:1,minWidth:0,background:'var(--bg-canvas)'}}>
          <div key={route}>{view}</div>
        </main>
      </div>
      {showTweaks && (
        <div className="tweaks-panel">
          <h4>Tweaks
            <button onClick={()=>setShowTweaks(false)} style={{background:'transparent',border:'none',color:'var(--ink-3)',cursor:'pointer',fontSize:16,padding:0,lineHeight:1}}>×</button>
          </h4>
          <div className="row">
            <label>Dark mode</label>
            <button onClick={()=>setTweak('dark', !tweaks.dark)} style={{
              width:36,height:20,borderRadius:10,border:'none',cursor:'pointer',padding:0,
              background: tweaks.dark ? 'var(--ink-1)' : 'var(--line-2)',
              position:'relative'}}>
              <span style={{position:'absolute',top:2,left:tweaks.dark?18:2,width:16,height:16,borderRadius:'50%',background:'#fff',transition:'left 0.15s'}}/>
            </button>
          </div>
          <div className="row">
            <label>Accent (light mode)</label>
            <div className="swatches">
              {[
                ['moss','#3D5F1F'],
                ['forest','#1F6B3A'],
                ['kelly','#2E8B3D'],
                ['shamrock','#1AAA5C'],
                ['emerald','#0D9F70'],
                ['jade','#117F5C'],
                ['lime','#4F8C1A'],
                ['chartreuse','#5C8A0E'],
              ].map(([k,c]) => (
                <button key={k} onClick={()=>setTweak('accent', k)} className={tweaks.accent===k?'active':''} style={{background:c}} title={k}/>
              ))}
            </div>
          </div>
          <div className="row">
            <label>Density</label>
            <select className="tweak-select" value={tweaks.density} onChange={e=>setTweak('density', e.target.value)}>
              <option value="comfortable">Comfortable</option>
              <option value="compact">Compact</option>
            </select>
          </div>
          <div className="row">
            <label>Jump to</label>
            <select className="tweak-select" value={route} onChange={e=>setRoute(e.target.value)}>
              <option value="nav">NAV</option>
              <option value="order-book">Order book</option>
              <option value="collateral">Move collateral</option>
              <option value="share-register">Share register</option>
              <option value="reconciliation">Reconciliation</option>
              <option value="pnl">Profit & Loss</option>
              <option value="balance-sheet">Balance Sheet</option>
            </select>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// Terminal-theme post-mount tagger:
// - numbers each KPI tile within its grid (data-kpi-num="01"…)
// - tags the duration profile bar (data-duration-bar) so dark CSS can recolor it
function applyTerminalTags() {
  document.querySelectorAll('[data-kpi-grid]').forEach(grid => {
    Array.from(grid.children).forEach((tile, i) => {
      tile.setAttribute('data-kpi-num', String(i + 1).padStart(2, '0'));
    });
  });
  // Duration profile: a flex row of 3 segments inside Share Register summary charts
  document.querySelectorAll('div').forEach(el => {
    if (el.dataset.durationBar) return;
    const txt = el.textContent || '';
    if (!/Duration profile/i.test(txt)) return;
    // Walk siblings to find the bar (a flex container with 3 colored % segments)
    const next = el.nextElementSibling;
    if (next && next.children.length === 3 && getComputedStyle(next).display === 'flex') {
      next.setAttribute('data-duration-bar', '1');
    }
  });
}
const obs = new MutationObserver(() => applyTerminalTags());
